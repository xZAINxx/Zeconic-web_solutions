<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Card Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a14 0%, #12121f 50%, #1a1a2e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            perspective: 1500px;
            overflow: hidden;
        }

        .card-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* MAGNETIC CARD - Single Instance */
        .magnetic-card {
            position: relative;
            width: 380px;
            height: 240px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 24px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.2s ease;

            /* Base 3D thickness */
            box-shadow:
                0 8px 0 0 #1a2332,
                0 12px 0 0 #141d28,
                0 16px 0 0 #0e151e,
                0 20px 40px rgba(0, 0, 0, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.08),
                inset 0 -4px 8px rgba(0, 0, 0, 0.3);

            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        /* Card content */
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }

        .card-logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f472b6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-chip {
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(251, 191, 36, 0.3);
        }

        .card-number {
            font-size: 22px;
            font-weight: 600;
            color: #f8fafc;
            letter-spacing: 3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .card-details {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-name {
            font-size: 14px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-expiry {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Gradient overlay that shifts with cursor */
        .card-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(139, 92, 246, 0.15),
                    transparent 40%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }

        .magnetic-card:hover .card-gradient {
            opacity: 1;
        }

        /* Compressed state on click */
        .magnetic-card.compressed {
            transform: scale(0.95) translateZ(-20px) !important;
            box-shadow:
                0 4px 0 0 #1a2332,
                0 6px 0 0 #141d28,
                0 8px 0 0 #0e151e,
                0 12px 20px rgba(0, 0, 0, 0.7);
        }

        /* Hint text */
        .hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .hint kbd {
            background: rgba(255, 255, 255, 0.08);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="card-wrapper">
        <!-- SINGLE INSTANCE - Magnetic Card -->
        <div class="magnetic-card" id="card">
            <div class="card-gradient" id="gradient"></div>
            <div class="card-content">
                <div>
                    <div class="card-logo">3D CARD</div>
                    <div class="card-chip" style="margin-top: 20px;"></div>
                </div>
                <div>
                    <div class="card-number">4532 •••• •••• 8901</div>
                    <div class="card-details">
                        <div class="card-name">John Smith</div>
                        <div class="card-expiry">12/26</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="hint">Hover to bend • Click to compress</div>
    </div>

    <script>
        const card = document.getElementById('card');
        const gradient = document.getElementById('gradient');

        // ========== MAGNETIC BENDING & TILTING ==========
        let isPressed = false;

        card.addEventListener('mousemove', (e) => {
            if (isPressed) return;

            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; // X position within card
            const y = e.clientY - rect.top;  // Y position within card

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            // Calculate rotation based on distance from center
            const rotateY = ((x - centerX) / centerX) * 15; // -15 to +15 degrees
            const rotateX = ((centerY - y) / centerY) * 15; // -15 to +15 degrees

            // Calculate corner lift (bending effect)
            const bendX = ((x - centerX) / centerX) * 5;
            const bendY = ((centerY - y) / centerY) * 5;

            // Apply transform with perspective and translation for magnetic effect
            card.style.transform = `
                perspective(1000px)
                rotateX(${rotateX}deg) 
                rotateY(${rotateY}deg)
                translateZ(20px)
                scale(1.02)
            `;

            // Update gradient position
            const mouseX = (x / rect.width) * 100;
            const mouseY = (y / rect.height) * 100;
            gradient.style.setProperty('--mouse-x', `${mouseX}%`);
            gradient.style.setProperty('--mouse-y', `${mouseY}%`);
        });

        card.addEventListener('mouseleave', () => {
            if (isPressed) return;

            // Reset to flat position
            card.style.transform = `
                perspective(1000px)
                rotateX(0deg)
                rotateY(0deg)
                translateZ(0px)
                scale(1)
            `;
        });

        // ========== COMPRESSION ON CLICK ==========
        card.addEventListener('mousedown', () => {
            isPressed = true;
            card.classList.add('compressed');
        });

        card.addEventListener('mouseup', () => {
            isPressed = false;
            card.classList.remove('compressed');

            // Restore hover state if still hovering
            const rect = card.getBoundingClientRect();
            const hovering = document.elementFromPoint(rect.left + rect.width / 2, rect.top + rect.height / 2) === card;

            if (!hovering) {
                card.style.transform = `
                    perspective(1000px)
                    rotateX(0deg)
                    rotateY(0deg)
                    translateZ(0px)
                    scale(1)
                `;
            }
        });

        // Global mouseup to handle release outside card
        document.addEventListener('mouseup', () => {
            if (isPressed) {
                isPressed = false;
                card.classList.remove('compressed');
            }
        });

        // Exposed API
        window.MagneticCard = {
            reset: () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px) scale(1)';
                card.classList.remove('compressed');
            }
        };
    </script>
</body>

</html>
