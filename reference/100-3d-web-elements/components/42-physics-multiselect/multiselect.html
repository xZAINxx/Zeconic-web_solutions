<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Physics Multi-Select Tags</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useCallback, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence, useMotionValue, useSpring } from 'framer-motion';

        const TAG_OPTIONS = [
            { id: 'react', label: 'React', icon: '⚛️', color: '#61dafb' },
            { id: 'three', label: 'Three.js', icon: '🔺', color: '#049ef4' },
            { id: 'tailwind', label: 'Tailwind', icon: '🎨', color: '#38bdf8' },
            { id: 'framer', label: 'Framer', icon: '✨', color: '#bb4bff' },
            { id: 'typescript', label: 'TypeScript', icon: '📘', color: '#3178c6' },
            { id: 'vite', label: 'Vite', icon: '⚡', color: '#ffc018' },
            { id: 'nextjs', label: 'Next.js', icon: '▲', color: '#ffffff' },
            { id: 'node', label: 'Node.js', icon: '🟢', color: '#68a063' },
            { id: 'prisma', label: 'Prisma', icon: '◆', color: '#5a67d8' },
            { id: 'gsap', label: 'GSAP', icon: '🟩', color: '#88ce02' },
        ];

        const PhysicsPill = ({ tag, onRemove, containerRef, index }) => {
            const pillRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const rotate = useMotionValue(0);
            const vx = useRef((Math.random() - 0.5) * 3);
            const vy = useRef(-2 - Math.random() * 3);
            const vr = useRef((Math.random() - 0.5) * 5);
            const settled = useRef(false);
            const posX = useRef((Math.random() - 0.5) * 200);
            const posY = useRef(-200 - index * 30);
            const posR = useRef(Math.random() * 30 - 15);
            const animFrame = useRef(null);
            const gravity = 0.15;
            const bounce = 0.4;
            const friction = 0.98;

            useEffect(() => {
                const loop = () => {
                    if (settled.current) return;

                    const container = containerRef.current;
                    if (!container || !pillRef.current) { animFrame.current = requestAnimationFrame(loop); return; }

                    const cRect = container.getBoundingClientRect();
                    const pRect = pillRef.current.getBoundingClientRect();

                    // Gravity
                    vy.current += gravity;
                    vx.current *= friction;
                    vy.current *= friction;
                    vr.current *= 0.97;

                    posX.current += vx.current;
                    posY.current += vy.current;
                    posR.current += vr.current;

                    // Floor collision
                    const maxY = (cRect.height / 2) - (pRect.height / 2) - 8;
                    if (posY.current > maxY) {
                        posY.current = maxY;
                        vy.current = -Math.abs(vy.current) * bounce;
                        vx.current += (Math.random() - 0.5) * 2;
                        vr.current = (Math.random() - 0.5) * 4;

                        // Check if settled
                        if (Math.abs(vy.current) < 0.3) {
                            settled.current = true;
                            vy.current = 0;
                        }
                    }

                    // Wall collisions
                    const maxX = (cRect.width / 2) - (pRect.width / 2) - 8;
                    if (posX.current > maxX) { posX.current = maxX; vx.current = -Math.abs(vx.current) * bounce; }
                    if (posX.current < -maxX) { posX.current = -maxX; vx.current = Math.abs(vx.current) * bounce; }

                    // Ceiling collision
                    const minY = -(cRect.height / 2) + (pRect.height / 2) + 8;
                    if (posY.current < minY) { posY.current = minY; vy.current = Math.abs(vy.current) * bounce; }

                    x.set(posX.current);
                    y.set(posY.current);
                    rotate.set(posR.current);

                    animFrame.current = requestAnimationFrame(loop);
                };

                animFrame.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(animFrame.current);
            }, []);

            return (
                <motion.div
                    ref={pillRef}
                    initial={{ scale: 0, opacity: 0 }}
                    animate={{ scale: 1, opacity: 1 }}
                    exit={{ scale: 0, opacity: 0, transition: { type: 'spring', stiffness: 500, damping: 20 } }}
                    className="absolute flex items-center gap-1.5 px-3.5 py-1.5 rounded-full cursor-pointer select-none"
                    style={{
                        x,
                        y,
                        rotate,
                        background: `${tag.color}20`,
                        border: `1px solid ${tag.color}50`,
                        boxShadow: `0 2px 10px ${tag.color}20`,
                        top: '50%',
                        left: '50%',
                        transform: 'translate(-50%, -50%)',
                        whiteSpace: 'nowrap',
                    }}
                    onClick={onRemove}
                    whileHover={{ scale: 1.1, boxShadow: `0 4px 20px ${tag.color}40` }}
                    whileTap={{ scale: 0.85 }}
                    drag
                    dragConstraints={containerRef}
                    dragElastic={0.1}
                    onDragEnd={() => { settled.current = false; }}
                >
                    <span className="text-sm">{tag.icon}</span>
                    <span className="text-xs font-semibold" style={{ color: tag.color }}>{tag.label}</span>
                    <span className="text-xs" style={{ color: `${tag.color}80` }}>×</span>
                </motion.div>
            );
        };

        const PhysicsMultiSelect = () => {
            const [selectedTags, setSelectedTags] = useState([]);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const containerRef = useRef(null);
            const dropdownRef = useRef(null);

            const availableTags = TAG_OPTIONS.filter(t => !selectedTags.find(s => s.id === t.id));

            const addTag = (tag) => {
                setSelectedTags(prev => [...prev, tag]);
            };

            const removeTag = (tagId) => {
                setSelectedTags(prev => prev.filter(t => t.id !== tagId));
            };

            // Close dropdown on outside click
            useEffect(() => {
                const handleClick = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
                        setIsDropdownOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, []);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-lg px-4">
                    {/* Title */}
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-500 mb-1">Click pills to pop</p>
                        <h2 className="text-xl font-bold text-white">Anti-Gravity Multi-Select</h2>
                    </div>

                    {/* Physics Container - the "box" where pills drop into */}
                    <div
                        ref={containerRef}
                        className="relative w-full rounded-2xl overflow-hidden"
                        style={{
                            height: '240px',
                            background: 'rgba(255, 255, 255, 0.03)',
                            border: '1px solid rgba(255, 255, 255, 0.08)',
                            boxShadow: 'inset 0 2px 20px rgba(0,0,0,0.3)',
                        }}
                    >
                        {selectedTags.length === 0 && (
                            <div className="absolute inset-0 flex items-center justify-center">
                                <p className="text-slate-600 text-sm text-center px-8">
                                    Select technologies below.<br />
                                    <span className="text-slate-700 text-xs">Pills will physically drop in with gravity.</span>
                                </p>
                            </div>
                        )}

                        <AnimatePresence>
                            {selectedTags.map((tag, i) => (
                                <PhysicsPill
                                    key={tag.id}
                                    tag={tag}
                                    index={i}
                                    containerRef={containerRef}
                                    onRemove={() => removeTag(tag.id)}
                                />
                            ))}
                        </AnimatePresence>
                    </div>

                    {/* Add Tags Dropdown */}
                    <div ref={dropdownRef} className="relative w-full">
                        <button
                            onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                            disabled={availableTags.length === 0}
                            className="w-full flex items-center justify-between px-5 py-3.5 rounded-xl text-sm cursor-pointer transition-all"
                            style={{
                                background: 'rgba(255, 255, 255, 0.06)',
                                border: `1px solid ${isDropdownOpen ? 'rgba(139, 92, 246, 0.4)' : 'rgba(255, 255, 255, 0.1)'}`,
                                color: availableTags.length === 0 ? '#334155' : '#94a3b8',
                            }}
                        >
                            <span>{availableTags.length === 0 ? 'All tags selected!' : `+ Add Technology (${availableTags.length} left)`}</span>
                            <span style={{ transform: isDropdownOpen ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>▾</span>
                        </button>

                        {isDropdownOpen && availableTags.length > 0 && (
                            <div 
                                className="absolute bottom-full left-0 w-full mb-2 rounded-xl overflow-hidden z-50"
                                style={{
                                    background: 'rgba(15, 20, 35, 0.97)',
                                    border: '1px solid rgba(255,255,255,0.08)',
                                    boxShadow: '0 -10px 40px rgba(0,0,0,0.4)',
                                    maxHeight: '200px',
                                    overflowY: 'auto',
                                }}
                            >
                                {availableTags.map((tag) => (
                                    <button
                                        key={tag.id}
                                        onClick={() => { addTag(tag); }}
                                        className="w-full flex items-center gap-3 px-4 py-3 text-left cursor-pointer transition-colors hover:bg-white/5"
                                        style={{ borderBottom: '1px solid rgba(255,255,255,0.04)' }}
                                    >
                                        <span className="text-base">{tag.icon}</span>
                                        <span className="text-sm font-medium" style={{ color: tag.color }}>{tag.label}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Count */}
                    <p className="text-xs text-slate-600 font-mono">
                        {selectedTags.length} / {TAG_OPTIONS.length} selected
                    </p>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<PhysicsMultiSelect />);
    </script>
</body>
</html>
