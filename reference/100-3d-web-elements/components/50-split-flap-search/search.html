<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split-Flap Search Bar</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #07090f; min-height: 100vh; overflow: hidden; font-family: 'JetBrains Mono', 'Fira Code', monospace; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .flap-char { perspective: 200px; display: inline-block; line-height: 1; }
        .flap-inner { display: inline-block; transform-origin: center top; backface-visibility: hidden; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const SUGGESTIONS = [
            'react three fiber',
            'framer motion spring physics',
            'split flap display animation',
            'glassmorphism design 2025',
            'webgl vertex shaders',
            'three.js instanced mesh',
            'motion design systems',
            'scroll driven animations',
        ];

        // A single flap character that animates in from top
        const FlapChar = ({ char, delay }) => {
            if (char === ' ') return <span style={{ display: 'inline-block', width: '0.5ch' }} />;
            return (
                <span className="flap-char">
                    <motion.span
                        className="flap-inner"
                        style={{
                            display: 'inline-block',
                            color: '#f8fafc',
                            transformOrigin: '50% 0%',
                        }}
                        initial={{ rotateX: -90, opacity: 0, y: -4 }}
                        animate={{ rotateX: 0, opacity: 1, y: 0 }}
                        transition={{
                            rotateX: { type: 'spring', stiffness: 400, damping: 20, delay },
                            opacity: { duration: 0.08, delay },
                            y: { type: 'spring', stiffness: 300, damping: 18, delay },
                        }}
                    >
                        {char}
                    </motion.span>
                </span>
            );
        };

        // Full suggestion row rendered as flapping chars
        const FlapSuggestion = ({ text, query, onClick, isFocused }) => {
            // Split text into chars, highlight matched portion differently
            const chars = text.split('');
            const matchLen = query.length;

            return (
                <motion.div
                    onClick={onClick}
                    className="px-5 py-3 cursor-pointer select-none flex items-center gap-3"
                    style={{
                        borderBottom: '1px solid rgba(255,255,255,0.05)',
                        background: isFocused ? 'rgba(99,102,241,0.12)' : 'transparent',
                    }}
                    whileHover={{ background: 'rgba(255,255,255,0.04)' }}
                    transition={{ duration: 0.12 }}
                >
                    {/* Search icon */}
                    <span style={{ opacity: 0.35, fontSize: '0.8rem', flexShrink: 0 }}>⌕</span>
                    <span style={{ fontSize: '0.85rem', letterSpacing: '0.02em' }}>
                        {chars.map((char, i) => (
                            <FlapChar
                                key={`${text}-char-${i}`}
                                char={char}
                                delay={i * 0.018}
                            />
                        ))}
                    </span>
                </motion.div>
            );
        };

        const SplitFlapSearch = () => {
            const [query, setQuery] = useState('');
            const [focused, setFocused] = useState(false);
            const [selectedIndex, setSelectedIndex] = useState(-1);
            const inputRef = useRef(null);

            const suggestions = query.trim()
                ? SUGGESTIONS.filter(s => s.toLowerCase().includes(query.toLowerCase())).slice(0, 5)
                : SUGGESTIONS.slice(0, 5);

            const showDropdown = focused && suggestions.length > 0;

            const handleKeyDown = (e) => {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setSelectedIndex(i => Math.min(i + 1, suggestions.length - 1));
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setSelectedIndex(i => Math.max(i - 1, -1));
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    setQuery(suggestions[selectedIndex]);
                    setFocused(false);
                } else if (e.key === 'Escape') {
                    setFocused(false);
                }
            };

            return (
                <div className="w-full max-w-xl px-6">
                    <div className="mb-8 text-center">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-600 mb-2">Mechanical Board UI</p>
                        <h1 className="text-4xl font-bold text-white mb-1">Split-Flap Search</h1>
                        <p className="text-slate-500 text-sm">Type anything — each letter physically flips into place</p>
                    </div>

                    <div className="relative">
                        {/* Search input */}
                        <div
                            className="flex items-center rounded-2xl overflow-hidden"
                            style={{
                                background: 'rgba(255,255,255,0.04)',
                                border: focused ? '1px solid rgba(99,102,241,0.6)' : '1px solid rgba(255,255,255,0.1)',
                                boxShadow: focused ? '0 0 0 3px rgba(99,102,241,0.12)' : 'none',
                                transition: 'border 0.2s, box-shadow 0.2s',
                            }}
                        >
                            <span className="pl-5 text-slate-500 text-base">⌕</span>
                            <input
                                ref={inputRef}
                                type="text"
                                value={query}
                                onChange={e => { setQuery(e.target.value); setSelectedIndex(-1); }}
                                onFocus={() => setFocused(true)}
                                onBlur={() => setTimeout(() => setFocused(false), 150)}
                                onKeyDown={handleKeyDown}
                                placeholder="Search anything..."
                                className="w-full py-4 px-4 bg-transparent outline-none text-white placeholder-slate-600 text-sm"
                                style={{ fontFamily: 'inherit', letterSpacing: '0.04em' }}
                            />
                            {query && (
                                <button
                                    className="pr-5 text-slate-500 hover:text-slate-300 transition-colors"
                                    onClick={() => { setQuery(''); inputRef.current?.focus(); }}
                                >
                                    ✕
                                </button>
                            )}
                        </div>

                        {/* Dropdown panel */}
                        <AnimatePresence>
                            {showDropdown && (
                                <motion.div
                                    className="absolute top-full left-0 right-0 mt-2 rounded-2xl overflow-hidden z-50"
                                    style={{
                                        background: 'rgba(10, 12, 20, 0.98)',
                                        border: '1px solid rgba(255,255,255,0.08)',
                                        boxShadow: '0 20px 60px rgba(0,0,0,0.7)',
                                        backdropFilter: 'blur(16px)',
                                    }}
                                    initial={{ opacity: 0, y: -6, scale: 0.98 }}
                                    animate={{ opacity: 1, y: 0, scale: 1 }}
                                    exit={{ opacity: 0, y: -6, scale: 0.98 }}
                                    transition={{ type: 'spring', stiffness: 400, damping: 30 }}
                                >
                                    <div className="px-5 pt-3 pb-1">
                                        <p className="text-xs text-slate-600 uppercase tracking-widest">
                                            {query ? 'Results' : 'Suggestions'}
                                        </p>
                                    </div>
                                    {suggestions.map((s, i) => (
                                        <FlapSuggestion
                                            key={s}
                                            text={s}
                                            query={query}
                                            isFocused={selectedIndex === i}
                                            onClick={() => { setQuery(s); setFocused(false); }}
                                        />
                                    ))}
                                    <div className="px-5 py-2 flex items-center gap-2" style={{ borderTop: '1px solid rgba(255,255,255,0.05)' }}>
                                        <kbd className="text-xs bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">↑↓</kbd>
                                        <span className="text-xs text-slate-600">navigate</span>
                                        <kbd className="text-xs bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded ml-2">↵</kbd>
                                        <span className="text-xs text-slate-600">select</span>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<SplitFlapSearch />);
    </script>
</body>
</html>
