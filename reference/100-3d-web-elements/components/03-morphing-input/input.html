<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Input Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a14 0%, #12121f 50%, #1a1a2e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            gap: 40px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Label */
        .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .input-wrapper.focused .label {
            color: #818cf8;
            transform: scale(1.05);
        }

        /* Input container for ripple */
        .input-container {
            position: relative;
            overflow: visible;
        }

        /* MORPHING INPUT - Single Instance */
        .input-field {
            width: 320px;
            height: 56px;
            padding: 0 20px;
            font-size: 16px;
            font-family: inherit;
            color: #ffffff;
            background: linear-gradient(180deg, #2a2a42, #222238);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            outline: none;
            letter-spacing: 0.5px;

            /* Base 3D slab */
            box-shadow:
                0 4px 0 0 #1a1a2a,
                0 6px 0 0 #141420,
                0 8px 16px rgba(0, 0, 0, 0.4);

            transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
            transform: translateY(0) scale(1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* FOCUSED - Big morph effect */
        .input-field:focus {
            border-radius: 20px;
            transform: translateY(-4px) scale(1.03);
            background: linear-gradient(180deg, #3a3a5a, #2e2e48);
            border-color: #6366f1;

            /* Much bigger thickness on focus */
            box-shadow:
                0 8px 0 0 #3730a3,
                0 12px 0 0 #312e81,
                0 14px 0 0 #1e1b4b,
                0 18px 35px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(99, 102, 241, 0.3);
        }

        /* Ripple ring effect */
        .ripple-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border: 3px solid #6366f1;
            border-radius: 20px;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
            pointer-events: none;
            animation: ringPulse 0.5s ease-out forwards;
        }

        @keyframes ringPulse {
            0% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0;
            }
        }

        /* Keystroke bounce */
        .input-field.typing {
            animation: typeBounce 0.2s ease-out;
        }

        @keyframes typeBounce {
            0% {
                transform: translateY(-4px) scale(1.03);
            }

            40% {
                transform: translateY(-6px) scale(1.04);
            }

            100% {
                transform: translateY(-4px) scale(1.03);
            }
        }

        /* Glow pulse on type */
        .input-container.glow::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 24px;
            background: transparent;
            border: 2px solid rgba(99, 102, 241, 0.5);
            animation: glowPulse 0.3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.05);
            }
        }

        /* Hint */
        .hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>

<body>
    <div class="input-wrapper" id="wrapper">
        <label class="label" for="input">Your Name</label>

        <!-- SINGLE INSTANCE - Morphing Input -->
        <div class="input-container" id="container">
            <input type="text" class="input-field" id="input" placeholder="Start typing..." autocomplete="off">
        </div>

        <div class="hint">Click to focus, then type to see effects</div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const container = document.getElementById('container');
        const input = document.getElementById('input');

        // Exposed API
        window.MorphInput = {
            get value() { return input.value; },
            set value(val) { input.value = val; },
            focus: () => input.focus(),
            blur: () => input.blur()
        };

        // Focus/blur
        input.addEventListener('focus', () => wrapper.classList.add('focused'));
        input.addEventListener('blur', () => wrapper.classList.remove('focused'));

        // Keystroke effects
        input.addEventListener('keydown', (e) => {
            if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete') {
                // Bounce animation
                input.classList.remove('typing');
                void input.offsetWidth;
                input.classList.add('typing');

                // Glow effect
                container.classList.remove('glow');
                void container.offsetWidth;
                container.classList.add('glow');

                // Create ripple ring
                const ring = document.createElement('div');
                ring.className = 'ripple-ring';
                container.appendChild(ring);
                setTimeout(() => ring.remove(), 500);
            }
        });
    </script>
</body>

</html>
