<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080c;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }
        #root { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';
        import { Html, OrbitControls } from '@react-three/drei';
        import * as THREE from 'three';

        /* ── Funnel Stage Data ── */
        const stages = [
            { name: 'Visitors', value: '124,502', pct: '100%', color: '#818cf8', barH: 4.0 },
            { name: 'Sign Ups', value: '31,125', pct: '25%', color: '#34d399', barH: 2.8 },
            { name: 'Active Users', value: '9,338', pct: '7.5%', color: '#fbbf24', barH: 1.6 },
            { name: 'Conversions', value: '2,335', pct: '1.9%', color: '#f472b6', barH: 0.7 },
        ];

        /* ── Single 3D Bar ── */
        const FunnelBar = ({ stage, index, hoveredBar, setHoveredBar }) => {
            const meshRef = useRef();
            const glowRef = useRef();
            const isHovered = hoveredBar === index;
            const barWidth = 1.2;
            const barDepth = 1.2;
            const gap = 2.0;
            const xPos = (index - (stages.length - 1) / 2) * gap;

            const color = useMemo(() => new THREE.Color(stage.color), [stage.color]);

            useFrame((_, delta) => {
                if (!meshRef.current) return;
                const targetY = isHovered ? 0.15 : 0;
                const targetEmissive = isHovered ? 0.5 : 0.12;
                meshRef.current.position.y = THREE.MathUtils.lerp(meshRef.current.position.y, stage.barH / 2 + targetY, delta * 10);
                meshRef.current.material.emissiveIntensity = THREE.MathUtils.lerp(
                    meshRef.current.material.emissiveIntensity, targetEmissive, delta * 8
                );
                if (glowRef.current) {
                    const targetScale = isHovered ? 1.15 : 1.0;
                    glowRef.current.scale.x = THREE.MathUtils.lerp(glowRef.current.scale.x, targetScale, delta * 8);
                    glowRef.current.scale.z = THREE.MathUtils.lerp(glowRef.current.scale.z, targetScale, delta * 8);
                    glowRef.current.material.opacity = THREE.MathUtils.lerp(glowRef.current.material.opacity, isHovered ? 0.12 : 0, delta * 6);
                }
            });

            return (
                <group position={[xPos, 0, 0]}>
                    {/* Base glow */}
                    <mesh ref={glowRef} position={[0, stage.barH / 2, 0]}>
                        <boxGeometry args={[barWidth + 0.3, stage.barH, barDepth + 0.3]} />
                        <meshBasicMaterial color={stage.color} transparent opacity={0} side={THREE.BackSide} />
                    </mesh>

                    {/* Main bar */}
                    <mesh
                        ref={meshRef}
                        position={[0, stage.barH / 2, 0]}
                        onPointerOver={(e) => { e.stopPropagation(); setHoveredBar(index); }}
                        onPointerOut={() => setHoveredBar(null)}
                    >
                        <boxGeometry args={[barWidth, stage.barH, barDepth]} />
                        <meshStandardMaterial
                            color={color}
                            emissive={color}
                            emissiveIntensity={0.12}
                            metalness={0.4}
                            roughness={0.3}
                            transparent
                            opacity={0.88}
                        />
                    </mesh>

                    {/* Top cap glow */}
                    <mesh position={[0, stage.barH + 0.02, 0]} rotation={[-Math.PI / 2, 0, 0]}>
                        <planeGeometry args={[barWidth, barDepth]} />
                        <meshBasicMaterial color={stage.color} transparent opacity={isHovered ? 0.4 : 0.15} />
                    </mesh>

                    {/* Floor reflection */}
                    <mesh position={[0, 0.01, 0]} rotation={[-Math.PI / 2, 0, 0]}>
                        <planeGeometry args={[barWidth + 0.2, barDepth + 0.2]} />
                        <meshBasicMaterial color={stage.color} transparent opacity={0.06} />
                    </mesh>

                    {/* Stage label below */}
                    <Html position={[0, -0.5, barDepth / 2 + 0.5]} center distanceFactor={10} style={{ pointerEvents: 'none' }}>
                        <div style={{
                            textAlign: 'center',
                            fontFamily: 'Inter, sans-serif',
                            whiteSpace: 'nowrap',
                        }}>
                            <div style={{ fontSize: '12px', fontWeight: 700, color: stage.color, letterSpacing: '0.5px' }}>
                                {stage.name}
                            </div>
                        </div>
                    </Html>

                    {/* Hover tooltip */}
                    {isHovered && (
                        <Html position={[0, stage.barH + 0.8, 0]} center distanceFactor={8} style={{ pointerEvents: 'none' }}>
                            <div style={{
                                background: 'rgba(10,10,20,0.96)',
                                backdropFilter: 'blur(20px)',
                                border: `1px solid ${stage.color}50`,
                                borderRadius: '14px',
                                padding: '14px 20px',
                                minWidth: '160px',
                                boxShadow: `0 20px 60px rgba(0,0,0,0.5), 0 0 30px ${stage.color}20`,
                                fontFamily: 'Inter, sans-serif',
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                                    <div style={{
                                        width: '8px', height: '8px', borderRadius: '50%',
                                        background: stage.color, boxShadow: `0 0 10px ${stage.color}60`,
                                    }} />
                                    <span style={{ fontSize: '10px', fontWeight: 700, letterSpacing: '1.5px', color: stage.color, textTransform: 'uppercase' }}>
                                        {stage.name}
                                    </span>
                                </div>
                                <div style={{ fontSize: '26px', fontWeight: 900, color: '#fff', letterSpacing: '-1px', lineHeight: 1 }}>
                                    {stage.value}
                                </div>
                                <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.35)', marginTop: '4px', fontWeight: 500 }}>
                                    Conversion: {stage.pct}
                                </div>
                            </div>
                        </Html>
                    )}
                </group>
            );
        };

        /* ── Grid Floor ── */
        const GridFloor = () => (
            <mesh rotation={[-Math.PI / 2, 0, 0]} position={[0, -0.01, 0]}>
                <planeGeometry args={[20, 20, 30, 30]} />
                <meshBasicMaterial color="#818cf8" wireframe transparent opacity={0.03} />
            </mesh>
        );

        /* ── Floating Particles ── */
        const FloatingParticles = () => {
            const pointsRef = useRef();
            const count = 150;
            const positions = useMemo(() => {
                const arr = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    arr[i * 3] = (Math.random() - 0.5) * 14;
                    arr[i * 3 + 1] = Math.random() * 6;
                    arr[i * 3 + 2] = (Math.random() - 0.5) * 14;
                }
                return arr;
            }, []);

            useFrame((state) => {
                if (pointsRef.current) pointsRef.current.rotation.y = state.clock.elapsedTime * 0.02;
            });

            return (
                <points ref={pointsRef}>
                    <bufferGeometry>
                        <bufferAttribute attach="attributes-position" args={[positions, 3]} />
                    </bufferGeometry>
                    <pointsMaterial color="#818cf8" size={0.03} transparent opacity={0.35} sizeAttenuation />
                </points>
            );
        };

        /* ── Connecting Lines between bars ── */
        const ConnectingLines = () => {
            const lines = useMemo(() => {
                const result = [];
                for (let i = 0; i < stages.length - 1; i++) {
                    const gap = 2.0;
                    const x1 = (i - (stages.length - 1) / 2) * gap;
                    const x2 = (i + 1 - (stages.length - 1) / 2) * gap;
                    const points = [
                        new THREE.Vector3(x1, stages[i].barH, 0),
                        new THREE.Vector3((x1 + x2) / 2, (stages[i].barH + stages[i + 1].barH) / 2 + 0.3, 0),
                        new THREE.Vector3(x2, stages[i + 1].barH, 0),
                    ];
                    const curve = new THREE.QuadraticBezierCurve3(...points);
                    result.push(curve.getPoints(20));
                }
                return result;
            }, []);

            return (
                <>
                    {lines.map((pts, i) => (
                        <line key={i}>
                            <bufferGeometry>
                                <bufferAttribute
                                    attach="attributes-position"
                                    args={[new Float32Array(pts.flatMap(p => [p.x, p.y, p.z])), 3]}
                                />
                            </bufferGeometry>
                            <lineBasicMaterial color={stages[i].color} transparent opacity={0.2} />
                        </line>
                    ))}
                </>
            );
        };

        /* ── Main Scene ── */
        const Scene = () => {
            const [hoveredBar, setHoveredBar] = useState(null);

            return (
                <>
                    <ambientLight intensity={0.25} />
                    <directionalLight position={[5, 10, 5]} intensity={0.5} color="#e0e7ff" />
                    <directionalLight position={[-3, 6, -2]} intensity={0.2} color="#818cf8" />
                    <pointLight position={[0, 5, 4]} intensity={0.3} color="#34d399" distance={15} />

                    {stages.map((stage, i) => (
                        <FunnelBar
                            key={i}
                            stage={stage}
                            index={i}
                            hoveredBar={hoveredBar}
                            setHoveredBar={setHoveredBar}
                        />
                    ))}

                    <ConnectingLines />
                    <FloatingParticles />
                    <GridFloor />

                    <OrbitControls
                        enableZoom={false}
                        enablePan={false}
                        autoRotate
                        autoRotateSpeed={0.6}
                        maxPolarAngle={Math.PI / 2.2}
                        minPolarAngle={Math.PI / 5}
                    />
                </>
            );
        };

        /* ── Overlay UI ── */
        const OverlayUI = () => (
            <div className="absolute inset-0 pointer-events-none" style={{ fontFamily: "'Inter', sans-serif" }}>
                <div className="absolute top-8 left-8 right-8 flex items-start justify-between">
                    <div>
                        <div className="flex items-center gap-2 mb-2">
                            <div className="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#34d399]" />
                            <span className="text-[10px] font-bold uppercase tracking-[3px] text-green-400/70">Live Analytics</span>
                        </div>
                        <h2 className="text-2xl font-black text-white/90 tracking-tight">Conversion Pipeline</h2>
                        <p className="text-xs text-white/25 mt-1">Q4 2025 · All Channels</p>
                    </div>
                    <div className="text-right">
                        <div className="text-[10px] font-semibold uppercase tracking-[2px] text-white/20 mb-1">Overall CVR</div>
                        <div className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">1.9%</div>
                    </div>
                </div>

                <div className="absolute bottom-8 left-8 flex flex-col gap-2">
                    {stages.map((s, i) => (
                        <div key={i} className="flex items-center gap-2.5">
                            <div className="w-3 h-3 rounded-sm" style={{ background: s.color, boxShadow: `0 0 8px ${s.color}40` }} />
                            <span className="text-[11px] font-medium text-white/40">{s.name}</span>
                            <span className="text-[11px] font-bold text-white/60">{s.pct}</span>
                        </div>
                    ))}
                </div>

                <div className="absolute bottom-8 right-8">
                    <div className="px-4 py-2 rounded-full text-[10px] font-semibold uppercase tracking-[2px] text-white/15"
                         style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.05)' }}>
                        Hover bars · Drag to orbit
                    </div>
                </div>
            </div>
        );

        /* ── App ── */
        const App = () => (
            <div className="relative w-full h-full">
                <Canvas
                    camera={{ position: [4, 4, 7], fov: 38 }}
                    gl={{ antialias: true, alpha: true }}
                    style={{ background: 'radial-gradient(ellipse at center, #0f1020 0%, #08080c 70%)' }}
                >
                    <Scene />
                </Canvas>
                <OverlayUI />
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
