<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sculpted Progress Bar - Export Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a14;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            perspective: 1000px;
        }

        .progress-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-container {
            position: relative;
            width: 400px;
            height: 80px;
            background: linear-gradient(180deg, #1a1a2e, #0f0f1a);
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                inset 0 6px 12px rgba(0, 0, 0, 0.8),
                inset 0 2px 4px rgba(0, 0, 0, 0.6),
                inset 0 -2px 4px rgba(255, 255, 255, 0.02),
                0 4px 0 0 #0a0a14,
                0 6px 0 0 #050508,
                0 8px 20px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 0, 0, 0.5);
        }

        .progress-cavity {
            position: absolute;
            inset: 8px;
            background: linear-gradient(180deg, #0e0e18, #12121f);
            border-radius: 10px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.9);
        }

        .progress-fill {
            position: absolute;
            left: 8px;
            bottom: 8px;
            width: 0%;
            height: calc(100% - 16px);
            background: linear-gradient(180deg, #34d399, #10b981, #059669);
            border-radius: 10px;
            transition: none;
            box-shadow:
                0 -4px 0 0 #059669,
                0 -6px 0 0 #047857,
                0 -8px 0 0 #065f46,
                0 -2px 12px rgba(16, 185, 129, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 6px rgba(0, 0, 0, 0.3);
            transform-origin: bottom;
        }

        .progress-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            to {
                left: 100%;
            }
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 10%;
            right: 10%;
            height: 8px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent);
            border-radius: 10px 10px 0 0;
            filter: blur(2px);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .percentage {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #34d399, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="progress-wrapper">
        <div class="label">Loading Progress</div>

        <div class="progress-container" id="container">
            <div class="progress-cavity"></div>
            <div class="progress-fill" id="fill"></div>
        </div>

        <div class="status">
            <div class="percentage" id="percentage">0%</div>
        </div>
    </div>

    <script>
        const fill = document.getElementById('fill');
        const percentage = document.getElementById('percentage');

        let currentProgress = 0;
        const ANIMATION_DURATION = 3000;
        const DELAY_BEFORE_START = 500;
        const FPS = 60;
        const FRAME_DURATION = 1000 / FPS;
        const TOTAL_FRAMES = (ANIMATION_DURATION / FRAME_DURATION);
        const INCREMENT_PER_FRAME = 100 / TOTAL_FRAMES;

        function setProgress(value) {
            currentProgress = Math.max(0, Math.min(100, value));
            fill.style.width = `calc(${currentProgress}% - 16px)`;
            percentage.textContent = `${Math.round(currentProgress)}%`;
        }

        function animateProgress() {
            let frame = 0;

            const animate = () => {
                if (frame >= TOTAL_FRAMES) {
                    setProgress(100);
                    return;
                }

                currentProgress = frame * INCREMENT_PER_FRAME;
                setProgress(currentProgress);
                frame++;

                requestAnimationFrame(animate);
            };

            requestAnimationFrame(animate);
        }

        setTimeout(() => {
            animateProgress();
        }, DELAY_BEFORE_START);
    </script>
</body>

</html>
