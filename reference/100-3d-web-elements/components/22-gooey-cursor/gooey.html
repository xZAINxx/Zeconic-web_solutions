<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gooey Cursor Blob</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0a12;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── SVG FILTER TRICK: blur + contrast = metaball merge ── */
    .goo-filter {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
      /* The magic: blur individual blobs, then contrast snaps them into liquid edges */
      filter: blur(14px) contrast(28);
    }

    .blob-main {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #a78bfa, #6366f1);
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    .blob-trail {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c084fc, #8b5cf6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    /* Click blobs that split off */
    .blob-click {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f0abfc, #a855f7);
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    /* ── SHARP-RENDERED LAYER (above filter) ── */
    /* The cursor ring is outside the goo-filter so it stays crisp */
    .cursor-ring {
      position: fixed;
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(167, 139, 250, 0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1000;
      transition: width 0.1s ease, height 0.1s ease, border-color 0.2s ease;
      will-change: transform;
    }
    .cursor-ring.clicking {
      width: 36px; height: 36px;
      border-color: rgba(240, 171, 252, 0.9);
    }

    /* ── PAGE CONTENT ── */
    .content {
      position: relative; z-index: 10;
      text-align: center; padding: 40px;
      pointer-events: none;
    }
    .eyebrow {
      font-size: 10px; letter-spacing: 4px;
      color: rgba(255,255,255,0.2); text-transform: uppercase; margin-bottom: 16px;
    }
    .headline {
      font-size: clamp(2.5rem, 6vw, 3.8rem);
      font-weight: 900; letter-spacing: -2px;
      color: white; line-height: 1.05; margin-bottom: 20px;
    }
    .headline em {
      background: linear-gradient(135deg, #a78bfa, #f0abfc, #67e8f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-style: normal;
    }
    .body-text {
      font-size: 14px; color: rgba(255,255,255,0.3); line-height: 1.7;
      max-width: 400px; margin: 0 auto 30px;
    }

    /* Clickable zone (restores mouse for interaction) */
    .click-zone {
      pointer-events: all;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 28px; border-radius: 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }
    .click-zone:hover {
      background: rgba(139,92,246,0.1);
      border-color: rgba(139,92,246,0.3);
      color: rgba(167,139,250,0.9);
    }

    .hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.12);
      text-transform: uppercase; pointer-events: none; z-index: 10;
    }

    /* Background orbs */
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.06; pointer-events: none;
    }
    .bg-orb1 { width:400px; height:400px; background:#6366f1; top:-100px; left:-100px; }
    .bg-orb2 { width:300px; height:300px; background:#a855f7; bottom:-80px; right:-80px; }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<!-- Cursor ring (sharp, above filter) -->
<div class="cursor-ring" id="cursorRing"></div>

<!-- GOO FILTER WRAPPER — all blobs inside here get metaball merge effect -->
<div class="goo-filter" id="gooFilter">
  <div class="blob-main"  id="blobMain"></div>
  <div class="blob-trail" id="blobTrail1" style="width:30px;height:30px;"></div>
  <div class="blob-trail" id="blobTrail2" style="width:22px;height:22px;"></div>
  <div class="blob-trail" id="blobTrail3" style="width:16px;height:16px;"></div>
</div>

<!-- Page content -->
<div class="content">
  <div class="eyebrow">CSS Metaballs · SVG Filter Trick</div>
  <h1 class="headline">Liquid<br/><em>Mercury</em></h1>
  <p class="body-text">
    The gooey merge effect uses <code style="color:#a78bfa">filter: blur(14px) contrast(28)</code>
    on a wrapper div — no WebGL, no Canvas, zero GPU shader overhead.
  </p>
  <button class="click-zone" id="clickBtn">✦ Click to split</button>
</div>

<div class="hint">move cursor · click to explode blobs</div>

<script>
  const ring       = document.getElementById('cursorRing');
  const blobMain   = document.getElementById('blobMain');
  const trails     = [
    document.getElementById('blobTrail1'),
    document.getElementById('blobTrail2'),
    document.getElementById('blobTrail3'),
  ];
  const gooFilter  = document.getElementById('gooFilter');

  // Current positions
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let mainX = mx, mainY = my;

  // Trail delays: each trails a fraction behind the main blob
  const trailPos = trails.map(() => ({ x: mx, y: my }));
  const trailLag = [0.10, 0.065, 0.045]; // heavier = more lag

  // Click blobs state
  const clickBlobs = [];

  function lerp(a, b, t) { return a + (b - a) * t; }

  // Mouse / touch tracking
  document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
  document.addEventListener('touchmove', (e) => {
    mx = e.touches[0].clientX; my = e.touches[0].clientY;
  }, { passive: true });

  // ── CLICK: split into 3 extra blobs ──
  document.addEventListener('click', (e) => {
    ring.classList.add('clicking');
    setTimeout(() => ring.classList.remove('clicking'), 300);

    // Spawn 3 click blobs that fly out and shrink
    for (let i = 0; i < 3; i++) {
      const el = document.createElement('div');
      el.className = 'blob-click';
      const size = 18 + Math.random() * 16;
      el.style.cssText = `width:${size}px;height:${size}px;`;
      gooFilter.appendChild(el);

      const angle  = (i / 3) * Math.PI * 2 + Math.random() * 0.5;
      const speed  = 4 + Math.random() * 3;
      const vx     = Math.cos(angle) * speed;
      const vy     = Math.sin(angle) * speed;
      let   bx     = mx, by = my;
      let   life   = 0;
      const maxLife = 55 + Math.floor(Math.random() * 20);

      clickBlobs.push({ el, vx, vy, bx, by, life, maxLife, size });
    }
  });

  // ── RAF ANIMATION LOOP ──
  function animate() {
    requestAnimationFrame(animate);

    // Main blob — snaps fairly tight to cursor
    mainX = lerp(mainX, mx, 0.20);
    mainY = lerp(mainY, my, 0.20);
    blobMain.style.left = mainX + 'px';
    blobMain.style.top  = mainY + 'px';

    // Cursor ring tracks at same speed
    ring.style.left = mainX + 'px';
    ring.style.top  = mainY + 'px';

    // Trails — each lags behind the previous
    let prevX = mainX, prevY = mainY;
    trails.forEach((t, i) => {
      trailPos[i].x = lerp(trailPos[i].x, prevX, trailLag[i]);
      trailPos[i].y = lerp(trailPos[i].y, prevY, trailLag[i]);
      t.style.left = trailPos[i].x + 'px';
      t.style.top  = trailPos[i].y + 'px';
      prevX = trailPos[i].x;
      prevY = trailPos[i].y;
    });

    // Click blobs — fly out, shrink, and self-remove
    for (let i = clickBlobs.length - 1; i >= 0; i--) {
      const b = clickBlobs[i];
      b.life++;
      b.bx += b.vx;
      b.by += b.vy;
      b.vy += 0.25; // gravity
      b.vx *= 0.92; // air resistance

      const progress = b.life / b.maxLife;
      const scale    = Math.max(0, 1 - progress * 1.1);
      const size     = b.size * scale;

      b.el.style.left   = b.bx + 'px';
      b.el.style.top    = b.by + 'px';
      b.el.style.width  = size + 'px';
      b.el.style.height = size + 'px';

      if (b.life >= b.maxLife) {
        b.el.remove();
        clickBlobs.splice(i, 1);
      }
    }
  }

  animate();
</script>
</body>
</html>
