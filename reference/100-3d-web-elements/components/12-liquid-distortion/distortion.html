<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquid Image Distortion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .frame {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
    }
    #canvas-container {
      width: 340px;
      height: 280px;
      cursor: crosshair;
    }
    canvas { display: block; }
    .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 18px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .label-title {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }
    .label-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .wave-indicator {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(99, 179, 237, 0.6);
      text-transform: uppercase;
    }
    .hint-text {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="frame">
  <div id="canvas-container"></div>
  <div class="label">
    <div>
      <div class="label-title">Fluid Canvas</div>
      <div class="label-sub">Liquid Distortion Shader</div>
    </div>
    <div class="wave-indicator">GPU · GLSL</div>
  </div>
</div>

<p class="hint-text">‹ Move cursor over image ›</p>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('canvas-container');
const W = container.clientWidth;
const H = container.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(W, H);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// Vertex shader — passthrough
const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
  }
`;

// Fragment shader — liquid ripple distortion
const fragmentShader = `
  uniform sampler2D uTexture;
  uniform vec2 uMouse;
  uniform float uTime;
  uniform float uHover;
  varying vec2 vUv;

  void main() {
    vec2 uv = vUv;

    // Distance from mouse in UV space
    vec2 delta = uv - uMouse;
    float dist = length(delta);

    // Wave ripple: sin wave spreading from mouse center
    float rippleRadius = 0.35;
    float rippleStrength = uHover * 0.032;
    float rippleSpeed = 4.0;
    float wave = sin(dist * 28.0 - uTime * rippleSpeed) * rippleStrength;

    // Attenuate effect by distance (sharp near mouse, fades away)
    float attenuation = smoothstep(rippleRadius, 0.0, dist);
    wave *= attenuation;

    // Additional turbulence for fluid feel
    float turbulence = sin(uv.x * 12.0 + uTime * 1.5) * sin(uv.y * 10.0 + uTime * 1.2) * 0.006 * uHover;

    // Displace UV
    vec2 displacementDir = normalize(delta + vec2(0.0001));
    uv += displacementDir * wave + turbulence;

    // Edge clamping
    uv = clamp(uv, 0.001, 0.999);

    vec4 color = texture2D(uTexture, uv);

    // Chromatic aberration near mouse
    float aberration = attenuation * uHover * 0.008;
    float r = texture2D(uTexture, uv + vec2( aberration, 0.0)).r;
    float g = color.g;
    float b = texture2D(uTexture, uv + vec2(-aberration, 0.0)).b;

    gl_FragColor = vec4(r, g, b, 1.0);
  }
`;

// Load image texture
const loader = new THREE.TextureLoader();
const texture = loader.load(
  'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=680&h=560&fit=crop&auto=format&q=85',
  () => { needsRender = true; }
);
texture.minFilter = THREE.LinearFilter;
texture.magFilter = THREE.LinearFilter;

const uniforms = {
  uTexture: { value: texture },
  uMouse:   { value: new THREE.Vector2(0.5, 0.5) },
  uTime:    { value: 0.0 },
  uHover:   { value: 0.0 },
};

// PlaneGeometry — fills orthographic camera
const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms,
});

scene.add(new THREE.Mesh(geometry, material));

// Mouse tracking — normalized UV coords
let targetHover = 0;
let targetMX = 0.5, targetMY = 0.5;
let currentHover = 0, currentMX = 0.5, currentMY = 0.5;
let needsRender = true;

container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  targetMX = (e.clientX - rect.left) / rect.width;
  targetMY = 1.0 - (e.clientY - rect.top) / rect.height;
  needsRender = true;
});

container.addEventListener('mouseenter', () => { targetHover = 1.0; needsRender = true; });
container.addEventListener('mouseleave', () => { targetHover = 0.0; needsRender = true; });

const clock = new THREE.Clock();

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  uniforms.uTime.value += delta;

  // Smooth mouse position
  currentMX = lerp(currentMX, targetMX, 0.07);
  currentMY = lerp(currentMY, targetMY, 0.07);
  currentHover = lerp(currentHover, targetHover, 0.05);

  uniforms.uMouse.value.set(currentMX, currentMY);
  uniforms.uHover.value = currentHover;

  // Always render while distorting
  if (currentHover > 0.01 || Math.abs(currentMX - targetMX) > 0.001) {
    needsRender = true;
  }

  if (needsRender) {
    renderer.render(scene, camera);
    needsRender = currentHover > 0.01;
  }
}

animate();
</script>
</body>
</html>
