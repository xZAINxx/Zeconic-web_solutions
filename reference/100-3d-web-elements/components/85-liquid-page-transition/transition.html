<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flawless Page Wipe Transition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #0f172a; }
        .router-mask {
            clip-path: circle(0% at 50% 50%);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        // Fake Page Content 1
        const HomePage = ({ navigate }) => (
            <div className="w-full h-screen flex flex-col items-center justify-center relative p-8 bg-slate-50">
                <div className="w-32 h-32 bg-indigo-600 rounded-full mb-8 shadow-2xl flex items-center justify-center font-black text-white text-5xl">1</div>
                <h1 className="text-6xl md:text-8xl font-black text-slate-800 tracking-tighter mb-4 text-center">Home Protocol</h1>
                <p className="text-slate-500 mb-12 max-w-lg text-center font-mediumtext-lg">Click the button below to initiate a total DOM tear down. It triggers an absolute geometric SVG eclipse mask transition.</p>
                <button 
                    onClick={() => navigate('dash')} 
                    className="px-10 py-5 bg-indigo-600 text-white font-bold tracking-tight rounded-full shadow-[0_20px_40px_rgba(79,70,229,0.4)] hover:scale-105 transition-transform active:scale-95 text-xl"
                >
                    Initialize Warp to Dashboard
                </button>
            </div>
        );

        // Fake Page Content 2
        const DashboardPage = ({ navigate }) => (
            <div className="w-full h-screen flex flex-col items-center justify-center relative p-8 bg-slate-900 border-[8px] border-emerald-500/20">
                <div className="w-32 h-32 bg-emerald-500 rounded-3xl mb-8 shadow-[0_0_50px_rgba(16,185,129,0.5)] flex items-center justify-center font-black text-slate-900 text-5xl transform rotate-12">2</div>
                <h1 className="text-6xl md:text-8xl font-black text-white tracking-tighter mb-4 text-center">Engine Room</h1>
                <p className="text-emerald-500 mb-12 max-w-lg text-center font-bold tracking-widest uppercase">Target Unlocked.</p>
                <button 
                    onClick={() => navigate('home')} 
                    className="px-10 py-5 bg-white text-slate-900 font-black tracking-tight rounded-full shadow-xl hover:scale-105 transition-transform active:scale-95 text-xl"
                >
                    Return to Home Protocol
                </button>
            </div>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            // State Machine for the Wipe: 'idle', 'wiping-in', 'wiping-out'
            const [wipeState, setWipeState] = useState('idle');

            // Hard orchestration: Prevent double clicking and overlapping React render cycles
            const handleNavigate = (target) => {
                if (wipeState !== 'idle') return; 
                
                // 1. Drop the blackout curtain down
                setWipeState('wiping-in');

                // 2. Wait exactly for the animation to cover the screen entirely, THEN swap the DOM beneath it
                setTimeout(() => {
                    setCurrentPage(target);
                    // 3. Immediately tell it to wipe out to reveal the new page
                    setWipeState('wiping-out');
                    
                    // 4. Reset machine after it vanishes
                    setTimeout(() => {
                        setWipeState('idle');
                    }, 800);
                }, 800); // 800ms perfectly matches the Framer Motion duration
            };

            return (
                <div className="relative w-full h-screen">
                    
                    {/* The Currently Rendered DOM Page */}
                    {/* By completely bypassing AnimatePresence and orchestrating it manually via setTimeout, we permanently eliminate ALL flickering React bugs associated with concurrent routing. */}
                    {currentPage === 'home' && <HomePage navigate={handleNavigate} />}
                    {currentPage === 'dash' && <DashboardPage navigate={handleNavigate} />}

                    {/* THE GLOBAL TRANSITION MASK */}
                    {/* It starts invisibly collapsed at 0% radius in the absolute center. 
                        It expands to 150% (covering the corners of any screen size) using pure CSS clipping geometry. */}
                    <motion.div
                        className="fixed inset-0 z-50 bg-black pointer-events-none"
                        animate={{
                            // If we are wiping IN to obscure the screen, scale up to 150% radius.
                            // If idle or wiping out, collapse down to 0% radius instantly.
                            clipPath: wipeState === 'wiping-in' ? "circle(150% at 50% 50%)" 
                                    : wipeState === 'wiping-out' ? "circle(0% at 50% 50%)" 
                                    : "circle(0% at 50% 50%)"
                        }}
                        transition={{ 
                            duration: 0.8, 
                            ease: [0.77, 0, 0.17, 1] // Custom snappy bezier curve (ease-in-out-expo behavior)
                        }}
                    >
                        {/* A nice little spinner or text during the blackout */}
                        <div className="w-full h-full flex items-center justify-center">
                            <h2 className="text-white font-black tracking-widest uppercase opacity-30 text-2xl animate-pulse">Routing Vectors...</h2>
                        </div>
                    </motion.div>

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
