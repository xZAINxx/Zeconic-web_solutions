<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Text Stagger Reveal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; background: #fafaf9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tall-container { min-height: 200vh; }
        .word-wrapper { display: inline-flex; overflow: hidden; vertical-align: bottom; }
        
        /* Perspective is critical for the heavy rotation effect */
        .perspective-text { perspective: 1200px; transform-style: preserve-3d; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';

        const SplitText = ({ text }) => {
            // Split the raw string into an array of individual words mathematically
            const words = text.split(" ");

            // Parent variants (The Orchestrator)
            const containerVariants = {
                hidden: {},
                visible: {
                    transition: {
                        staggerChildren: 0.08, // Time delay between each word dropping in
                        delayChildren: 0.1,    // Wait X before firing first word
                    }
                }
            };

            // Child variants (The Physical Node itself)
            const childVariants = {
                hidden: {
                    y: "120%", // Completely translated below the masking baseline
                    rotateX: -40, // Tilted heavily upward into the Z-axis
                    opacity: 0,
                    scale: 0.9
                },
                visible: {
                    y: "0%", // Snap to zero baseline
                    rotateX: 0, // Flatten out rigidly
                    opacity: 1,
                    scale: 1,
                    transition: {
                        type: "spring",
                        damping: 12,
                        stiffness: 80,
                        mass: 0.8 // Heavy solid mass
                    }
                }
            };

            return (
                <motion.div
                    className="flex flex-wrap gap-x-4 gap-y-2 justify-center perspective-text"
                    variants={containerVariants}
                    // Trigger the sequence natively exactly when 50% of this parent enters the viewport
                    initial="hidden"
                    whileInView="visible"
                    viewport={{ once: true, amount: 0.5 }}
                >
                    {words.map((word, index) => (
                        // Each word MUST be wrapped in an overflow-hidden standard div first!
                        // This acts as a physical 'mask' or 'clipper' that the text emerges upwards from
                        <div key={index} className="word-wrapper pb-2">
                            <motion.span
                                className="inline-block origin-bottom break-words whitespace-pre-wrap"
                                variants={childVariants}
                            >
                                {word}
                            </motion.span>
                        </div>
                    ))}
                </motion.div>
            );
        };

        const App = () => {
            return (
                <div className="w-full tall-container flex flex-col items-center">
                    
                    <div className="w-full h-[60vh] flex flex-col items-center justify-end pb-32 bg-slate-100">
                        <h2 className="text-3xl font-black text-slate-800 tracking-tighter uppercase mb-4">Start Scaling.</h2>
                        <div className="text-slate-500 font-bold uppercase tracking-widest text-sm flex gap-4 animate-bounce">
                            <span>Scroll Down Base</span> 
                            <span>↓</span>
                        </div>
                    </div>

                    <div className="py-40 px-8 max-w-5xl mx-auto text-center">
                        <div className="text-7xl md:text-[110px] font-black tracking-tighter text-slate-900 leading-[0.85]">
                            {/* Execute the Split Text Engine! */}
                            <SplitText text="The definitive industry standard for premium kinetic typography." />
                        </div>
                    </div>
                    
                    <div className="py-20 px-8 max-w-3xl mx-auto text-center">
                        <div className="text-3xl font-bold tracking-tight text-slate-500 leading-tight">
                            <SplitText text="Framer Motion's staggerChildren orchestrator systematically cycles through an array of DOM text nodes wrapped tightly inside overflow-hidden masks. Each word is mathematically yanked to the 0px baseline via a heavily damped spring translation." />
                        </div>
                    </div>

                    {/* Button trigger */}
                    <div className="w-full flex justify-center pb-40">
                        <motion.button 
                            className="px-8 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl hover:scale-105 transition-transform"
                            initial={{ opacity: 0, y: 30 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true, amount: 1 }}
                            transition={{ delay: 0.8, duration: 0.6 }}
                        >
                            Orchestrate Load
                        </motion.button>
                    </div>

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
