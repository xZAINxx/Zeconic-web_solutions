<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Product Smartphone Scrollytelling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; background: #fafaf9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .trigger-track { height: 400vh; position: relative; }
        /* The sticky component holding the phone chassis fixed at dead center */
        .pin-frame { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .mockup-chassis {
            width: 320px;
            height: 650px;
            background: #ffffff;
            border: 14px solid #0f172a;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1), inset 0 0 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* The dynamic island hardware hole cutout */
        .hardware-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: #0f172a;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useTransform, useSpring } from 'framer-motion';

        const ProductPhoneShowcase = () => {
            const trackRef = useRef(null);

            // Hook exactly to the 400vh height track.
            const { scrollYProgress } = useScroll({
                target: trackRef,
                offset: ["start start", "end end"]
            });

            // Very fast snapping dampening to make the app screens feel locked into standard DOM frames
            const smooth = useSpring(scrollYProgress, { damping: 40, stiffness: 200 });

            // ----------------------------------------------------------------------------------------
            // SCREEN REVEAL VECTORS. 
            // The smartphone screen physically slides components UP from out of view sequentially.
            // Screen 1: Present immediately (0 -> 100)
            // Screen 2: Slides up strictly between 20% and 40% of the scroll track. Stops perfectly at 0%.
            // Screen 3: Slides up strictly between 50% and 70%. Stops at 0%.
            // Screen 4: Slides up strictly between 80% and 100%. Stops at 0%.
            // ----------------------------------------------------------------------------------------
            const s2Y = useTransform(smooth, [0.2, 0.4], ["100%", "0%"]);
            const s3Y = useTransform(smooth, [0.5, 0.7], ["100%", "0%"]);
            const s4Y = useTransform(smooth, [0.8, 1], ["100%", "0%"]);

            // ----------------------------------------------------------------------------------------
            // UI CONTEXT FADING VECTORS.
            // Synchronizes the massive background typography fading in alongside the physical app screens.
            // ----------------------------------------------------------------------------------------
            const t1Opacity = useTransform(smooth, [0, 0.1, 0.3], [1, 1, 0]);
            const t2Opacity = useTransform(smooth, [0.25, 0.35, 0.55], [0, 1, 0]);
            const t3Opacity = useTransform(smooth, [0.55, 0.65, 0.85], [0, 1, 0]);
            const t4Opacity = useTransform(smooth, [0.85, 0.95], [0, 1]);


            return (
                <div ref={trackRef} className="trigger-track w-full">
                    <div className="pin-frame bg-slate-50">

                        {/* --- THE MASSIVE NARRATIVE TYPOGRAPHY IN THE BACKGROUND --- */}
                        <div className="absolute inset-0 flex flex-col justify-center px-[5vw] pointer-events-none z-0">
                            
                            <motion.div className="absolute" style={{ opacity: t1Opacity }}>
                                <div className="text-4xl text-slate-300 font-bold uppercase tracking-widest mb-4">Phase 01</div>
                                <h1 className="text-[140px] font-black tracking-tighter text-slate-900 leading-none">Security<br/>Dashboard.</h1>
                            </motion.div>

                            <motion.div className="absolute" style={{ opacity: t2Opacity }}>
                                <div className="text-4xl text-emerald-400 font-bold uppercase tracking-widest mb-4">Phase 02</div>
                                <h1 className="text-[140px] font-black tracking-tighter text-emerald-500 leading-none">Financial<br/>Routing.</h1>
                            </motion.div>

                            <motion.div className="absolute" style={{ opacity: t3Opacity }}>
                                <div className="text-4xl text-sky-400 font-bold uppercase tracking-widest mb-4">Phase 03</div>
                                <h1 className="text-[140px] font-black tracking-tighter text-sky-500 leading-none">Global<br/>Analytics.</h1>
                            </motion.div>

                            <motion.div className="absolute" style={{ opacity: t4Opacity }}>
                                <div className="text-4xl text-rose-400 font-bold uppercase tracking-widest mb-4">Phase 04</div>
                                <h1 className="text-[140px] font-black tracking-tighter text-rose-500 leading-none">Profile<br/>Settings.</h1>
                            </motion.div>

                        </div>


                        {/* --- THE PHYSICAL PHONE CHASSIS --- */}
                        {/* Sat squarely in the center of the Z-indexing above the typography. */}
                        <div className="mockup-chassis z-10 shadow-2xl">
                            <div className="hardware-notch shadow"></div>

                            {/* SCREEN 1: Default Base */}
                            <div className="absolute inset-0 bg-slate-100 p-6 pt-20 flex flex-col items-center">
                                <div className="w-20 h-20 bg-slate-900 rounded-2xl mb-6 shadow-xl flex items-center justify-center">
                                    <svg className="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-900 mb-8">System Secured</h2>
                                <div className="space-y-4 w-full px-2">
                                    <div className="w-full h-12 bg-white rounded-xl shadow-sm border border-slate-200"></div>
                                    <div className="w-full h-12 bg-white rounded-xl shadow-sm border border-slate-200"></div>
                                    <div className="w-full h-32 bg-white rounded-xl shadow-sm border border-slate-200 mt-4"></div>
                                </div>
                            </div>

                            {/* SCREEN 2: Slides over Screen 1 */}
                            <motion.div 
                                className="absolute inset-0 bg-emerald-500 p-6 pt-20 flex flex-col items-center shadow-[0_-20px_30px_rgba(0,0,0,0.2)]"
                                style={{ y: s2Y }}
                            >
                                <div className="w-full flex justify-between items-center mb-12">
                                    <div className="font-black text-emerald-950 text-xl tracking-tighter">Finance</div>
                                    <div className="w-10 h-10 bg-emerald-400 rounded-full border-2 border-emerald-300"></div>
                                </div>
                                <div className="text-[60px] font-black text-white tracking-tighter leading-none mb-2">$40,294</div>
                                <div className="text-emerald-200 font-bold mb-12">+ $2,400 Today</div>
                                <div className="space-y-4 w-full">
                                    <div className="w-full h-20 bg-emerald-600/50 rounded-2xl flex items-center px-4"><div className="w-12 h-12 bg-white/20 rounded-full"></div></div>
                                    <div className="w-full h-20 bg-emerald-600/50 rounded-2xl flex items-center px-4"><div className="w-12 h-12 bg-white/20 rounded-full"></div></div>
                                </div>
                            </motion.div>

                            {/* SCREEN 3: Slides over Screen 2 */}
                            <motion.div 
                                className="absolute inset-0 bg-slate-900 p-6 pt-20 flex flex-col shadow-[0_-20px_30px_rgba(0,0,0,0.4)]"
                                style={{ y: s3Y }}
                            >
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tighter">Traffic</h2>
                                <p className="text-slate-400 font-medium mb-8">Last 30 Days Context.</p>
                                
                                <div className="w-full h-48 bg-slate-800 rounded-3xl mb-6 shadow-inner relative overflow-hidden border border-slate-700">
                                    {/* Artificial Chart Graphics */}
                                    <div className="absolute bottom-0 left-0 w-1/4 h-12 bg-sky-500/50 rounded-t-lg"></div>
                                    <div className="absolute bottom-0 left-1/4 w-1/4 h-24 bg-sky-500/80 rounded-t-lg"></div>
                                    <div className="absolute bottom-0 left-2/4 w-1/4 h-16 bg-sky-500/60 rounded-t-lg"></div>
                                    <div className="absolute bottom-0 left-3/4 w-1/4 h-32 bg-sky-400 rounded-t-lg"></div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="h-24 bg-slate-800 rounded-2xl border border-slate-700 p-4 font-bold text-white"><div className="text-sm text-slate-500">Sessions</div>+40%</div>
                                    <div className="h-24 bg-slate-800 rounded-2xl border border-slate-700 p-4 font-bold text-white"><div className="text-sm text-slate-500">Bounce</div>-12%</div>
                                </div>
                            </motion.div>

                            {/* SCREEN 4: Slides over Screen 3 (Final Layer) */}
                            <motion.div 
                                className="absolute inset-0 bg-white p-6 pt-20 flex flex-col shadow-[0_-20px_30px_rgba(0,0,0,0.2)]"
                                style={{ y: s4Y }}
                            >
                                <div className="w-full flex flex-col items-center border-b border-slate-200 pb-8 mb-8">
                                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" className="w-24 h-24 rounded-full border-4 border-white shadow-xl mb-4" />
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tighter">Alice V.</h2>
                                    <p className="text-slate-500 font-medium">Administrator</p>
                                </div>
                                <div className="w-full bg-slate-100 rounded-2xl py-2 flex flex-col">
                                    <div className="px-6 py-4 border-b border-slate-200 font-bold text-slate-700">Account Bounds</div>
                                    <div className="px-6 py-4 border-b border-slate-200 font-bold text-slate-700">System Preferences</div>
                                    <div className="px-6 py-4 font-bold text-rose-500">Initialize Sign Out</div>
                                </div>
                            </motion.div>

                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (
            <div className="w-full flex flex-col items-center">
                
                <div className="h-screen w-full bg-slate-100 flex flex-col items-center justify-center px-6">
                    <h1 className="text-7xl md:text-[120px] font-black text-slate-900 tracking-tighter text-center leading-[0.9] drop-shadow-xl mb-8">
                        The ultimate<br/>app showcase.
                    </h1>
                    <p className="text-2xl text-slate-500 font-medium max-w-2xl text-center leading-relaxed">
                        Say goodbye to generic horizontal blocks. We've built an interactive, scroll-driven physical smartphone simulator perfectly synchronized with massive typography layouts.
                    </p>
                    <div className="mt-16 animate-bounce text-3xl font-black text-slate-400">↓</div>
                </div>
                
                <ProductPhoneShowcase />
                
                <div className="h-screen w-full bg-slate-950 flex justify-center items-center text-center">
                    <h1 className="text-6xl text-white font-black tracking-tighter">End of Sequence.</h1>
                </div>
                
            </div>
        );

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
