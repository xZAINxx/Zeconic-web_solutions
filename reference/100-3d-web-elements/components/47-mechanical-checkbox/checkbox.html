<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mechanical Checkbox</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0a0a0f; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const MechanicalCheckbox = ({ label, color = 'cyan' }) => {
            const [checked, setChecked] = useState(false);
            const [ripple, setRipple] = useState(false);

            const colors = {
                cyan:   { glow: '#06b6d4', dim: '#0e7490', text: '#67e8f9', ring: '#164e63' },
                green:  { glow: '#22c55e', dim: '#15803d', text: '#86efac', ring: '#14532d' },
                violet: { glow: '#a855f7', dim: '#7e22ce', text: '#d8b4fe', ring: '#3b0764' },
            };
            const c = colors[color];

            const handleClick = () => {
                setChecked(v => !v);
                setRipple(true);
                setTimeout(() => setRipple(false), 600);
            };

            return (
                <div className="flex items-center gap-5 select-none cursor-pointer" onClick={handleClick}>
                    {/* The switch housing */}
                    <div style={{ perspective: '300px' }}>
                        <motion.div
                            className="relative flex items-center justify-center rounded-xl"
                            style={{
                                width: 60, height: 60,
                                background: checked
                                    ? `linear-gradient(145deg, ${c.dim}, #0a0a0f)`
                                    : 'linear-gradient(145deg, #1e1e2e, #111118)',
                                boxShadow: checked
                                    ? `inset 4px 4px 10px rgba(0,0,0,0.7), inset -2px -2px 6px rgba(255,255,255,0.04), 0 0 20px ${c.glow}55`
                                    : '4px 4px 10px rgba(0,0,0,0.6), -2px -2px 8px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08)',
                                border: `2px solid ${checked ? c.ring : '#2a2a3a'}`,
                            }}
                            animate={{
                                y: checked ? 4 : 0,
                                rotateX: checked ? 8 : 0,
                                scale: checked ? 0.96 : 1,
                            }}
                            transition={{ type: 'spring', stiffness: 600, damping: 25 }}
                        >
                            {/* Ripple */}
                            <AnimatePresence>
                                {ripple && (
                                    <motion.div
                                        className="absolute rounded-xl pointer-events-none"
                                        style={{ background: `${c.glow}44`, inset: 0 }}
                                        initial={{ scale: 1, opacity: 0.8 }}
                                        animate={{ scale: 2.8, opacity: 0 }}
                                        exit={{ opacity: 0 }}
                                        transition={{ duration: 0.55, ease: 'easeOut' }}
                                    />
                                )}
                            </AnimatePresence>

                            {/* LED glow ring */}
                            {checked && (
                                <motion.div
                                    className="absolute rounded-xl pointer-events-none"
                                    style={{ inset: -2, border: `2px solid ${c.glow}`, borderRadius: 14 }}
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: [0, 1, 0.6] }}
                                    transition={{ duration: 0.3 }}
                                />
                            )}

                            {/* Checkmark SVG */}
                            <motion.svg
                                viewBox="0 0 24 24"
                                fill="none"
                                style={{ width: 28, height: 28 }}
                                animate={{ opacity: checked ? 1 : 0, scale: checked ? 1 : 0.4, rotateZ: checked ? 0 : -45 }}
                                transition={{ type: 'spring', stiffness: 500, damping: 22 }}
                            >
                                <motion.path
                                    d="M4 12.5L9.5 18L20 7"
                                    stroke={c.glow}
                                    strokeWidth="2.5"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    initial={{ pathLength: 0 }}
                                    animate={{ pathLength: checked ? 1 : 0 }}
                                    transition={{ duration: 0.25, delay: checked ? 0.05 : 0 }}
                                    style={{ filter: `drop-shadow(0 0 6px ${c.glow})` }}
                                />
                            </motion.svg>
                        </motion.div>
                    </div>

                    <div>
                        <motion.p
                            className="text-base font-semibold"
                            animate={{ color: checked ? c.text : '#94a3b8' }}
                        >
                            {label}
                        </motion.p>
                        <p className="text-xs text-slate-600 mt-0.5">Click to toggle</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="flex flex-col items-start gap-10 p-12 rounded-3xl"
                    style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', backdropFilter: 'blur(10px)' }}>
                    <div className="mb-2">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-600 mb-1">Keyboard Switch UI</p>
                        <h1 className="text-3xl font-bold text-white">Mechanical Checkbox</h1>
                    </div>
                    <MechanicalCheckbox label="Enable Real-Time Sync" color="cyan" />
                    <MechanicalCheckbox label="Hardware Acceleration" color="green" />
                    <MechanicalCheckbox label="Deep Focus Mode" color="violet" />
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
