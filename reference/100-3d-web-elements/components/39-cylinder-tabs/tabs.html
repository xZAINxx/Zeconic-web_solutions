<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Swipeable Card Stack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const CARDS = [
            { id: 1, name: 'Marcus Chen', role: 'Lead Engineer @ Stripe', avatar: '👨‍💻', quote: '"This component library completely transformed how we approach UI. The 3D interactions feel native and buttery smooth."', color: '#8b5cf6' },
            { id: 2, name: 'Sarah Kim', role: 'Design Director @ Figma', avatar: '👩‍🎨', quote: '"I have never seen DOM elements move this fluidly. The spring physics feel like they belong in a AAA game engine."', color: '#ec4899' },
            { id: 3, name: 'Alex Rivera', role: 'CTO @ Vercel', avatar: '🧑‍🚀', quote: '"Zero WebGL overhead for the CSS components is genius. We ship these to production without any performance anxiety."', color: '#06b6d4' },
            { id: 4, name: 'Priya Patel', role: 'Frontend Architect @ Netflix', avatar: '👩‍💼', quote: '"The procedural 3D generation approach means zero external assets. Our lighthouse scores actually went UP after integrating these."', color: '#f59e0b' },
            { id: 5, name: 'James O\'Brien', role: 'VP of Product @ Linear', avatar: '🧔', quote: '"Every component feels like it was designed by someone who truly understands both engineering and aesthetics."', color: '#10b981' },
        ];

        const CardStack = () => {
            const [cards, setCards] = useState(CARDS);

            const removeTopCard = (direction) => {
                setCards(prev => {
                    const [removed, ...rest] = prev;
                    // Put the removed card at the bottom
                    return [...rest, removed];
                });
            };

            return (
                <div className="flex flex-col items-center gap-8">
                    {/* Title */}
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-500 mb-1">Drag to Dismiss</p>
                        <h2 className="text-2xl font-bold text-white">3D Card Stack</h2>
                    </div>

                    {/* Card Stack Area */}
                    <div className="relative w-80 h-72" style={{ perspective: '1200px' }}>
                        <AnimatePresence>
                            {cards.slice(0, 4).map((card, i) => {
                                const isTop = i === 0;
                                return (
                                    <motion.div
                                        key={card.id}
                                        className="absolute inset-0 rounded-2xl p-6 cursor-grab active:cursor-grabbing select-none"
                                        style={{
                                            background: `linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98))`,
                                            border: `1px solid ${card.color}33`,
                                            boxShadow: `0 ${4 + i * 2}px ${20 + i * 10}px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05)`,
                                            zIndex: cards.length - i,
                                            transformStyle: 'preserve-3d',
                                        }}
                                        initial={{ scale: 0.9, y: 30, opacity: 0 }}
                                        animate={{
                                            scale: 1 - i * 0.05,
                                            y: i * 12,
                                            rotateZ: i * (i % 2 === 0 ? -2 : 2),
                                            opacity: 1 - i * 0.15,
                                        }}
                                        exit={{
                                            x: 300,
                                            rotateZ: 25,
                                            opacity: 0,
                                            transition: { type: 'spring', stiffness: 200, damping: 20 }
                                        }}
                                        transition={{ type: 'spring', stiffness: 300, damping: 25 }}
                                        drag={isTop ? 'x' : false}
                                        dragConstraints={{ left: 0, right: 0 }}
                                        dragElastic={0.8}
                                        onDragEnd={(e, info) => {
                                            if (Math.abs(info.offset.x) > 100) {
                                                removeTopCard(info.offset.x > 0 ? 'right' : 'left');
                                            }
                                        }}
                                        whileDrag={{ scale: 1.05, cursor: 'grabbing' }}
                                    >
                                        {/* Card Content */}
                                        <div className="flex items-center gap-3 mb-4">
                                            <div
                                                className="w-12 h-12 rounded-full flex items-center justify-center text-2xl"
                                                style={{ background: `${card.color}20`, border: `1px solid ${card.color}40` }}
                                            >
                                                {card.avatar}
                                            </div>
                                            <div>
                                                <h3 className="text-sm font-bold text-white">{card.name}</h3>
                                                <p className="text-xs text-slate-500">{card.role}</p>
                                            </div>
                                        </div>

                                        <p className="text-sm text-slate-300 leading-relaxed italic mb-4">
                                            {card.quote}
                                        </p>

                                        {/* Rating Stars */}
                                        <div className="flex gap-1">
                                            {[1,2,3,4,5].map(s => (
                                                <span key={s} className="text-amber-400 text-sm">★</span>
                                            ))}
                                        </div>

                                        {/* Drag hint for top card */}
                                        {isTop && (
                                            <div className="absolute bottom-3 left-0 right-0 text-center">
                                                <span className="text-[10px] text-slate-600 tracking-widest uppercase">← swipe →</span>
                                            </div>
                                        )}

                                        {/* Color accent */}
                                        <div
                                            className="absolute top-0 left-0 right-0 h-1 rounded-t-2xl"
                                            style={{ background: `linear-gradient(90deg, transparent, ${card.color}, transparent)` }}
                                        />
                                    </motion.div>
                                );
                            })}
                        </AnimatePresence>
                    </div>

                    {/* Counter */}
                    <div className="flex items-center gap-3">
                        {CARDS.map((c, i) => (
                            <div
                                key={c.id}
                                className="w-2 h-2 rounded-full transition-all duration-300"
                                style={{
                                    background: cards[0]?.id === c.id ? c.color : 'rgba(255,255,255,0.15)',
                                    boxShadow: cards[0]?.id === c.id ? `0 0 8px ${c.color}` : 'none',
                                }}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<CardStack />);
    </script>
</body>
</html>
