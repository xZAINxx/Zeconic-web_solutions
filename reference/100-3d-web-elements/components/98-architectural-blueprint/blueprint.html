<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Blueprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; }
        
        .blueprint-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        }

        .blueprint-grid-sub {
            background-size: 10px 10px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useSpring, AnimatePresence } from 'framer-motion';

        const ArchitecturalBlueprint = () => {
            const [hoveredRect, setHoveredRect] = useState(null);
            
            // Physics configuration for the guide lines snapping into place
            const springConfig = { damping: 25, stiffness: 200, mass: 0.5 };
            
            const top = useSpring(0, springConfig);
            const bottom = useSpring(0, springConfig);
            const left = useSpring(0, springConfig);
            const right = useSpring(0, springConfig);

            useEffect(() => {
                if (hoveredRect) {
                    top.set(hoveredRect.top);
                    bottom.set(hoveredRect.bottom);
                    left.set(hoveredRect.left);
                    right.set(hoveredRect.right);
                }
            }, [hoveredRect, top, bottom, left, right]);

            const handleMouseEnter = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                setHoveredRect(rect);
            };

            const handleMouseLeave = () => {
                setHoveredRect(null);
            };

            return (
                <div className="relative w-full h-screen overflow-hidden">
                    {/* The Faint Technical Grid Background */}
                    <div className="absolute inset-0 blueprint-grid z-0"></div>
                    <div className="absolute inset-0 blueprint-grid-sub z-0"></div>

                    {/* Dynamic Measurement Guideline Vectors */}
                    <AnimatePresence>
                        {hoveredRect && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="absolute inset-0 z-10 pointer-events-none"
                            >
                                {/* Horizontal Top Line */}
                                <motion.div 
                                    className="absolute left-0 right-0 h-[1px] bg-sky-400"
                                    style={{ top }}
                                >
                                    <span className="absolute left-4 -top-5 text-[10px] text-sky-400 font-mono tracking-widest">Y:{Math.round(hoveredRect.top)}px</span>
                                    <div className="absolute left-0 bottom-0 w-full h-px bg-sky-400/20 shadow-[0_0_10px_#38bdf8]"></div>
                                </motion.div>
                                
                                {/* Horizontal Bottom Line */}
                                <motion.div 
                                    className="absolute left-0 right-0 h-[1px] bg-sky-400"
                                    style={{ top: bottom }}
                                >
                                    <span className="absolute right-4 top-1 text-[10px] text-sky-400 font-mono tracking-widest">H:{Math.round(hoveredRect.height)}px</span>
                                </motion.div>

                                {/* Vertical Left Line */}
                                <motion.div 
                                    className="absolute top-0 bottom-0 w-[1px] bg-sky-400"
                                    style={{ left }}
                                >
                                    <span className="absolute top-4 -left-12 text-[10px] text-sky-400 font-mono tracking-widest">X:{Math.round(hoveredRect.left)}px</span>
                                    <div className="absolute left-0 top-0 w-px h-full bg-sky-400/20 shadow-[0_0_10px_#38bdf8]"></div>
                                </motion.div>

                                {/* Vertical Right Line */}
                                <motion.div 
                                    className="absolute top-0 bottom-0 w-[1px] bg-sky-400"
                                    style={{ left: right }}
                                >
                                    <span className="absolute bottom-4 left-2 text-[10px] text-sky-400 font-mono tracking-widest">W:{Math.round(hoveredRect.width)}px</span>
                                </motion.div>

                                {/* Crosshair Intersections */}
                                <motion.div className="absolute w-2 h-2 border border-sky-400 rounded-full" style={{ top: top, left: left, x: -4, y: -4 }} />
                                <motion.div className="absolute w-2 h-2 border border-sky-400 rounded-full" style={{ top: top, left: right, x: -4, y: -4 }} />
                                <motion.div className="absolute w-2 h-2 border border-sky-400 rounded-full" style={{ top: bottom, left: left, x: -4, y: -4 }} />
                                <motion.div className="absolute w-2 h-2 border border-sky-400 rounded-full" style={{ top: bottom, left: right, x: -4, y: -4 }} />
                            </motion.div>
                        )}
                    </AnimatePresence>


                    {/* Physical Component Layout */}
                    <div className="relative z-20 w-full h-full flex flex-col items-center justify-center gap-12 pt-10">
                        
                        <div 
                            className="text-center group cursor-crosshair"
                            onMouseEnter={handleMouseEnter}
                            onMouseLeave={handleMouseLeave}
                        >
                            <h1 className="text-7xl font-black text-white tracking-tighter mb-2">Technical Blueprint</h1>
                            <p className="text-slate-400 font-mono text-sm tracking-widest uppercase">System Architecture Visualized</p>
                        </div>

                        <div className="flex gap-8 w-full max-w-4xl justify-center">
                            {/* Block A */}
                            <div 
                                className="w-64 h-80 bg-slate-900 border border-slate-700/50 rounded-lg p-6 flex flex-col items-start hover:bg-slate-800 transition-colors cursor-crosshair"
                                onMouseEnter={handleMouseEnter}
                                onMouseLeave={handleMouseLeave}
                            >
                                <div className="w-12 h-12 bg-slate-800 rounded mb-6"></div>
                                <div className="w-full h-4 bg-slate-800 rounded mb-3"></div>
                                <div className="w-2/3 h-4 bg-slate-800 rounded"></div>
                            </div>
                            
                            {/* Block B */}
                            <div 
                                className="w-64 h-80 bg-slate-900 border border-slate-700/50 rounded-lg p-6 flex flex-col items-start hover:bg-slate-800 transition-colors cursor-crosshair"
                                onMouseEnter={handleMouseEnter}
                                onMouseLeave={handleMouseLeave}
                            >
                                <div className="w-12 h-12 bg-slate-800 rounded mb-6"></div>
                                <div className="w-full h-4 bg-slate-800 rounded mb-3"></div>
                                <div className="w-2/3 h-4 bg-slate-800 rounded mb-12"></div>
                                <div className="w-full h-10 bg-sky-500/20 border border-sky-500/50 rounded flex items-center justify-center text-sky-400 font-bold text-xs">Execute</div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<ArchitecturalBlueprint />);
    </script>
</body>
</html>
