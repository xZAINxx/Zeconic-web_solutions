<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Product Showcase Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scene {
      perspective: 1000px;
      perspective-origin: center center;
    }

    .card {
      width: 360px;
      background: linear-gradient(135deg, #1a1a1a 0%, #111111 50%, #0d0d0d 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      will-change: transform;
      cursor: pointer;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 25px 50px rgba(0,0,0,0.8),
        0 10px 20px rgba(0,0,0,0.5);
      transition: box-shadow 0.3s ease;
    }

    /* Shimmer layer */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(ellipse at 30% 20%, rgba(212,175,55,0.06) 0%, transparent 60%);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Noise texture overlay */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .card-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #b8960c;
      opacity: 0.9;
    }

    .crown-icon {
      width: 20px;
      height: 20px;
      fill: #b8960c;
      opacity: 0.7;
    }

    .model-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, #b8960c, transparent);
      margin-bottom: 20px;
    }

    .watch-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 220px;
      margin: 0 -32px;
      position: relative;
    }

    .watch-image {
      width: 200px;
      height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9)) drop-shadow(0 0 30px rgba(184,150,12,0.15));
      will-change: transform;
      transition: transform 0.1s ease;
    }

    .watch-reflection {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(184,150,12,0.12) 0%, transparent 70%);
      filter: blur(4px);
    }

    .product-info {
      margin-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 20px;
    }

    .product-name {
      font-size: 22px;
      font-weight: 700;
      color: #f5f5f0;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .product-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .product-details {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }

    .detail {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-label {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }

    .price {
      font-size: 26px;
      font-weight: 700;
      color: #f5f5f0;
      letter-spacing: -1px;
    }

    .price-currency {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      vertical-align: super;
      margin-right: 2px;
    }

    .cta-btn {
      background: linear-gradient(135deg, #b8960c, #d4af37, #b8960c);
      background-size: 200% 100%;
      border: none;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 12px;
      font-weight: 600;
      color: #0a0a0a;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(184,150,12,0.3);
    }

    .cta-btn:hover {
      background-position: 100% 0;
      box-shadow: 0 6px 25px rgba(184,150,12,0.5);
    }

    .cta-btn:active {
      transform: scale(0.96);
    }

    /* Glow effect on card edge */
    .edge-glow {
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: transparent;
      border: 1px solid transparent;
      background-clip: border-box;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      box-shadow: inset 0 0 20px rgba(184,150,12,0.05);
    }

    .card:hover .edge-glow {
      opacity: 1;
    }

    /* Spec dots */
    .spec-dots {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .spec-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .spec-dot.active {
      background: #b8960c;
    }

    .watermark {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.06);
      text-transform: uppercase;
      transform: rotate(90deg) translateX(50%);
      transform-origin: right center;
    }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="edge-glow"></div>

    <div class="card-brand">
      <span class="brand-name">Chronos</span>
      <svg class="crown-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 19h20v2H2v-2zm0-3l5-9 5 6 3-4 5 7H2z"/>
      </svg>
    </div>
    <div class="model-line"></div>

    <div class="watch-container">
      <img
        class="watch-image"
        id="watchImg"
        src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop&auto=format&q=80"
        alt="Luxury Mechanical Watch"
        crossorigin="anonymous"
      />
      <div class="watch-reflection"></div>
    </div>

    <div class="product-info">
      <div class="product-name">Tourbillon Classique</div>
      <div class="product-subtitle">Swiss Mechanical · Limited</div>

      <div class="product-details">
        <div class="detail">
          <span class="detail-label">Movement</span>
          <span class="detail-value">In-House Cal. 7</span>
        </div>
        <div class="detail">
          <span class="detail-label">Case</span>
          <span class="detail-value">42mm Titanium</span>
        </div>
        <div class="detail">
          <span class="detail-label">Reserve</span>
          <span class="detail-value">72 Hours</span>
        </div>
      </div>

      <div class="spec-dots">
        <div class="spec-dot active"></div>
        <div class="spec-dot active"></div>
        <div class="spec-dot active"></div>
        <div class="spec-dot"></div>
        <div class="spec-dot"></div>
      </div>
    </div>

    <div class="product-footer">
      <div class="price">
        <span class="price-currency">$</span>18,500
      </div>
      <button class="cta-btn">Acquire Now</button>
    </div>

    <span class="watermark">No 001 of 250</span>
  </div>
</div>

<script>
  const card = document.getElementById('card');
  const watchImg = document.getElementById('watchImg');
  const scene = document.getElementById('scene');

  // 3D tilt tracking
  let currentX = 0, currentY = 0;
  let targetX = 0, targetY = 0;
  let rafId = null;

  const MAX_ROTATE = 15;
  const PARALLAX_DEPTH = 30;

  function lerp(start, end, factor) {
    return start + (end - start) * factor;
  }

  function animate() {
    currentX = lerp(currentX, targetX, 0.08);
    currentY = lerp(currentY, targetY, 0.08);

    card.style.transform = `
      rotateX(${currentY}deg)
      rotateY(${currentX}deg)
    `;

    // Parallax watch image (translateZ relative)
    const watchScale = 1 + Math.abs(currentX / MAX_ROTATE) * 0.04 + Math.abs(currentY / MAX_ROTATE) * 0.04;
    watchImg.style.transform = `
      translateZ(${PARALLAX_DEPTH}px)
      translateX(${-currentX * 0.8}px)
      translateY(${currentY * 0.8}px)
      scale(${watchScale})
    `;

    // Dynamic glow based on tilt
    const glowX = 50 + currentX * 2;
    const glowY = 50 + currentY * 2;
    card.style.setProperty('--glow-x', `${glowX}%`);
    card.style.setProperty('--glow-y', `${glowY}%`);

    rafId = requestAnimationFrame(animate);
  }

  scene.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const mouseX = e.clientX - centerX;
    const mouseY = e.clientY - centerY;

    targetX = (mouseX / (rect.width / 2)) * MAX_ROTATE;
    targetY = -(mouseY / (rect.height / 2)) * MAX_ROTATE;
  });

  scene.addEventListener('mouseleave', () => {
    targetX = 0;
    targetY = 0;
  });

  // Start animation loop
  animate();

  // Click ripple on CTA
  document.querySelector('.cta-btn').addEventListener('click', function(e) {
    this.style.transform = 'scale(0.93)';
    setTimeout(() => { this.style.transform = ''; }, 200);
  });
</script>
</body>
</html>
