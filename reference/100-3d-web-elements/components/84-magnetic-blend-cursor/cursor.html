<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squishy Physics Cursor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; min-height: 100vh; font-family: 'Inter', sans-serif; cursor: none; overflow: hidden; }
        /* Hide native cursor globally to emphasize custom physics */
        a, button, input { cursor: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform, useVelocity } from 'framer-motion';

        const DynamicCursor = () => {
            const mouseX = useMotionValue(-100);
            const mouseY = useMotionValue(-100);

            // Apply dampening to the physical cursor so it drags slightly behind the physical mouse
            const springConfig = { damping: 20, stiffness: 200, mass: 0.5 };
            const smoothX = useSpring(mouseX, springConfig);
            const smoothY = useSpring(mouseY, springConfig);

            // Calculate exact velocity of the dragged cursor in X and Y
            const velocityX = useVelocity(smoothX);
            const velocityY = useVelocity(smoothY);

            // Combine X and Y velocities to get absolute total speed scalar
            // Using a simple state update tied to a requestAnimationFrame loop since we can't cleanly Hypotenuse MotionValues inline easily
            const totalSpeed = useMotionValue(0);
            const moveAngle = useMotionValue(0);

            useEffect(() => {
                let frameId;
                const updatePhysics = () => {
                    const vx = velocityX.get();
                    const vy = velocityY.get();
                    
                    // Total Speed mapped to magnitude
                    const speed = Math.sqrt(vx * vx + vy * vy);
                    totalSpeed.set(speed);

                    // Angle calculation for squeezing direction
                    if (speed > 50) { 
                        // Only rotate if moving fast enough to avoid jitter
                        moveAngle.set(Math.atan2(vy, vx) * (180 / Math.PI));
                    }
                    frameId = requestAnimationFrame(updatePhysics);
                };
                updatePhysics();
                return () => cancelAnimationFrame(frameId);
            }, [velocityX, velocityY]);

            // The absolute magic:
            // SQUISH MULTIPLIERS. If moving fast (Speed > X), the width stretches massively while the height shrinks.
            // This replicates cartoon 'stretch & squash' physics identically.
            const cursorScaleX = useTransform(totalSpeed, [0, 4000], [1, 2.5]);
            const cursorScaleY = useTransform(totalSpeed, [0, 4000], [1, 0.4]);

            // Interactive state for scaling up heavily on buttons
            const [isHovering, setIsHovering] = useState(false);
            const activeScale = isHovering ? 2.5 : 1;

            useEffect(() => {
                const moveEngine = (e) => {
                    mouseX.set(e.clientX);
                    mouseY.set(e.clientY);

                    // Simple hover detection logic
                    const isClickable = e.target.closest('button, a');
                    setIsHovering(Boolean(isClickable));
                };

                window.addEventListener('mousemove', moveEngine);
                return () => window.removeEventListener('mousemove', moveEngine);
            }, []);

            return (
                <motion.div
                    className="fixed top-0 left-0 pointer-events-none z-[9999] flex items-center justify-center transform-gpu mix-blend-difference"
                    style={{
                        x: smoothX,
                        y: smoothY,
                        // Center the physical dot mathematically
                        marginLeft: -16,
                        marginTop: -16,
                        rotate: moveAngle,
                    }}
                >
                    {/* The Inner Dot Element that squishes */}
                    <motion.div 
                        className="w-8 h-8 rounded-full bg-white shadow-[0_0_20px_rgba(255,255,255,0.8)]"
                        animate={{ scale: activeScale }}
                        style={{
                            scaleX: cursorScaleX,
                            scaleY: cursorScaleY
                        }}
                    />
                </motion.div>
            );
        };

        const App = () => {
            return (
                <div className="w-full h-screen flex flex-col items-center justify-center relative p-8">
                    <DynamicCursor />

                    <div className="text-center max-w-2xl px-8 z-10 flex flex-col items-center">
                        <div className="w-20 h-20 bg-fuchsia-600 rounded-[32px] mb-8 shadow-[0_0_40px_rgba(192,38,211,0.5)] transform rotate-12"></div>
                        <h1 className="text-6xl md:text-8xl font-black text-white tracking-tighter mb-4 leading-none">
                            Squash &amp;<br/>Stretch.
                        </h1>
                        <p className="text-slate-400 font-medium text-lg leading-relaxed mb-12">
                            A complete physics redesign of the custom cursor. Move your mouse intensely left and right. 
                            We extract the raw X/Y velocity vectors mathematically, merging them into an absolute speed scalar. 
                            This simultaneously drives <code className="text-white">scaleX</code> (stretching) and <code className="text-white">scaleY</code> (squashing), while mapping the arctangent natively to rotation. It creates a vivid illusion of physical liquid speed.
                        </p>
                        
                        <div className="flex gap-6">
                            <button className="px-10 py-5 bg-white text-slate-900 font-black tracking-tight text-xl rounded-full shadow-[0_20px_40px_rgba(255,255,255,0.2)]">Execute Sequence</button>
                            <button className="px-10 py-5 bg-transparent border border-white/20 text-white font-black tracking-tight text-xl rounded-full hover:bg-white/10 transition-colors">Abort</button>
                        </div>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
