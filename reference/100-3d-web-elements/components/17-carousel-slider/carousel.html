<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Carousel Slider</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #0f0f17 0%, #12111e 50%, #0a0a0f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .carousel-header {
      text-align: center;
      margin-bottom: 32px;
      z-index: 5;
    }
    .carousel-header h2 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    .carousel-header p {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .carousel-scene {
      perspective: 1000px;
      width: 100%;
      max-width: 640px;
      height: 300px;
      position: relative;
    }

    .carousel-stage {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
    }

    .card-item {
      position: absolute;
      width: 260px;
      height: 260px;
      left: 50%;
      top: 50%;
      margin-left: -130px;
      margin-top: -130px;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.4s ease;
      backface-visibility: hidden;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      image-rendering: -webkit-optimize-contrast;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card-item.is-active .card-overlay { opacity: 1; }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .card-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      letter-spacing: 1px;
    }

    /* Active card glow */
    .card-item.is-active {
      box-shadow: 0 0 0 2px rgba(139,92,246,0.5), 0 20px 50px rgba(0,0,0,0.7);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 36px;
      z-index: 5;
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .nav-btn:hover {
      background: rgba(139,92,246,0.2);
      border-color: rgba(139,92,246,0.4);
      transform: scale(1.1);
    }

    .nav-btn:active { transform: scale(0.95); }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #8b5cf6;
      width: 20px;
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(139,92,246,0.6);
    }

    .counter {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      min-width: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="carousel-header">
  <h2>Featured Gallery</h2>
  <p>3D Cylindrical Carousel</p>
</div>

<div class="carousel-scene" id="scene">
  <div class="carousel-stage" id="stage"></div>
</div>

<div class="controls">
  <button class="nav-btn" id="prevBtn">‹</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="nextBtn">›</button>
</div>
<div class="counter" id="counter">1 / 6</div>

<script>
  const items = [
    { img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=800&fit=crop&q=90&auto=format', title: 'Alpine Peaks', sub: 'Switzerland' },
    { img: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&h=800&fit=crop&q=90&auto=format', title: 'Forest Mist', sub: 'Oregon, USA' },
    { img: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&h=800&fit=crop&q=90&auto=format', title: 'Desert Dunes', sub: 'Sahara' },
    { img: 'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=800&h=800&fit=crop&q=90&auto=format', title: 'Ocean Vista', sub: 'Pacific' },
    { img: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&h=800&fit=crop&q=90&auto=format', title: 'Northern Lights', sub: 'Iceland' },
    { img: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800&h=800&fit=crop&q=90&auto=format', title: 'City Lights', sub: 'Tokyo' },
  ];

  const N = items.length;
  const RADIUS = 300; // translateZ distance
  const stage = document.getElementById('stage');
  const dotsContainer = document.getElementById('dots');
  const counter = document.getElementById('counter');
  
  let absoluteIndex = 0;
  let current = 0;

  // Build cards
  const cards = items.map((item, i) => {
    const card = document.createElement('div');
    card.className = 'card-item';
    card.innerHTML = `
      <img class="card-img" src="${item.img}" alt="${item.title}" draggable="false" loading="eager" crossorigin="anonymous"/>
      <div class="card-overlay">
        <div class="card-title">${item.title}</div>
        <div class="card-sub">${item.sub}</div>
      </div>
    `;
    card.addEventListener('click', () => goTo(i));
    stage.appendChild(card);
    return card;
  });

  // Build dots
  const dots = items.map((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
    return dot;
  });

  function updateCarousel() {
    const angleStep = 360 / N;

    cards.forEach((card, i) => {
      // The cards reside at fixed angles on the cylinder
      const angle = angleStep * i;
      const translateZ = RADIUS;

      // Distance from the currently active card for scaling/blurring
      let relAngle = ((i - current) % N + N) % N;
      if (relAngle > N/2) relAngle -= N;
      const absRel = Math.abs(relAngle);

      // Scale + blur for depth
      const frontness = 1 - (absRel / (N/2));
      const scale = 0.55 + frontness * 0.45;
      const blur = (1 - frontness) * 3;
      const opacity = Math.max(0, 0.3 + frontness * 0.7);
      const zIndex = Math.round(frontness * 10);

      card.style.transform = `rotateY(${angle}deg) translateZ(${translateZ}px) scale(${scale})`;
      card.style.filter = blur > 0 ? `blur(${blur.toFixed(1)}px)` : 'none';
      card.style.opacity = opacity;
      card.style.zIndex = zIndex;

      // Active state
      if (i === current) {
        card.classList.add('is-active');
      } else {
        card.classList.remove('is-active');
      }
    });

    // Stage rotation (infinite tracking via absoluteIndex)
    stage.style.transform = `rotateY(${-absoluteIndex * angleStep}deg)`;

    // Dots
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === current);
    });

    counter.textContent = `${current + 1} / ${N}`;
  }

  function goTo(index) {
    absoluteIndex = index;
    current = ((absoluteIndex % N) + N) % N;
    updateCarousel();
  }

  document.getElementById('prevBtn').addEventListener('click', () => goTo(absoluteIndex - 1));
  document.getElementById('nextBtn').addEventListener('click', () => goTo(absoluteIndex + 1));

  // Keyboard nav
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(absoluteIndex - 1);
    if (e.key === 'ArrowRight') goTo(absoluteIndex + 1);
  });

  // Touch/drag support
  let startX = null;
  const scene = document.getElementById('scene');
  scene.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
  scene.addEventListener('touchend', (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (dx < -40) goTo(absoluteIndex + 1);
    else if (dx > 40) goTo(absoluteIndex - 1);
    startX = null;
  }, { passive: true });

  // Auto-advance
  setInterval(() => goTo(absoluteIndex + 1), 4000);

  updateCarousel();
</script>
</body>
</html>
