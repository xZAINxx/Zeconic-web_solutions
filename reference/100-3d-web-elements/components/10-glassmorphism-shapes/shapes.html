<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glassmorphism Floating Shapes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #5b21b6 100%);
      font-family: 'Inter', sans-serif;
      position: relative;
    }
    #canvas-container {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }
    .hero-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: white;
      line-height: 1.1;
      letter-spacing: -1.5px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
      margin-bottom: 16px;
    }
    .hero-title span {
      background: linear-gradient(135deg, #a78bfa, #f0abfc, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      max-width: 360px;
      line-height: 1.6;
    }
    canvas { display: block; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hero-content">
  <div class="hero-badge">✦ New Collection</div>
  <h1 class="hero-title">Beyond the<br/><span>Ordinary</span></h1>
  <p class="hero-sub">Crystalline experiences crafted at the intersection of art and technology.</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('canvas-container');
const W = container.clientWidth, H = container.clientHeight;

// Renderer — capped DPR [1, 1.5]
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
camera.position.z = 6;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const light1 = new THREE.DirectionalLight(0xa78bfa, 2.5);
light1.position.set(3, 4, 3);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0x67e8f9, 1.5);
light2.position.set(-3, -2, 2);
scene.add(light2);

const pointLight = new THREE.PointLight(0xf0abfc, 3, 10);
pointLight.position.set(0, 2, 3);
scene.add(pointLight);

// Glassmorphism material (approximation without MeshTransmissionMaterial CDN issues)
function makeGlassMaterial(color) {
  return new THREE.MeshPhysicalMaterial({
    color: color,
    metalness: 0.0,
    roughness: 0.05,
    transmission: 0.92,
    thickness: 0.5,
    ior: 1.5,
    reflectivity: 0.5,
    transparent: true,
    opacity: 0.55,
    side: THREE.DoubleSide,
    envMapIntensity: 1.5,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    attenuationColor: new THREE.Color(color),
    attenuationDistance: 0.5,
  });
}

// Icosahedron — low poly (detail=0 gives 20 faces)
const icoGeo = new THREE.IcosahedronGeometry(1.1, 0);
const icoMat = makeGlassMaterial(0x8b5cf6);
const icosahedron = new THREE.Mesh(icoGeo, icoMat);
icosahedron.position.set(-1.5, 0.3, 0);
scene.add(icosahedron);

// Torus — low segments for performance
const torusGeo = new THREE.TorusGeometry(0.8, 0.28, 8, 24);
const torusMat = makeGlassMaterial(0x06b6d4);
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.position.set(1.6, -0.2, -0.5);
scene.add(torus);

// Small sphere accent
const sphereGeo = new THREE.IcosahedronGeometry(0.45, 1);
const sphereMat = makeGlassMaterial(0xf0abfc);
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(0.6, 1.4, 0.5);
scene.add(sphere);

// Wireframe overlays for edge glow effect
function makeWireframe(geo, color) {
  const wireMat = new THREE.MeshBasicMaterial({
    color: color,
    wireframe: true,
    transparent: true,
    opacity: 0.12
  });
  return new THREE.Mesh(geo, wireMat);
}

icosahedron.add(makeWireframe(icoGeo, 0xc4b5fd));
torus.add(makeWireframe(torusGeo, 0x67e8f9));

// Particle field
const particleCount = 120;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 14;
}
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xa78bfa,
  size: 0.025,
  transparent: true,
  opacity: 0.45,
  sizeAttenuation: true
});
scene.add(new THREE.Points(particleGeo, particleMat));

// Clock + animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Slow continuous rotation
  icosahedron.rotation.x = t * 0.18;
  icosahedron.rotation.y = t * 0.25;
  icosahedron.position.y = 0.3 + Math.sin(t * 0.7) * 0.18;

  torus.rotation.x = t * 0.22;
  torus.rotation.z = t * 0.15;
  torus.position.y = -0.2 + Math.sin(t * 0.6 + 1) * 0.15;

  sphere.rotation.y = t * 0.35;
  sphere.rotation.x = t * 0.2;
  sphere.position.y = 1.4 + Math.sin(t * 0.9) * 0.12;

  // Subtle camera sway
  camera.position.x = Math.sin(t * 0.12) * 0.3;
  camera.position.y = Math.cos(t * 0.1) * 0.2;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  const W2 = container.clientWidth, H2 = container.clientHeight;
  camera.aspect = W2 / H2;
  camera.updateProjectionMatrix();
  renderer.setSize(W2, H2);
});
</script>
</body>
</html>
