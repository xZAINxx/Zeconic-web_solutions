<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cookie Drawer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0e0e11; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; display: flex; align-items: center; justify-content: center; }
        #root { width: 100%; height: 100vh; position: relative; perspective: 1200px; display: flex; flex-direction: column; overflow: hidden; }
        
        .preserve-3d { transform-style: preserve-3d; }
        
        .glass-drawer {
            background: linear-gradient(180deg, rgba(30,30,35,0.95) 0%, rgba(20,20,25,0.98) 100%);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 -30px 60px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.05);
            transform-origin: bottom center;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                // Delay before showing cookie consent
                const timer = setTimeout(() => setIsVisible(true), 1000);
                return () => clearTimeout(timer);
            }, []);

            return (
                <div className="w-full h-full relative preserve-3d flex flex-col items-center justify-center bg-[#0e0e11]" style={{ perspective: '1600px' }}>
                    
                    {/* Dummy background content */}
                    <div className="text-center z-0 opacity-20 pointer-events-none p-10 transform translate-z-[-100px]">
                        <h1 className="text-7xl font-bold mb-6 tracking-tight">Immersive Experiences</h1>
                        <p className="text-2xl max-w-2xl mx-auto">This content is behind the 3D drawer. Wait for the consent banner to physically drop down like a hatch on the screen edge.</p>
                    </div>

                    <AnimatePresence>
                        {isVisible && (
                            <motion.div 
                                className="absolute bottom-[-2px] left-0 w-full flex justify-center pb-0 preserve-3d z-50 pointer-events-none"
                            >
                                <motion.div
                                    className="glass-drawer w-full max-w-4xl p-10 rounded-t-[40px] pointer-events-auto preserve-3d flex items-center justify-between gap-8 flex-col sm:flex-row"
                                    initial={{ rotateX: -90, y: 50, opacity: 0 }}
                                    animate={{ rotateX: 0, y: 0, opacity: 1 }}
                                    exit={{ rotateX: -90, y: 50, opacity: 0, transition: { duration: 0.5, ease: "easeInOut" } }}
                                    transition={{ 
                                        type: "spring", 
                                        bounce: 0,
                                        duration: 0.6
                                    }}
                                    style={{ transformStyle: "preserve-3d" }}
                                >
                                    {/* 3D Depth Layer for Elements inside Drawer */}
                                    <motion.div animate={{ z: 40 }} className="flex items-start gap-6 preserve-3d">
                                        <div className="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center shrink-0 shadow-lg">
                                            <svg className="w-8 h-8 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-2 tracking-tight">We value your privacy</h3>
                                            <p className="text-white/50 text-[15px] leading-relaxed max-w-lg">
                                                We use cookies to enhance your browsing experience, analyze our traffic, and serve tailored content. Since you live in a 3D world, this banner hinges open like a real drawer.
                                            </p>
                                        </div>
                                    </motion.div>
                                    
                                    {/* Action Buttons Pop Out */}
                                    <motion.div animate={{ z: 60 }} className="flex gap-4 shrink-0 preserve-3d w-full sm:w-auto mt-4 sm:mt-0">
                                        <motion.button 
                                            onClick={() => setIsVisible(false)}
                                            className="px-6 py-4 rounded-xl font-semibold text-white/50 hover:text-white bg-white/5 hover:bg-white/10 transition-colors w-full sm:w-auto border border-white/5"
                                            whileHover={{ z: 20 }}
                                        >
                                            Preferences
                                        </motion.button>
                                        <motion.button 
                                            onClick={() => setIsVisible(false)}
                                            className="px-8 py-4 rounded-xl font-bold text-black bg-white hover:bg-gray-200 transition-colors shadow-[0_20px_40px_rgba(255,255,255,0.2)] w-full sm:w-auto tracking-wide"
                                            whileHover={{ scale: 1.05, z: 30 }}
                                            whileTap={{ scale: 0.95 }}
                                        >
                                            Accept All
                                        </motion.button>
                                    </motion.div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
