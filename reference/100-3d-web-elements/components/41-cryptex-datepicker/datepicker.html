<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Cryptex Date Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useCallback, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform, AnimatePresence } from 'framer-motion';

        const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

        // CSS-driven 3D drum roller (no WebGL, no garbled text)
        const DrumRoller = ({ items, activeIndex, onIndexChange, color, label }) => {
            const containerRef = useRef(null);
            const isDragging = useRef(false);
            const startY = useRef(0);
            const startIndex = useRef(0);

            const ITEM_HEIGHT = 44;
            const VISIBLE = 5; // Number of visible items above + active + below

            const handlePointerDown = (e) => {
                isDragging.current = true;
                startY.current = e.clientY;
                startIndex.current = activeIndex;
                e.target.setPointerCapture?.(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging.current) return;
                const delta = startY.current - e.clientY;
                const indexDelta = Math.round(delta / (ITEM_HEIGHT * 0.6));
                const newIndex = ((startIndex.current + indexDelta) % items.length + items.length) % items.length;
                if (newIndex !== activeIndex) onIndexChange(newIndex);
            };

            const handlePointerUp = () => { isDragging.current = false; };

            // Calculate visible items around the active index
            const getVisibleItems = () => {
                const result = [];
                const half = Math.floor(VISIBLE / 2);
                for (let offset = -half; offset <= half; offset++) {
                    const idx = ((activeIndex + offset) % items.length + items.length) % items.length;
                    result.push({ value: items[idx], offset, index: idx });
                }
                return result;
            };

            return (
                <div className="flex flex-col items-center gap-2">
                    <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: `${color}99` }}>{label}</span>
                    <div
                        ref={containerRef}
                        className="relative cursor-grab active:cursor-grabbing select-none overflow-hidden rounded-xl"
                        style={{
                            width: '90px',
                            height: `${ITEM_HEIGHT * VISIBLE}px`,
                            perspective: '400px',
                            background: 'rgba(255,255,255,0.03)',
                            border: '1px solid rgba(255,255,255,0.06)',
                        }}
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerLeave={handlePointerUp}
                    >
                        {/* Selection indicator line */}
                        <div 
                            className="absolute left-2 right-2 rounded-lg pointer-events-none z-10"
                            style={{
                                top: `${ITEM_HEIGHT * Math.floor(VISIBLE / 2)}px`,
                                height: `${ITEM_HEIGHT}px`,
                                background: `${color}15`,
                                border: `1px solid ${color}40`,
                                boxShadow: `0 0 20px ${color}15`,
                            }}
                        />

                        {/* Visible items */}
                        <AnimatePresence mode="popLayout">
                            {getVisibleItems().map(({ value, offset, index }) => {
                                const distFromCenter = Math.abs(offset);
                                const rotateX = offset * 25;
                                const opacity = 1 - distFromCenter * 0.3;
                                const scale = 1 - distFromCenter * 0.1;

                                return (
                                    <motion.div
                                        key={`${index}-${offset}`}
                                        className="flex items-center justify-center font-mono font-bold"
                                        style={{
                                            height: `${ITEM_HEIGHT}px`,
                                            fontSize: offset === 0 ? '20px' : '14px',
                                            color: offset === 0 ? color : '#475569',
                                            transformStyle: 'preserve-3d',
                                            transform: `perspective(400px) rotateX(${rotateX}deg) scale(${scale})`,
                                            opacity,
                                            transition: 'all 0.2s ease-out',
                                            textShadow: offset === 0 ? `0 0 10px ${color}50` : 'none',
                                        }}
                                    >
                                        {value}
                                    </motion.div>
                                );
                            })}
                        </AnimatePresence>

                        {/* Top/bottom fade masks */}
                        <div className="absolute top-0 left-0 right-0 h-12 pointer-events-none" style={{ background: 'linear-gradient(180deg, #0a0a1a, transparent)' }} />
                        <div className="absolute bottom-0 left-0 right-0 h-12 pointer-events-none" style={{ background: 'linear-gradient(0deg, #0a0a1a, transparent)' }} />
                    </div>

                    {/* Up/down buttons */}
                    <div className="flex gap-2">
                        <button
                            onClick={() => onIndexChange(((activeIndex - 1) % items.length + items.length) % items.length)}
                            className="w-8 h-8 rounded-lg flex items-center justify-center text-xs cursor-pointer transition-all hover:scale-110 active:scale-90"
                            style={{ background: `${color}15`, border: `1px solid ${color}30`, color }}
                        >▲</button>
                        <button
                            onClick={() => onIndexChange((activeIndex + 1) % items.length)}
                            className="w-8 h-8 rounded-lg flex items-center justify-center text-xs cursor-pointer transition-all hover:scale-110 active:scale-90"
                            style={{ background: `${color}15`, border: `1px solid ${color}30`, color }}
                        >▼</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [day, setDay] = useState(14);
            const [month, setMonth] = useState(2);
            const [year, setYear] = useState(5);

            const days = Array.from({length: 31}, (_, i) => String(i + 1).padStart(2, '0'));
            const years = Array.from({length: 12}, (_, i) => String(2020 + i));

            return (
                <div className="flex flex-col items-center gap-8">
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-500 mb-1">Drag or Click Arrows</p>
                        <h2 className="text-2xl font-bold text-white">Cryptex Date Roller</h2>
                    </div>

                    {/* Three rollers side-by-side */}
                    <div className="flex items-start gap-4">
                        <DrumRoller items={days} activeIndex={day} onIndexChange={setDay} color="#8b5cf6" label="DAY" />
                        
                        <div className="flex items-center h-56 pt-8">
                            <span className="text-slate-600 text-2xl font-light">/</span>
                        </div>

                        <DrumRoller items={MONTHS} activeIndex={month} onIndexChange={setMonth} color="#06b6d4" label="MONTH" />

                        <div className="flex items-center h-56 pt-8">
                            <span className="text-slate-600 text-2xl font-light">/</span>
                        </div>

                        <DrumRoller items={years} activeIndex={year} onIndexChange={setYear} color="#f59e0b" label="YEAR" />
                    </div>

                    {/* Selected Date Display */}
                    <div
                        className="inline-flex items-center gap-3 px-6 py-3 rounded-2xl"
                        style={{
                            background: 'rgba(255,255,255,0.04)',
                            border: '1px solid rgba(255,255,255,0.08)',
                            boxShadow: '0 8px 32px rgba(0,0,0,0.2)',
                        }}
                    >
                        <span className="text-violet-400 font-bold text-lg font-mono">{days[day]}</span>
                        <span className="text-slate-600">/</span>
                        <span className="text-cyan-400 font-bold text-lg font-mono">{MONTHS[month]}</span>
                        <span className="text-slate-600">/</span>
                        <span className="text-amber-400 font-bold text-lg font-mono">{years[year]}</span>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
