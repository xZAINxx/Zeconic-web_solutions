<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggressively Animated Volumetric Beams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0A0A0A; }
        
        /* MASSIVE SWAY AND OPACITY CHANGES SO IT LOOKS LIKE A CLUB SHOW */
        
        @keyframes swayBeam1 {
            0%   { transform: rotateZ(-25deg) translateY(-10%); opacity: 0.1; }
            50%  { transform: rotateZ(30deg) translateY(10%); opacity: 0.9; }
            100% { transform: rotateZ(-25deg) translateY(-10%); opacity: 0.1; }
        }

        @keyframes swayBeam2 {
            0%   { transform: rotateZ(35deg) translateY(15%); opacity: 1; }
            50%  { transform: rotateZ(-30deg) translateY(-15%); opacity: 0.2; }
            100% { transform: rotateZ(35deg) translateY(15%); opacity: 1; }
        }

        @keyframes swayBeam3 {
            0%   { transform: rotateZ(-15deg) translateY(-5%); opacity: 0.2; }
            50%  { transform: rotateZ(25deg) translateY(20%); opacity: 1; }
            100% { transform: rotateZ(-15deg) translateY(-5%); opacity: 0.2; }
        }

        .prism-mask {
            mask-image: url("data:image/svg+xml;utf8,%3Csvg width='100%25' height='100%25' viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0 L300,1000 L400,0 Z M500,200 L800,1200 L600,-200 Z M800,0 L1000,1000 L1200,0 Z' fill='black'/%3E%3C/svg%3E");
            mask-size: cover;
            -webkit-mask-image: url("data:image/svg+xml;utf8,%3Csvg width='100%25' height='100%25' viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-100,-100 L300,1200 L450,-100 Z M400,-200 L750,1300 L650,-200 Z M800,-100 L1100,1100 L1200,-100 Z M150,500 L850,200 L1000,800 Z' fill='black'/%3E%3C/svg%3E");
            -webkit-mask-size: cover;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';

        const PrismaticBeams = () => {
            const parallaxContainerRef = useRef(null);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!parallaxContainerRef.current) return;
                    
                    const { innerWidth, innerHeight } = window;
                    const x = (e.clientX / innerWidth) - 0.5;
                    const y = (e.clientY / innerHeight) - 0.5;

                    parallaxContainerRef.current.style.transform = `translate3d(${x * -100}px, ${y * -100}px, 0)`;
                };

                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="relative w-full h-screen overflow-hidden bg-[#0A0A0A] flex flex-col items-center justify-center">
                    
                    <div 
                        ref={parallaxContainerRef}
                        className="absolute inset-[-20vw] z-0 pointer-events-none prism-mask"
                        style={{ willChange: "transform", transition: "transform 0.1s ease-out" }}
                    >
                        {/* Time slashed from 18s to 3s! Aggressive swiping. */}
                        <div 
                            className="absolute top-[-20%] left-[10%] w-[35vw] h-[160vh] mix-blend-hard-light origin-top blur-sm"
                            style={{ 
                                background: 'linear-gradient(180deg, rgba(56,189,248,1) 0%, rgba(124,58,237,0.8) 50%, rgba(0,0,0,0) 100%)',
                                animation: 'swayBeam1 4s infinite ease-in-out',
                                willChange: 'transform, opacity'
                            }}
                        ></div>

                        <div 
                            className="absolute top-[-10%] left-[30%] w-[40vw] h-[150vh] mix-blend-hard-light origin-top blur-md"
                            style={{ 
                                background: 'linear-gradient(180deg, rgba(34,211,238,1) 0%, rgba(217,70,239,0.8) 60%, rgba(0,0,0,0) 100%)',
                                animation: 'swayBeam2 5s infinite ease-in-out',
                                willChange: 'transform, opacity'
                            }}
                        ></div>

                        <div 
                            className="absolute top-[-30%] left-[60%] w-[40vw] h-[180vh] mix-blend-hard-light origin-top blur-sm"
                            style={{ 
                                background: 'linear-gradient(180deg, rgba(250,204,21,1) 0%, rgba(234,88,12,0.8) 40%, rgba(0,0,0,0) 100%)',
                                animation: 'swayBeam3 6s infinite ease-in-out',
                                willChange: 'transform, opacity'
                            }}
                        ></div>
                    </div>

                    <div className="relative z-20 pointer-events-none text-center mix-blend-difference">
                        <div className="mb-4 inline-block border border-white/20 rounded-full px-6 py-2 text-white/70 font-bold uppercase tracking-widest text-sm backdrop-blur">
                            Optics Activated
                        </div>
                        <h1 className="text-8xl md:text-[130px] font-black tracking-tighter text-white leading-[0.85] mb-8">
                            High Velocity.
                        </h1>
                        <p className="text-xl font-medium text-white/50 max-w-lg mx-auto leading-relaxed drop-shadow">
                            The background keyframes have been multiplied intensely. The physics now operate at 5x speed with 80% deeper opacity pulses and radically wider angular sways.
                        </p>
                    </div>

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<PrismaticBeams />);
    </script>
</body>
</html>
