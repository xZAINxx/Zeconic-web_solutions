<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Checkout Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080c;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }
        #root { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { Canvas, useFrame } from '@react-three/fiber';
        import * as THREE from 'three';

        /* ── Steps Data ── */
        const steps = [
            { id: 0, label: 'Account', icon: '👤', color: '#818cf8', fields: ['Full Name', 'Email Address'] },
            { id: 1, label: 'Shipping', icon: '📦', color: '#34d399', fields: ['Street Address', 'City / State'] },
            { id: 2, label: 'Payment', icon: '💳', color: '#fbbf24', fields: ['Card Number', 'Expiry / CVC'] },
            { id: 3, label: 'Confirm', icon: '✅', color: '#f472b6', fields: [] },
        ];

        /* ── 3D Background Scene ── */
        const FloatingRings = ({ activeStep }) => {
            const groupRef = useRef();
            const ringsRef = useRef([]);

            useFrame((state) => {
                if (groupRef.current) {
                    groupRef.current.rotation.y = state.clock.elapsedTime * 0.08;
                    groupRef.current.rotation.x = Math.sin(state.clock.elapsedTime * 0.05) * 0.1;
                }
                ringsRef.current.forEach((ring, i) => {
                    if (ring) {
                        const isActive = i <= activeStep;
                        const targetOpacity = isActive ? 0.25 : 0.06;
                        ring.material.opacity = THREE.MathUtils.lerp(ring.material.opacity, targetOpacity, 0.05);
                        ring.rotation.z += (i + 1) * 0.002;
                    }
                });
            });

            const ringColors = ['#818cf8', '#34d399', '#fbbf24', '#f472b6'];

            return (
                <group ref={groupRef}>
                    {[1.5, 2.2, 3.0, 3.8].map((radius, i) => (
                        <mesh
                            key={i}
                            ref={el => ringsRef.current[i] = el}
                            rotation={[Math.PI / 2 + i * 0.3, i * 0.5, 0]}
                        >
                            <torusGeometry args={[radius, 0.02, 12, 80]} />
                            <meshBasicMaterial color={ringColors[i]} transparent opacity={0.06} />
                        </mesh>
                    ))}
                </group>
            );
        };

        const BackgroundParticles = () => {
            const pointsRef = useRef();
            const count = 100;
            const positions = useMemo(() => {
                const arr = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    arr[i * 3] = (Math.random() - 0.5) * 12;
                    arr[i * 3 + 1] = (Math.random() - 0.5) * 8;
                    arr[i * 3 + 2] = (Math.random() - 0.5) * 12;
                }
                return arr;
            }, []);

            useFrame((state) => {
                if (pointsRef.current) pointsRef.current.rotation.y = state.clock.elapsedTime * 0.01;
            });

            return (
                <points ref={pointsRef}>
                    <bufferGeometry>
                        <bufferAttribute attach="attributes-position" args={[positions, 3]} />
                    </bufferGeometry>
                    <pointsMaterial color="#818cf8" size={0.025} transparent opacity={0.3} sizeAttenuation />
                </points>
            );
        };

        /* ── Step Progress Node (flat 2D overlay) ── */
        const StepNode = ({ step, index, activeStep, onClick }) => {
            const isCompleted = index < activeStep;
            const isActive = index === activeStep;
            const color = isCompleted ? '#34d399' : isActive ? step.color : '#333';

            return (
                <motion.button
                    onClick={onClick}
                    whileHover={{ scale: 1.08 }}
                    whileTap={{ scale: 0.95 }}
                    className="flex flex-col items-center gap-2 relative"
                    style={{ minWidth: '70px' }}
                >
                    {/* Node circle */}
                    <motion.div
                        animate={{
                            background: isCompleted
                                ? 'linear-gradient(135deg, #34d399, #059669)'
                                : isActive
                                    ? `linear-gradient(135deg, ${step.color}, ${step.color}aa)`
                                    : 'rgba(50,50,70,0.6)',
                            boxShadow: isActive
                                ? `0 0 25px ${step.color}40, 0 0 50px ${step.color}15`
                                : isCompleted
                                    ? '0 0 20px rgba(52,211,153,0.2)'
                                    : 'none',
                        }}
                        className="w-12 h-12 rounded-full flex items-center justify-center text-lg border border-white/10 relative z-10"
                    >
                        {isCompleted ? (
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round">
                                <path d="M5 13l4 4L19 7" />
                            </svg>
                        ) : (
                            <span>{step.icon}</span>
                        )}
                    </motion.div>
                    <motion.span
                        animate={{ color: isActive ? step.color : isCompleted ? '#34d399' : 'rgba(255,255,255,0.25)' }}
                        className="text-[10px] font-bold uppercase tracking-[1.5px]"
                    >
                        {step.label}
                    </motion.span>
                </motion.button>
            );
        };

        /* ── Form Step Content ── */
        const FormContent = ({ step, activeStep, onNext, onPrev }) => {
            const isLast = activeStep === steps.length - 1;

            if (isLast) {
                return (
                    <motion.div
                        key="confirm"
                        initial={{ opacity: 0, y: 30, scale: 0.95 }}
                        animate={{ opacity: 1, y: 0, scale: 1 }}
                        exit={{ opacity: 0, y: -30, scale: 0.95 }}
                        transition={{ type: 'spring', stiffness: 200, damping: 22 }}
                        className="text-center py-6"
                    >
                        <motion.div
                            initial={{ scale: 0 }}
                            animate={{ scale: 1 }}
                            transition={{ type: 'spring', stiffness: 300, delay: 0.2 }}
                            className="text-5xl mb-4"
                        >
                            🎉
                        </motion.div>
                        <h3 className="text-xl font-black text-white/90 mb-2">Order Ready!</h3>
                        <p className="text-sm text-white/30 mb-6 max-w-xs mx-auto">
                            Everything looks great. Review your details and place your order.
                        </p>

                        <div className="rounded-xl p-4 mb-6 text-left max-w-xs mx-auto"
                            style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)' }}>
                            <div className="flex justify-between text-xs mb-2">
                                <span className="text-white/30">Subtotal</span>
                                <span className="text-white/60 font-semibold">$199.00</span>
                            </div>
                            <div className="flex justify-between text-xs mb-2">
                                <span className="text-white/30">Shipping</span>
                                <span className="text-green-400 font-semibold">Free</span>
                            </div>
                            <div className="h-px bg-white/[0.06] my-2"></div>
                            <div className="flex justify-between text-sm">
                                <span className="text-white/60 font-bold">Total</span>
                                <span className="text-white font-black">$199.00</span>
                            </div>
                        </div>

                        <div className="flex gap-3 justify-center">
                            <button onClick={onPrev}
                                className="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider"
                                style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', color: 'rgba(255,255,255,0.4)' }}>
                                ← Back
                            </button>
                            <button onClick={() => onNext()}
                                className="px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider text-white transition-all hover:scale-105"
                                style={{ background: 'linear-gradient(135deg, #f472b6, #ec4899)', boxShadow: '0 0 25px rgba(244,114,182,0.25)' }}>
                                Place Order 🛒
                            </button>
                        </div>
                    </motion.div>
                );
            }

            return (
                <motion.div
                    key={activeStep}
                    initial={{ opacity: 0, y: 30, scale: 0.95 }}
                    animate={{ opacity: 1, y: 0, scale: 1 }}
                    exit={{ opacity: 0, y: -30, scale: 0.95 }}
                    transition={{ type: 'spring', stiffness: 200, damping: 22 }}
                >
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg"
                            style={{ background: `${step.color}15`, border: `1px solid ${step.color}20` }}>
                            {step.icon}
                        </div>
                        <div>
                            <h3 className="text-lg font-black text-white/90">{step.label}</h3>
                            <p className="text-[11px] text-white/25">Step {activeStep + 1} of {steps.length}</p>
                        </div>
                    </div>

                    <div className="flex flex-col gap-3 mb-6">
                        {step.fields.map((field, i) => (
                            <div key={i}>
                                <label className="block text-[10px] font-semibold uppercase tracking-[2px] text-white/25 mb-1.5">{field}</label>
                                <input
                                    type="text"
                                    placeholder={`Enter ${field.toLowerCase()}`}
                                    className="w-full px-4 py-3 rounded-xl text-sm text-white/80 placeholder-white/15 outline-none transition-all focus:border-opacity-100"
                                    style={{
                                        background: 'rgba(255,255,255,0.03)',
                                        border: `1px solid ${step.color}20`,
                                    }}
                                    onFocus={(e) => e.target.style.borderColor = `${step.color}60`}
                                    onBlur={(e) => e.target.style.borderColor = `${step.color}20`}
                                />
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-3">
                        {activeStep > 0 && (
                            <button onClick={onPrev}
                                className="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider"
                                style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', color: 'rgba(255,255,255,0.4)' }}>
                                ← Back
                            </button>
                        )}
                        <button onClick={onNext}
                            className="flex-1 px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider text-white transition-all hover:scale-[1.02]"
                            style={{ background: `linear-gradient(135deg, ${step.color}, ${step.color}bb)`, boxShadow: `0 0 25px ${step.color}20` }}>
                            Continue →
                        </button>
                    </div>
                </motion.div>
            );
        };

        /* ── App ── */
        const App = () => {
            const [activeStep, setActiveStep] = useState(0);
            const progress = (activeStep / (steps.length - 1)) * 100;

            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    {/* 3D Background */}
                    <div className="absolute inset-0">
                        <Canvas
                            camera={{ position: [0, 0, 6], fov: 50 }}
                            gl={{ antialias: true, alpha: true }}
                            style={{ background: 'radial-gradient(ellipse at center, #0f1020 0%, #08080c 70%)' }}
                        >
                            <FloatingRings activeStep={activeStep} />
                            <BackgroundParticles />
                        </Canvas>
                    </div>

                    {/* Foreground UI */}
                    <div className="relative z-10 w-full max-w-md mx-auto px-6">
                        {/* Top label */}
                        <motion.div className="text-center mb-6" initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }}>
                            <span className="inline-block px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-[3px]"
                                style={{ background: 'rgba(129,140,248,0.1)', color: '#818cf8', border: '1px solid rgba(129,140,248,0.15)' }}>
                                Checkout
                            </span>
                        </motion.div>

                        {/* Step Progress Bar */}
                        <div className="flex items-center justify-between mb-8 relative">
                            {/* Connecting line */}
                            <div className="absolute top-6 left-9 right-9 h-[2px] bg-white/[0.04] rounded-full">
                                <motion.div
                                    className="h-full rounded-full"
                                    style={{ background: 'linear-gradient(90deg, #34d399, #818cf8)' }}
                                    animate={{ width: `${progress}%` }}
                                    transition={{ type: 'spring', stiffness: 120, damping: 20 }}
                                />
                            </div>
                            {steps.map((step, i) => (
                                <StepNode
                                    key={step.id}
                                    step={step}
                                    index={i}
                                    activeStep={activeStep}
                                    onClick={() => i <= activeStep && setActiveStep(i)}
                                />
                            ))}
                        </div>

                        {/* Form Card */}
                        <motion.div
                            className="rounded-2xl p-6 border"
                            style={{
                                background: 'rgba(12,12,20,0.85)',
                                backdropFilter: 'blur(30px)',
                                borderColor: `${steps[activeStep].color}18`,
                                boxShadow: `0 30px 80px rgba(0,0,0,0.5), 0 0 50px ${steps[activeStep].color}08`,
                            }}
                            layout
                        >
                            <AnimatePresence mode="wait">
                                <FormContent
                                    step={steps[activeStep]}
                                    activeStep={activeStep}
                                    onNext={() => setActiveStep(Math.min(steps.length - 1, activeStep + 1))}
                                    onPrev={() => setActiveStep(Math.max(0, activeStep - 1))}
                                />
                            </AnimatePresence>
                        </motion.div>

                        {/* Footer */}
                        <motion.p className="text-center mt-6 text-[10px] text-white/10 uppercase tracking-[3px]"
                            initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.5 }}>
                            ✦ R3F · Framer Motion · Interactive Form ✦
                        </motion.p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
