<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Architecture Layers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080c;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        #root { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useInView } from 'framer-motion';

        const layers = [
            {
                id: 0,
                name: 'Client Application',
                subtitle: 'React · Next.js · TypeScript',
                icon: '🖥️',
                color: '#818cf8',
                gradient: 'linear-gradient(135deg, #312e81, #1e1b4b)',
                features: ['SSR / SSG', 'Component Library', 'State Management'],
                connections: '↕ REST + GraphQL',
            },
            {
                id: 1,
                name: 'API Gateway',
                subtitle: 'Node.js · Express · Auth',
                icon: '🔀',
                color: '#34d399',
                gradient: 'linear-gradient(135deg, #064e3b, #022c22)',
                features: ['Rate Limiting', 'JWT Auth', 'Load Balancer'],
                connections: '↕ TCP / gRPC',
            },
            {
                id: 2,
                name: 'Microservices',
                subtitle: 'Go · Rust · Python',
                icon: '⚙️',
                color: '#fbbf24',
                gradient: 'linear-gradient(135deg, #78350f, #451a03)',
                features: ['Event Sourcing', 'CQRS', 'Message Queue'],
                connections: '↕ ORM / Query',
            },
            {
                id: 3,
                name: 'Database Layer',
                subtitle: 'PostgreSQL · Redis · S3',
                icon: '🗄️',
                color: '#f472b6',
                gradient: 'linear-gradient(135deg, #831843, #500724)',
                features: ['Replication', 'Sharding', 'Backup'],
                connections: null,
            },
        ];

        /* ── Single Layer Card ── */
        const LayerCard = ({ layer, index, hoveredLayer, setHoveredLayer, isInView }) => {
            const isHovered = hoveredLayer === index;
            const isDimmed = hoveredLayer !== null && hoveredLayer !== index;

            return (
                <motion.div
                    onMouseEnter={() => setHoveredLayer(index)}
                    onMouseLeave={() => setHoveredLayer(null)}
                    initial={{ 
                        translateY: 0,
                        opacity: 0,
                    }}
                    animate={{
                        translateY: isInView ? -(index * 30) : 0,
                        translateZ: isHovered ? 40 : 0,
                        opacity: isInView ? (isDimmed ? 0.4 : 1) : 0,
                        scale: isHovered ? 1.03 : 1,
                    }}
                    transition={{
                        type: 'spring',
                        stiffness: 180,
                        damping: 22,
                        delay: isInView ? index * 0.12 : 0,
                    }}
                    style={{
                        transformPerspective: 1000,
                        rotateX: 58,
                        rotateZ: -45,
                        transformStyle: 'preserve-3d',
                        zIndex: layers.length - index,
                        cursor: 'pointer',
                    }}
                    className="relative"
                >
                    {/* Card Surface */}
                    <div
                        className="relative rounded-2xl overflow-hidden border p-6"
                        style={{
                            width: '360px',
                            minHeight: '140px',
                            background: layer.gradient,
                            borderColor: isHovered ? `${layer.color}60` : 'rgba(255,255,255,0.06)',
                            boxShadow: isHovered
                                ? `0 30px 60px rgba(0,0,0,0.6), 0 0 40px ${layer.color}15, inset 0 1px 0 rgba(255,255,255,0.1)`
                                : '0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05)',
                            transition: 'box-shadow 0.3s ease, border-color 0.3s ease',
                        }}
                    >
                        {/* Glossy shine */}
                        <div
                            className="absolute inset-0 pointer-events-none"
                            style={{
                                background: 'linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, transparent 100%)',
                            }}
                        />

                        {/* Glow line */}
                        <div
                            className="absolute top-0 left-0 right-0 h-[2px]"
                            style={{
                                background: `linear-gradient(90deg, transparent, ${layer.color}60, transparent)`,
                                opacity: isHovered ? 1 : 0.3,
                                transition: 'opacity 0.3s ease',
                            }}
                        />

                        {/* Content */}
                        <div className="relative z-10 flex items-start gap-4">
                            <div
                                className="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                                style={{ background: `${layer.color}15`, border: `1px solid ${layer.color}25` }}
                            >
                                {layer.icon}
                            </div>
                            <div className="flex-1 min-w-0">
                                <h3
                                    className="text-[15px] font-bold mb-0.5"
                                    style={{ color: layer.color }}
                                >
                                    {layer.name}
                                </h3>
                                <p className="text-[11px] text-white/30 font-medium" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                                    {layer.subtitle}
                                </p>

                                {/* Feature tags */}
                                <div className="flex flex-wrap gap-1.5 mt-3">
                                    {layer.features.map((f, i) => (
                                        <span
                                            key={i}
                                            className="px-2 py-0.5 rounded text-[9px] font-semibold uppercase tracking-wider"
                                            style={{
                                                background: `${layer.color}10`,
                                                color: `${layer.color}90`,
                                                border: `1px solid ${layer.color}15`,
                                            }}
                                        >
                                            {f}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Connection arrow */}
                        {layer.connections && (
                            <div
                                className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] font-mono font-semibold z-20"
                                style={{ color: `${layer.color}40` }}
                            >
                                {layer.connections}
                            </div>
                        )}
                    </div>

                    {/* Physical depth shadow (right face) */}
                    <div
                        className="absolute top-2 -right-2 bottom-0 w-3 rounded-r-lg"
                        style={{
                            background: 'rgba(0,0,0,0.4)',
                            transform: 'skewY(-45deg)',
                            transformOrigin: 'top left',
                        }}
                    />
                    {/* Physical depth shadow (bottom face) */}
                    <div
                        className="absolute -bottom-2 left-2 right-0 h-3 rounded-b-lg"
                        style={{
                            background: 'rgba(0,0,0,0.3)',
                            transform: 'skewX(-45deg)',
                            transformOrigin: 'top left',
                        }}
                    />
                </motion.div>
            );
        };

        /* ── App ── */
        const App = () => {
            const [hoveredLayer, setHoveredLayer] = useState(null);
            const containerRef = useRef(null);
            const isInView = useInView(containerRef, { once: true, margin: '-100px' });

            return (
                <div className="flex flex-col lg:flex-row items-center gap-16 px-8">
                    {/* Left Text */}
                    <motion.div
                        initial={{ opacity: 0, x: -40 }}
                        animate={{ opacity: 1, x: 0 }}
                        transition={{ duration: 0.7, delay: 0.2 }}
                        className="max-w-sm"
                    >
                        <span
                            className="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-[3px] mb-5"
                            style={{ background: 'rgba(129,140,248,0.1)', color: '#818cf8', border: '1px solid rgba(129,140,248,0.2)' }}
                        >
                            Architecture
                        </span>
                        <h1
                            className="text-3xl md:text-4xl font-black tracking-tight mb-4 leading-tight"
                            style={{ background: 'linear-gradient(135deg, #fff, rgba(255,255,255,0.5))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}
                        >
                            Modern Stack,<br />Isometric View
                        </h1>
                        <p className="text-sm text-white/25 leading-relaxed mb-6">
                            Explore each layer of our production infrastructure. Hover over any tier to highlight its role in the system architecture.
                        </p>

                        {/* Active layer detail */}
                        {hoveredLayer !== null && (
                            <motion.div
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="p-4 rounded-xl border"
                                style={{
                                    background: `${layers[hoveredLayer].color}08`,
                                    borderColor: `${layers[hoveredLayer].color}20`,
                                }}
                            >
                                <div className="flex items-center gap-2 mb-2">
                                    <span className="text-lg">{layers[hoveredLayer].icon}</span>
                                    <span className="text-sm font-bold" style={{ color: layers[hoveredLayer].color }}>
                                        {layers[hoveredLayer].name}
                                    </span>
                                </div>
                                <p className="text-xs text-white/30 font-mono">{layers[hoveredLayer].subtitle}</p>
                            </motion.div>
                        )}

                        <p className="text-[10px] text-white/10 uppercase tracking-[3px] mt-8">
                            ✦ Pure CSS 3D · No WebGL ✦
                        </p>
                    </motion.div>

                    {/* Right: Isometric Stack */}
                    <div ref={containerRef} className="relative" style={{ paddingTop: '60px', paddingBottom: '60px' }}>
                        <div className="flex flex-col" style={{ gap: '16px' }}>
                            {layers.map((layer, i) => (
                                <LayerCard
                                    key={layer.id}
                                    layer={layer}
                                    index={i}
                                    hoveredLayer={hoveredLayer}
                                    setHoveredLayer={setHoveredLayer}
                                    isInView={isInView}
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
