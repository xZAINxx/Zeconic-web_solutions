<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggressively Animated Aurora Mesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #020617; }
        
        /* I HAVE MASSIVELY INCREASED THE SPEED AND DISTANCE OF THE KEYFRAMES */
        
        @keyframes orbitA {
            0% { transform: translate3d(-20vw, -20vh, 0) scale3d(1, 1, 1) rotate(0deg); opacity: 0.5; }
            50% { transform: translate3d(40vw, 30vh, 0) scale3d(1.8, 0.5, 1) rotate(180deg); opacity: 1; }
            100% { transform: translate3d(-20vw, -20vh, 0) scale3d(1, 1, 1) rotate(360deg); opacity: 0.5; }
        }

        @keyframes orbitB {
            0% { transform: translate3d(30vw, 40vh, 0) scale3d(1, 1, 1) rotate(0deg); opacity: 1; }
            50% { transform: translate3d(-40vw, -30vh, 0) scale3d(0.5, 1.8, 1) rotate(-180deg); opacity: 0.4; }
            100% { transform: translate3d(30vw, 40vh, 0) scale3d(1, 1, 1) rotate(-360deg); opacity: 1; }
        }

        @keyframes orbitC {
            0% { transform: translate3d(0vw, 0vh, 0) scale3d(1.5, 1.5, 1) rotate(0deg); opacity: 0.3; }
            50% { transform: translate3d(30vw, -40vh, 0) scale3d(0.5, 0.5, 1) rotate(90deg); opacity: 0.9; }
            100% { transform: translate3d(0vw, 0vh, 0) scale3d(1.5, 1.5, 1) rotate(180deg); opacity: 0.3; }
        }

        /* Time slashed from 28s down to 6s for extremely visible liquid motion */
        .aurora-1 { animation: orbitA 6s infinite ease-in-out; }
        .aurora-2 { animation: orbitB 8s infinite ease-in-out reverse; }
        .aurora-3 { animation: orbitC 5s infinite ease-in-out; }
        
        /* Inline SVG noise definition */
        .film-grain {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.15;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';

        const AuroraBackground = () => {
            return (
                <div className="relative w-full h-screen overflow-hidden bg-slate-950">
                    
                    <div className="absolute inset-0 z-0 pointer-events-none">
                        <div 
                            className="aurora-1 absolute top-[10%] left-[20%] w-[60vw] h-[60vh] rounded-[40%] mix-blend-screen"
                            style={{ 
                                background: 'radial-gradient(circle, rgba(6,182,212,1) 0%, rgba(6,182,212,0) 70%)',
                                filter: 'blur(80px)'
                            }}
                        ></div>
                        <div 
                            className="aurora-2 absolute top-[40%] right-[10%] w-[70vw] h-[70vh] rounded-[30%] mix-blend-screen"
                            style={{ 
                                background: 'radial-gradient(circle, rgba(139,92,246,1) 0%, rgba(139,92,246,0) 70%)',
                                filter: 'blur(80px)'
                            }}
                        ></div>
                        <div 
                            className="aurora-3 absolute bottom-[-10%] left-[30%] w-[80vw] h-[50vh] rounded-[50%] mix-blend-screen"
                            style={{ 
                                background: 'radial-gradient(circle, rgba(236,72,153,1) 0%, rgba(236,72,153,0) 70%)',
                                filter: 'blur(80px)'
                            }}
                        ></div>
                    </div>

                    <div className="film-grain"></div>

                    <div className="relative z-20 w-full h-full flex flex-col items-center justify-center pointer-events-none mix-blend-difference">
                        <div className="text-center">
                            <h1 className="text-8xl md:text-[140px] font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-500 tracking-tighter leading-none mb-6">
                                Aurora Active.
                            </h1>
                            <p className="text-2xl font-bold text-slate-300 tracking-tight max-w-lg mx-auto">
                                The ambient mesh speeds have been violently multiplied and node filters sharpened.
                            </p>
                        </div>
                    </div>

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<AuroraBackground />);
    </script>
</body>
</html>
