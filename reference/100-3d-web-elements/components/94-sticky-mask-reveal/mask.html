<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Circular Command Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; background: #fafaf9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const FULL_SCREEN_MENU_LINKS = [
            { name: "Deploy Node", sub: "Initialize compute physically." },
            { name: "Architecture", sub: "Review systemic topology planes." },
            { name: "Documentation", sub: "The full codebase map." },
            { name: "System Settings", sub: "Alter core variables directly." }
        ];

        const LiquidMenu = () => {
            const [isOpen, setIsOpen] = useState(false);
            const buttonRef = useRef(null);

            // We need to calculate EXACTLY where the button is on the screen.
            // When the menu opens, the expanding circle clip-path will originate from these precise pixel coordinates.
            const [clipOrigin, setClipOrigin] = useState({ x: 0, y: 0 });

            const toggleMenu = () => {
                if (!isOpen && buttonRef.current) {
                    const rect = buttonRef.current.getBoundingClientRect();
                    // Grab dead center of the button
                    setClipOrigin({
                        x: rect.left + rect.width / 2,
                        y: rect.top + rect.height / 2
                    });
                }
                setIsOpen(!isOpen);
            };

            return (
                <>
                    {/* The Standard Page Scaffold */}
                    <div className="w-full h-screen flex flex-col items-center justify-center p-8 bg-slate-100 z-0 relative">
                        <div className="w-32 h-32 bg-slate-900 shadow-2xl rounded-full flex flex-col items-center justify-center mb-12">
                            <h2 className="text-white font-black text-xl tracking-widest uppercase opacity-50 mb-1">Status</h2>
                            <div className="w-4 h-4 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>
                        </div>

                        <h1 className="text-6xl md:text-8xl font-black text-slate-800 tracking-tighter mb-6 leading-none text-center">Liquid Reveal HUD.</h1>
                        <p className="text-xl font-medium text-slate-500 max-w-xl text-center mb-16 leading-relaxed">
                            Click the action button in the top right. Instead of a solid standard modal teleporting in, the <code className="bg-white px-2 rounded font-bold text-slate-700 shadow-sm">clip-path</code> mask mathematically interpolates radially outward from the exact physical X/Y coordinates of the mouse click event.
                        </p>
                    </div>

                    {/* --- THE INTERACTIVE TRIGGER BUTTON --- */}
                    {/* Positioned absolute top right */}
                    <button 
                        ref={buttonRef}
                        onClick={toggleMenu}
                        className="fixed top-8 right-8 z-[100] w-20 h-20 bg-slate-900 rounded-full flex items-center justify-center text-white shadow-[0_20px_40px_rgba(0,0,0,0.3)] hover:scale-105 active:scale-95 transition-transform"
                    >
                        {/* A tiny animated burger/X icon driven by state */}
                        <div className="relative w-8 h-8 flex items-center justify-center">
                            <motion.span 
                                className="absolute w-8 h-[3px] bg-white rounded-full origin-center"
                                animate={{ rotate: isOpen ? 45 : 0, y: isOpen ? 0 : -8 }}
                            />
                            <motion.span 
                                className="absolute w-8 h-[3px] bg-white rounded-full origin-center"
                                animate={{ opacity: isOpen ? 0 : 1 }}
                            />
                            <motion.span 
                                className="absolute w-8 h-[3px] bg-white rounded-full origin-center"
                                animate={{ rotate: isOpen ? -45 : 0, y: isOpen ? 0 : 8 }}
                            />
                        </div>
                    </button>

                    {/* --- THE FULL SCREEN LIQUID MENU OVERLAY --- */}
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div 
                                className="fixed inset-0 z-50 bg-slate-900 flex flex-col justify-center px-12 md:px-32"
                                // THE MAGIC PIECE:
                                // Animates a circle clip path from 0px (hidden) out to 3000px (massive enough to cover any 4k monitor).
                                // The 'at X Y' uses the exact pixel coordinates we saved when clicking the button!
                                initial={{ clipPath: `circle(0px at ${clipOrigin.x}px ${clipOrigin.y}px)` }}
                                animate={{ clipPath: `circle(3000px at ${clipOrigin.x}px ${clipOrigin.y}px)` }}
                                exit={{ clipPath: `circle(0px at ${clipOrigin.x}px ${clipOrigin.y}px)` }}
                                transition={{ type: "spring", stiffness: 100, damping: 20, mass: 0.5 }}
                            >
                                
                                {/* Background Decorative Element */}
                                <div className="absolute top-[-20vh] right-[-10vw] w-[80vw] h-[80vw] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none"></div>

                                {/* Menu Links container */}
                                <div className="relative z-10 flex flex-col gap-8 w-full max-w-5xl">
                                    <div className="text-indigo-400 font-bold tracking-widest mb-4 uppercase text-sm border-b border-white/10 pb-4">Core Navigation Engine</div>
                                    
                                    {FULL_SCREEN_MENU_LINKS.map((link, i) => (
                                        <motion.a 
                                            key={i} href="#" 
                                            className="group flex flex-col"
                                            // Stagger the text links sliding up gently AFTER the circle expands
                                            initial={{ opacity: 0, y: 40 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0, y: 20 }}
                                            transition={{ delay: 0.1 + (i * 0.05), type: "spring" }}
                                        >
                                            <span className="text-5xl md:text-8xl font-black text-white tracking-tighter group-hover:text-indigo-400 transition-colors leading-[0.9]">{link.name}</span>
                                            <span className="text-slate-500 font-medium text-lg mt-2 group-hover:text-white transition-colors">{link.sub}</span>
                                        </motion.a>
                                    ))}
                                </div>

                            </motion.div>
                        )}
                    </AnimatePresence>
                </>
            );
        };

        const App = () => <LiquidMenu />;
        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
