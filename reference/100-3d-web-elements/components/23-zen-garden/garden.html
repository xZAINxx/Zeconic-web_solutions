<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zen Sand Garden</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #e8e4db;
      width:100%; height:100vh; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      font-family:'Courier New', monospace;
    }
    #canvas-container { position:absolute; inset:0; z-index:1; }
    canvas { display:block; }
    
    .overlay {
      position:relative; z-index:10; pointer-events:none;
      text-align:center;
      opacity: 0.8;
      transition: opacity 1s ease;
    }
    .overlay.hidden { opacity: 0; }

    .eyebrow { font-size:10px; letter-spacing:8px; color:#8a8375; text-transform:uppercase; margin-bottom:16px; }
    h1 { font-size:clamp(2rem, 5vw, 4rem); font-weight:400; letter-spacing:4px; color:#4a453d; line-height:1; margin-bottom:20px; text-transform:uppercase; font-family: serif; }
    
    .cursor-hint {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      font-size:9px; letter-spacing:4px; color:#8a8375; text-transform:uppercase; z-index:10; pointer-events:none;
      transition: opacity 1s ease;
    }
    .cursor-hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="overlay" id="overlay">
  <div class="eyebrow">Interactive Canvas</div>
  <h1>Zen Garden</h1>
</div>
<div class="cursor-hint" id="hint">drag to draw in the sand</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('canvas-container');
let W = container.clientWidth;
let H = container.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(W, H);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// We use an OrthographicCamera so it feels like a top-down 2D canvas but rendered in 3D
const ISO = Math.max(W/20, H/20);
const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
camera.position.set(0, 0, 10);
camera.lookAt(0, 0, 0);

// Basic directional lighting to create shadows into the ripples
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
dirLight.position.set(-10, 10, 5); // Light from top-left casts shadows to bottom-right
scene.add(dirLight);

// ── CUSTOM SHADER MATERIAL FOR RIPPLES ──────────
// We pass mouse trails as an array of points to the fragment shader.

const MAX_POINTS = 50; 
const points = [];
for(let i=0; i<MAX_POINTS; i++) {
  points.push(new THREE.Vector4(-9999, -9999, 0, 0)); // x, y, age, intensity
}

const fragmentShader = `
uniform vec4 uPoints[${MAX_POINTS}];
uniform vec2 uResolution;
uniform float uTime;
uniform vec3 uColor1; // Highlight
uniform vec3 uColor2; // Shadow
uniform vec3 uColorBase; // Sand base

varying vec2 vUv;

// Simple 2D noise for sandy texture
float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

void main() {
    vec2 st = gl_FragCoord.xy;
    
    // Accumulate ripple height from all active points
    float height = 0.0;
    vec2 slope = vec2(0.0);
    
    for(int i = 0; i < ${MAX_POINTS}; i++) {
        vec2 p = uPoints[i].xy;
        float age = uPoints[i].z;
        float intensity = uPoints[i].w;
        
        if(p.x < -9000.0) continue; // Inactive point
        
        vec2 diff = st - p;
        float dist = length(diff);
        
        // Ripple equation: sin(dist * freq - age * speed) * decay
        float decay = exp(-dist * 0.015) * intensity;
        float wave = sin(dist * 0.1 - age * 8.0);
        
        height += wave * decay;
        
        // Calculate slope (derivative) for normal mapping / fake lighting
        slope += diff/dist * cos(dist * 0.1 - age * 8.0) * decay * 0.1;
    }
    
    // Base sand noise
    float r = random(st * 4.0) * 0.08;
    
    // Light calculation (dot product between light dir and surface normal)
    // Surface normal is roughly (-slope.x, -slope.y, 1.0)
    vec3 normal = normalize(vec3(-slope.x, -slope.y, 1.0));
    vec3 lightDir = normalize(vec3(-1.0, 1.0, 0.5)); // Matches THREE DirectionalLight
    
    float light = dot(normal, lightDir);
    
    // Map light to palette
    vec3 color = mix(uColor2, uColor1, clamp(light + height*0.5 + 0.5 + r, 0.0, 1.0));
    
    gl_FragColor = vec4(color, 1.0);
}
`;

const uniforms = {
  uPoints: { value: points },
  uResolution: { value: new THREE.Vector2(W, H) },
  uTime: { value: 0 },
  uColor1: { value: new THREE.Color('#fcfbf7') }, // High peak (sunlit)
  uColor2: { value: new THREE.Color('#c9c3b1') }, // Low trough (shadow)
  uColorBase: { value: new THREE.Color('#e8e4db') } // Flat sand
};

const material = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader,
  uniforms
});

const plane = new THREE.Mesh(new THREE.PlaneGeometry(W, H), material);
scene.add(plane);


// ── INTERACTION LOGIC ─────────────────────────────
let isDragging = false;
let pointIndex = 0;

function addPoint(x, y) {
  // GLSL gl_FragCoord has 0,0 at bottom-left
  const glX = x;
  const glY = H - y;
  
  // Reuse oldest point in ring buffer
  points[pointIndex].set(glX, glY, 0, 1.0);
  pointIndex = (pointIndex + 1) % MAX_POINTS;
  
  // Hide UI overlay on first interaction
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hint').classList.add('hidden');
}

renderer.domElement.addEventListener('mousedown', (e) => { isDragging = true; addPoint(e.clientX, e.clientY); });
renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });
renderer.domElement.addEventListener('mousemove', (e) => {
  if(isDragging) addPoint(e.clientX, e.clientY);
});

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  isDragging = true;
  addPoint(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
renderer.domElement.addEventListener('touchmove', (e) => {
  if(isDragging) addPoint(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});


// ── RENDER LOOP ───────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  
  // Update point ages and decay intensities
  for(let i=0; i<MAX_POINTS; i++) {
    if(points[i].x > -9000) {
      points[i].z += dt; // age
      points[i].w *= 0.98; // exponential decay intensity
      if(points[i].w < 0.01) {
        points[i].x = -9999; // deactivate
      }
    }
  }
  
  uniforms.uTime.value = t;
  // Trigger uniform array update
  uniforms.uPoints.value = points;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  W = container.clientWidth;
  H = container.clientHeight;
  
  camera.left = -W/2;
  camera.right = W/2;
  camera.top = H/2;
  camera.bottom = -H/2;
  camera.updateProjectionMatrix();
  
  plane.geometry.dispose();
  plane.geometry = new THREE.PlaneGeometry(W, H);
  
  renderer.setSize(W, H);
  uniforms.uResolution.value.set(W, H);
});
</script>
</body>
</html>
