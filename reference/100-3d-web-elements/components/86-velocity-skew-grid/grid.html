<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Skew Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #fafafa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useVelocity, useSpring, useTransform } from 'framer-motion';

        const DUMMY_IMAGES = [
            "bg-gradient-to-tr from-fuchsia-100 to-rose-100",
            "bg-gradient-to-tr from-sky-100 to-indigo-100",
            "bg-gradient-to-tr from-emerald-100 to-teal-100",
            "bg-gradient-to-tr from-amber-100 to-orange-100",
            "bg-gradient-to-tr from-slate-100 to-slate-200",
            "bg-gradient-to-tr from-purple-100 to-fuchsia-100",
            "bg-gradient-to-tr from-rose-100 to-red-100",
            "bg-gradient-to-tr from-cyan-100 to-blue-100",
        ];

        const App = () => {
            // Track global scroll progression
            const { scrollY } = useScroll();
            
            // Extract the raw velocity (pixels per frame) from the scroll position
            const scrollVelocity = useVelocity(scrollY);
            
            // Apply a heavy physics spring to dampen the raw velocity, preventing jerky snaps
            const smoothVelocity = useSpring(scrollVelocity, {
                damping: 40,
                stiffness: 200,
                mass: 0.8
            });

            // Map the smoothed velocity strictly to a mild skew degree constraint (-10deg to 10deg)
            const skewY = useTransform(smoothVelocity, [-1500, 1500], [-8, 8], { clamp: false });
            // Add a slight scaling effect for extra physical weight
            const scaleY = useTransform(smoothVelocity, [-1500, 0, 1500], [1.05, 1, 1.05], { clamp: false });

            return (
                <div className="w-full max-w-5xl mx-auto py-32 px-8">
                    
                    <div className="text-center mb-24 max-w-2xl mx-auto">
                        <h1 className="text-6xl font-black text-slate-800 tracking-tighter mb-4">Velocity Skew</h1>
                        <p className="text-slate-500 font-medium text-lg">Scroll rapidly up or down. Framer Motion continuously calculates your scroll velocity integer via requestAnimationFrame, passing it through a spring dampening curve directly to the <code className="bg-slate-100 px-2 py-0.5 rounded text-indigo-500">skewY</code> and <code className="bg-slate-100 px-2 py-0.5 rounded text-indigo-500">scaleY</code> properties of the entire grid. It lends a visceral, fluid weight to generic content arrays.</p>
                    </div>

                    {/* The Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                        {DUMMY_IMAGES.map((bg, idx) => (
                            <motion.div 
                                key={idx}
                                // Apply the mathematical velocity mappings directly inline to bypass React state renders!
                                style={{ skewY, scaleY, transformOrigin: "center center" }}
                                className="w-full will-change-transform"
                            >
                                <div className={`w-full aspect-[4/3] rounded-[32px] ${bg} shadow-sm border border-slate-200/60 overflow-hidden flex items-center justify-center`}>
                                    <div className="w-24 h-24 bg-white/40 backdrop-blur rounded-full border border-white flex items-center justify-center font-bold text-slate-300 text-2xl">
                                        0{idx + 1}
                                    </div>
                                </div>
                                <div className="mt-4 px-2">
                                    <div className="h-4 w-1/3 bg-slate-200 rounded-full mb-2"></div>
                                    <div className="h-3 w-1/4 bg-slate-100 rounded-full"></div>
                                </div>
                            </motion.div>
                        ))}
                        
                        {/* Duplicate for height */}
                        {DUMMY_IMAGES.map((bg, idx) => (
                            <motion.div 
                                key={idx + 8}
                                style={{ skewY, scaleY, transformOrigin: "center center" }}
                                className="w-full"
                            >
                                <div className={`w-full aspect-[4/3] rounded-[32px] ${bg} shadow-sm border border-slate-200/60 overflow-hidden flex items-center justify-center`}>
                                    <div className="w-24 h-24 bg-white/40 backdrop-blur rounded-full border border-white flex items-center justify-center font-bold text-slate-300 text-2xl">
                                        0{idx + 9}
                                    </div>
                                </div>
                                <div className="mt-4 px-2">
                                    <div className="h-4 w-1/3 bg-slate-200 rounded-full mb-2"></div>
                                    <div className="h-3 w-1/4 bg-slate-100 rounded-full"></div>
                                </div>
                            </motion.div>
                        ))}
                    </div>

                    <div className="py-32 text-center text-slate-400 font-bold uppercase tracking-widest text-xl">
                        End of Grid
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
