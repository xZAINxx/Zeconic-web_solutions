<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Physical Multi-Select Tags</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0f172a; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .hardware-accelerated {
            transform: translateZ(0);
            will-change: transform, box-shadow;
        }

        /* Create a subtle grid background to establish the "desk" */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-grid">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';

        const filterCategories = [
            "React", "3D UI", "Tailwind", "Framer Motion", 
            "WebGL", "Physics", "Spatial Computing", "Embossed",
            "Premium", "Interactions", "E-commerce"
        ];

        const App = () => {
            const [selectedArgs, setSelectedArgs] = useState(['React', '3D UI']);

            const toggleTag = (tag) => {
                setSelectedArgs(prev => 
                    prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]
                );
            };

            return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 relative">
                    {/* Atmospheric Lighting */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[600px] bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

                    <div className="text-center mb-20 z-10">
                        <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400 mb-6 drop-shadow-lg">Filter Technologies</h1>
                        <p className="text-slate-400 font-medium tracking-wide">Select your stack. Witness tactile physics.</p>
                    </div>

                    <div className="max-w-4xl flex flex-wrap gap-x-6 gap-y-8 justify-center z-10">
                        {filterCategories.map((tag) => {
                            const isSelected = selectedArgs.includes(tag);
                            
                            return (
                                <motion.button
                                    key={tag}
                                    onClick={() => toggleTag(tag)}
                                    layout
                                    initial={false}
                                    animate={{
                                        y: isSelected ? 6 : 0, // Physically depresses by 6px
                                        scale: isSelected ? 0.98 : 1,
                                        color: isSelected ? "#38bdf8" : "#94a3b8", // Sky blue text when active
                                    }}
                                    whileHover={{
                                        // Slight brightness pop on hover if NOT selected
                                        scale: isSelected ? 0.98 : 1.02,
                                        y: isSelected ? 6 : -2
                                    }}
                                    whileTap={{ 
                                        // Harder physical bottom-out
                                        scale: 0.95, 
                                        y: 8 
                                    }}
                                    transition={{ 
                                        type: "spring", 
                                        stiffness: 500, 
                                        damping: 25, 
                                        mass: 0.5 
                                    }}
                                    className={`
                                        relative px-8 py-4 rounded-[20px] font-bold tracking-wide text-lg outline-none cursor-pointer
                                        hardware-accelerated transition-colors duration-300
                                        ${isSelected ? 'bg-slate-900' : 'bg-slate-800'}
                                    `}
                                    style={{
                                        // The magic is in the shadows switching from an outer drop shadow to an inner cavity shadow
                                        boxShadow: isSelected 
                                            ? `
                                                inset 0 6px 15px rgba(0,0,0,0.8), /* Deep inside well */
                                                inset 0 -2px 5px rgba(255,255,255,0.02), /* subtle bottom rim reflection */
                                                inset 0 0 0 1.5px rgba(56, 189, 248, 0.4), /* Neon inset border */
                                                0 0 30px rgba(56, 189, 248, 0.15) /* Outer glow on the desk */
                                              `
                                            : `
                                                0 10px 20px -5px rgba(0,0,0,0.6), /* Standard drop shadow */
                                                0 6px 10px -5px rgba(0,0,0,0.4),
                                                inset 0 1.5px 1px rgba(255,255,255,0.1), /* Top rim highlight (plastic reflection) */
                                                inset 0 -2px 6px rgba(0,0,0,0.4), /* Inner bottom shadow giving thickness */
                                                inset 0 0 0 1px rgba(255,255,255,0.05) /* Subtle structural border */
                                              `,
                                        textShadow: isSelected ? "0 0 12px rgba(56,189,248,0.6)" : "none"
                                    }}
                                >
                                    {tag}
                                </motion.button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
