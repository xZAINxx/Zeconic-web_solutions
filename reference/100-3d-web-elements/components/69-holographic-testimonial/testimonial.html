<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Holographic Testimonial Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; }
        .preserve-3d { transform-style: preserve-3d; }
        
        /* The iridescent foil effect */
        .foil-glare {
            background: linear-gradient(
                125deg, 
                transparent 0%, 
                rgba(255,255,255,0.05) 30%, 
                rgba(255,100,200,0.3) 40%, 
                rgba(100,200,255,0.4) 50%, 
                rgba(255,255,100,0.3) 60%, 
                rgba(255,255,255,0.05) 70%, 
                transparent 100%
            );
            background-size: 200% 200%;
            mix-blend-mode: color-dodge;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform } from 'framer-motion';

        const App = () => {
            const containerRef = useRef(null);
            
            const mouseX = useMotionValue(0.5);
            const mouseY = useMotionValue(0.5);

            const smoothX = useSpring(mouseX, { damping: 20, stiffness: 150 });
            const smoothY = useSpring(mouseY, { damping: 20, stiffness: 150 });

            // Aggressive rotations for 3D card tilt
            const rotateX = useTransform(smoothY, [0, 1], [30, -30]);
            const rotateY = useTransform(smoothX, [0, 1], [-30, 30]);

            // Background positioning for Holographic Foil Glare
            const glareX = useTransform(smoothX, [0, 1], ["0%", "100%"]);
            const glareY = useTransform(smoothY, [0, 1], ["0%", "100%"]);

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                mouseX.set((e.clientX - rect.left) / rect.width);
                mouseY.set((e.clientY - rect.top) / rect.height);
            };

            const handleMouseLeave = () => {
                mouseX.set(0.5);
                mouseY.set(0.5);
            };

            return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 preserve-3d" style={{ perspective: 1500 }}>
                    <h2 className="text-3xl font-black text-slate-100 mb-12 tracking-tighter">Wall of Love</h2>
                    
                    <motion.div
                        ref={containerRef}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        className="relative w-[340px] h-[480px] rounded-3xl preserve-3d cursor-crosshair"
                        style={{ rotateX, rotateY }}
                        whileHover={{ scale: 1.05 }}
                        transition={{ duration: 0.3 }}
                    >
                        {/* Floor shadow */}
                        <motion.div 
                            className="absolute -inset-4 bg-indigo-500/30 rounded-full blur-[40px] pointer-events-none"
                            style={{ 
                                x: useTransform(smoothX, [0, 1], [30, -30]),
                                y: useTransform(smoothY, [0, 1], [30, -30]),
                                translateZ: -100 
                            }}
                        />

                        {/* Card Background / Base */}
                        <div className="absolute inset-0 bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl border border-slate-600/50 shadow-xl overflow-hidden pointer-events-none">
                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(129,140,248,0.2),transparent_50%)]"></div>
                        </div>

                        {/* Holographic Foil Layer */}
                        <motion.div 
                            className="absolute inset-0 rounded-3xl foil-glare opacity-0 transition-opacity duration-300 pointer-events-none mix-blend-color-dodge z-30"
                            style={{ backgroundPositionX: glareX, backgroundPositionY: glareY }}
                            whileHover={{ opacity: 1 }}
                        />

                        <div className="absolute inset-0 rounded-3xl preserve-3d p-8 flex flex-col pointer-events-none">
                            {/* Stars Floating slightly */}
                            <div className="flex gap-1 mb-8" style={{ transform: 'translateZ(20px)' }}>
                                {[1,2,3,4,5].map(i => (
                                    <svg key={i} className="w-5 h-5 text-amber-400 drop-shadow-md" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                ))}
                            </div>

                            {/* Quote Text Floating higher */}
                            <p className="text-xl font-semibold text-slate-100 leading-snug drop-shadow-lg mb-auto preserve-3d" style={{ transform: 'translateZ(30px)' }}>
                                "The spatial depth logic in this template completely transformed our conversion rates. It literally jumps off the screen. Unbelievable performance."
                            </p>

                            <div className="mt-8 pt-6 border-t border-white/10 preserve-3d flex items-center justify-between" style={{ transform: 'translateZ(10px)' }}>
                                <div>
                                    <h4 className="font-bold text-white text-lg drop-shadow">Sarah Jenkins</h4>
                                    <p className="text-sky-400 text-sm font-medium">VP Engineering, Vercel</p>
                                </div>
                            </div>
                        </div>

                        {/* The Aggressive 3D Character/Portrait Image taking up right side space */}
                        {/* We use an abstract 3D looking shape since we don't have an image, but style it aggressively forward */}
                        <motion.div 
                            className="absolute -right-8 bottom-12 w-48 h-48 drop-shadow-[0_20px_20px_rgba(0,0,0,0.8)] pointer-events-none"
                            style={{ transform: 'translateZ(80px)' }}
                        >
                            <img src="https://illustrations.popsy.co/amber/freelancer.svg" className="w-full h-full object-contain filter hue-rotate-15" alt="3D character" />
                        </motion.div>

                    </motion.div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
