<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Cart Button</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #06060f; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, animate, useMotionValue, useTransform } from 'framer-motion';

        const CartIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 20, height: 20 }}>
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
        );

        const stages = ['idle', 'animating', 'success'];

        const AddToCartButton = () => {
            const [stage, setStage] = useState('idle');
            const isAnimating = stage !== 'idle';

            const handleClick = async () => {
                if (isAnimating) return;
                setStage('animating');
                // After animation sequence completes, show success then reset
                await new Promise(r => setTimeout(r, 900));
                setStage('success');
                await new Promise(r => setTimeout(r, 1500));
                setStage('idle');
            };

            const buttonColor = stage === 'success'
                ? 'linear-gradient(135deg, #16a34a, #15803d)'
                : 'linear-gradient(135deg, #6366f1, #8b5cf6)';
            const buttonShadow = stage === 'success'
                ? '0 4px 25px rgba(22,163,74,0.55), 0 0 0 3px rgba(22,163,74,0.2)'
                : '0 4px 25px rgba(99,102,241,0.45)';

            return (
                <motion.button
                    onClick={handleClick}
                    className="relative px-8 py-4 rounded-2xl font-semibold text-sm cursor-pointer overflow-hidden select-none"
                    style={{
                        background: buttonColor,
                        boxShadow: buttonShadow,
                        border: '1px solid rgba(255,255,255,0.15)',
                        minWidth: 200,
                        height: 56,
                        perspective: '400px',
                        transformStyle: 'preserve-3d',
                        transition: 'background 0.4s, box-shadow 0.4s',
                    }}
                    whileHover={!isAnimating ? { scale: 1.04 } : {}}
                    whileTap={!isAnimating ? { scale: 0.97 } : {}}
                >
                    {/* "Add to Cart" text that folds away */}
                    <motion.span
                        className="absolute inset-0 flex items-center justify-center gap-2.5"
                        animate={stage === 'animating' || stage === 'success' ? {
                            rotateX: 90,
                            opacity: 0,
                            y: -10,
                        } : { rotateX: 0, opacity: 1, y: 0 }}
                        transition={{ duration: 0.22, ease: 'easeIn' }}
                        style={{ transformOrigin: 'top center', backfaceVisibility: 'hidden' }}
                    >
                        <CartIcon />
                        Add to Cart
                    </motion.span>

                    {/* The falling 3D product cube */}
                    {stage === 'animating' && (
                        <motion.div
                            className="absolute"
                            style={{
                                width: 20, height: 20,
                                left: '50%', marginLeft: -10,
                                background: 'linear-gradient(135deg, #f9fafb, #e2e8f0)',
                                borderRadius: 4,
                                boxShadow: '2px 2px 6px rgba(0,0,0,0.4), inset 1px 1px 0 rgba(255,255,255,0.8)',
                                transformStyle: 'preserve-3d',
                            }}
                            initial={{ top: -20, rotate: -15, rotateX: -30, opacity: 1 }}
                            animate={{ top: 38, rotate: 15, rotateX: 30, opacity: 0 }}
                            transition={{ duration: 0.65, ease: 'easeIn' }}
                        />
                    )}

                    {/* Success text */}
                    <motion.span
                        className="absolute inset-0 flex items-center justify-center gap-2.5"
                        animate={stage === 'success' ? {
                            rotateX: 0, opacity: 1, y: 0,
                        } : { rotateX: -90, opacity: 0, y: 10 }}
                        transition={{ duration: 0.22, ease: 'easeOut', delay: stage === 'success' ? 0.05 : 0 }}
                        style={{ transformOrigin: 'bottom center', backfaceVisibility: 'hidden' }}
                    >
                        <motion.span
                            animate={stage === 'success' ? { scale: [0.5, 1.2, 1], opacity: 1 } : { scale: 0, opacity: 0 }}
                            transition={{ duration: 0.35 }}
                        >
                            ✓
                        </motion.span>
                        Added!
                    </motion.span>
                </motion.button>
            );
        };

        const App = () => (
            <>
                <div className="text-center">
                    <p className="text-xs uppercase tracking-[0.3em] text-slate-600 mb-2">3D Micro-Interaction</p>
                    <h1 className="text-4xl font-bold text-white mb-2">Add to Cart</h1>
                    <p className="text-slate-500 text-sm">Click the button below</p>
                </div>

                {/* Product card */}
                <div className="flex flex-col items-center p-8 rounded-3xl gap-6"
                    style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', backdropFilter: 'blur(10px)', width: 320 }}>
                    <div className="w-full h-40 rounded-2xl flex items-center justify-center text-6xl"
                        style={{ background: 'linear-gradient(135deg, #1e1b4b, #312e81)' }}>
                        📦
                    </div>
                    <div className="w-full">
                        <p className="text-white font-semibold text-lg">Premium Widget Pro</p>
                        <p className="text-slate-500 text-sm mt-1">The most satisfying button interaction.</p>
                        <div className="flex items-center justify-between mt-4">
                            <span className="text-2xl font-bold text-indigo-400">$49</span>
                            <AddToCartButton />
                        </div>
                    </div>
                </div>
            </>
        );

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
