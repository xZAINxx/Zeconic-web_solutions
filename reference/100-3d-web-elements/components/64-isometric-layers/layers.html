<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Isometric Layered Feature Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden;}
        .preserve-3d { transform-style: preserve-3d; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';

        const layers = [
            { id: 1, name: "Database", type: "PostgreSQL", color: "from-blue-500 to-cyan-400\ud83d\uddff", icon: " \uD83D\uDDC4\uFE0F " },
            { id: 2, name: "API Layer", type: "GraphQL", color: "from-pink-500 to-rose-400\ud83d\uddff", icon: " \u26A1 " },
            { id: 3, name: "Logic Core", type: "Node.js", color: "from-emerald-500 to-teal-400\ud83d\uddff", icon: " \u2699\uFE0F " },
            { id: 4, name: "Frontend", type: "React UI", color: "from-violet-500 to-purple-400\ud83d\uddff", icon: " \uD83D\uDCBB " }
        ];

        const App = () => {
            const [isHoveredStack, setIsHoveredStack] = useState(false);
            const [hoveredLayerIndex, setHoveredLayerIndex] = useState(null);

            return (
                <div className="w-full flex items-center justify-center p-8 preserve-3d relative" style={{ perspective: 2000 }}>
                    
                    <div className="absolute top-12 left-12 max-w-sm">
                        <h1 className="text-4xl font-black text-slate-800 mb-4 tracking-tight">Full Stack Architecture.</h1>
                        <p className="text-slate-500 font-medium">Hover over the spatial stack to explode the architecture into its individual isometric planes. Select a layer to isolate it.</p>
                    </div>

                    <motion.div 
                        className="relative w-[320px] h-[400px] preserve-3d"
                        // Base isometric rotation
                        initial={{ rotateX: 60, rotateZ: -45, scale: 0.9 }}
                        animate={{ 
                            rotateX: isHoveredStack ? 55 : 60, 
                            rotateZ: isHoveredStack ? -40 : -45,
                            scale: 1 
                        }}
                        transition={{ type: "spring", stiffness: 100, damping: 20 }}
                        onMouseEnter={() => setIsHoveredStack(true)}
                        onMouseLeave={() => { setIsHoveredStack(false); setHoveredLayerIndex(null); }}
                    >
                        <div className="absolute inset-0 preserve-3d" style={{ pointerEvents: isHoveredStack ? 'auto' : 'none' }}>
                            {layers.map((layer, i) => {
                                // When stacked perfectly (not hovered), z offset is tiny to prevent z-fighting
                                const restingZ = i * 2;
                                
                                // When exploding (stack hovered), spread them significantly apart in Z space
                                const explodedZ = i * 80;

                                // If a specific layer is hovered, bring it even further forward and push others back
                                const isThisLayerHovered = hoveredLayerIndex === i;
                                const isOtherLayerHovered = hoveredLayerIndex !== null && hoveredLayerIndex !== i;
                                
                                let targetZ = isHoveredStack ? explodedZ : restingZ;
                                if (isThisLayerHovered) targetZ += 20;

                                let opacity = 1;
                                if (isOtherLayerHovered) opacity = 0.3;

                                return (
                                    <motion.div
                                        key={layer.id}
                                        className="absolute inset-0 rounded-[32px] preserve-3d cursor-pointer"
                                        style={{ pointerEvents: isHoveredStack ? 'auto' : 'none' }}
                                        animate={{ z: targetZ, opacity: opacity }}
                                        transition={{ 
                                            type: "spring", 
                                            stiffness: 300, 
                                            damping: 25,
                                            mass: 1,
                                            // Stagger the explosion out from bottom to top
                                            delay: isHoveredStack && hoveredLayerIndex === null ? i * 0.05 : 0 
                                        }}
                                        onMouseEnter={() => setHoveredLayerIndex(i)}
                                        onMouseLeave={() => setHoveredLayerIndex(null)}
                                    >
                                        {/* Physical Drop Shadow casting onto layers below */}
                                        <motion.div 
                                            className="absolute inset-0 bg-black rounded-[32px] pointer-events-none"
                                            animate={{ 
                                                opacity: isHoveredStack ? 0.15 : 0.4,
                                                z: -20, // shadow sits 20px below its card
                                                filter: isHoveredStack ? "blur(20px)" : "blur(5px)"
                                            }}
                                            transition={{ duration: 0.3 }}
                                        />

                                        {/* Real Sub-card UI layer */}
                                        <div className={`w-full h-full bg-gradient-to-br ${layer.color.replace('\ud83d\uddff','')} opacity-90 backdrop-blur-md rounded-[32px] border border-white/30 shadow-[inset_0_0_20px_rgba(255,255,255,0.4)] flex flex-col justify-between p-8 text-white preserve-3d overflow-hidden`}>
                                            {/* Decorative circuit pattern overlay */}
                                            <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,white_1px,transparent_1px)]" style={{ backgroundSize: '16px 16px' }}></div>
                                            
                                            <div className="flex justify-between items-start relative z-10 preserve-3d">
                                                <div className="text-4xl">{layer.icon}</div>
                                                <div className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider backdrop-blur-sm shadow-sm border border-white/20">
                                                    Layer 0{i+1}
                                                </div>
                                            </div>
                                            
                                            <div className="relative z-10 preserve-3d">
                                                <p className="text-white/80 font-semibold mb-1 uppercase tracking-widest text-sm">{layer.name}</p>
                                                <h2 className="text-3xl font-black tracking-tight">{layer.type}</h2>
                                            </div>
                                        </div>
                                    </motion.div>
                                );
                            })}
                        </div>
                    </motion.div>
                    
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
