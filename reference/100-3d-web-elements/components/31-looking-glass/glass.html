<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looking Glass Typography</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['"Anton"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #050505; color: white; overflow-x: hidden; }
        
        .hollow-text {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.8);
            /* Optional subtle glow */
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        /* Prevent scroll jank during scale */
        .will-change-transform {
            will-change: transform;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, Suspense } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useTransform, useSpring } from 'framer-motion';
        import * as THREE from 'three';
        import { Canvas, useFrame } from '@react-three/fiber';
        import { Text3D, Center } from '@react-three/drei';

        const CameraFly = ({ scrollProgress }) => {
            useFrame((state) => {
                // Fly the camera from z=15 (zoomed out) to z=-2 (passed completely through the text)
                const startZ = 15;
                const endZ = -2;
                state.camera.position.z = startZ - scrollProgress.get() * (startZ - endZ);
                
                // Add a very subtle tracking sway
                state.camera.position.x = Math.sin(scrollProgress.get() * Math.PI) * 0.5;
                state.camera.position.y = Math.cos(scrollProgress.get() * Math.PI) * 0.2 - 0.2;
                state.camera.lookAt(0, 0, endZ);
            });
            return null;
        }

        const LookingGlass = () => {
            const containerRef = useRef(null);
            
            const { scrollYProgress } = useScroll({
                target: containerRef,
                offset: ["start start", "end end"]
            });

            const smoothProgress = useSpring(scrollYProgress, {
                damping: 25,
                stiffness: 120,
                mass: 0.5
            });

            // Fade in the background content perfectly as we pass through the hole
            const contentOpacity = useTransform(smoothProgress, [0.85, 0.95], [0, 1]);

            // Highly optimized lightweight font for Text3D
            const FONT_URL = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/helvetiker_bold.typeface.json";

            return (
                <div ref={containerRef} className="relative w-full h-[300vh] bg-neutral-950">
                    
                    {/* The sticky 3D container that holds the pinned canvas */}
                    <div className="sticky top-0 left-0 w-full h-screen overflow-hidden flex items-center justify-center bg-black z-20 pointer-events-none">
                        <Canvas camera={{ position: [0, 0, 15], fov: 45 }}>
                            <CameraFly scrollProgress={smoothProgress} />
                            
                            <Suspense fallback={null}>
                                <Center>
                                    <Text3D 
                                        font={FONT_URL}
                                        size={5}
                                        height={0.5} 
                                        curveSegments={4} // Super low for performance
                                        bevelEnabled={false}
                                    >
                                        SCOPE
                                        {/* Pure basic material constraints as requested */}
                                        <meshBasicMaterial 
                                            color="#ffffff" 
                                            wireframe={true} 
                                            transparent 
                                            opacity={0.8}
                                        />
                                    </Text3D>
                                </Center>
                            </Suspense>
                        </Canvas>
                    </div>

                    {/* The hidden content section revealed after zooming physically "Through" the text */}
                    {/* Positioned fixed so when the canvas fades/passes, this is revealed fully visible underneath */}
                    <motion.div 
                        style={{ opacity: contentOpacity }}
                        className="fixed top-0 left-0 w-full h-screen flex items-center justify-center z-10 bg-gradient-to-br from-indigo-950 to-neutral-950"
                    >
                        <div className="text-center max-w-2xl px-6">
                            <h2 className="text-5xl md:text-7xl font-bold mb-6 tracking-tighter mix-blend-screen text-white">
                                The Other Side
                            </h2>
                            <p className="text-xl text-indigo-200/60 leading-relaxed font-light">
                                Pure hardware-accelerated WebGL spatial environments achieved through Frame Motion tied natively to the Three.js camera matrix.
                            </p>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="w-full">
                    {/* Intro Section before hitting the zoom track */}
                    <div className="h-screen w-full flex items-center justify-center bg-neutral-900">
                        <p className="text-neutral-500 uppercase tracking-widest text-sm animate-pulse">
                            Scroll down to enter
                        </p>
                    </div>

                    <LookingGlass />

                    {/* Footer Section */}
                    <div className="h-[50vh] w-full bg-neutral-950 border-t border-white/5 flex items-center justify-center">
                        <p className="text-neutral-600 font-mono text-xs">END OF SEQUENCE</p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
