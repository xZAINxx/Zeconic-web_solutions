<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mechanical Flip-Clock Promo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        .preserve-3d { transform-style: preserve-3d; perspective: 1200px; }
        .flap-card {
            background: linear-gradient(180deg, #2a2a2a 0%, #171717 100%);
            color: #f1f5f9;
            border: 1px solid #111;
        }
        .flap-top {
            clip-path: inset(0 0 50% 0);
            border-bottom: 1px solid #000;
        }
        .flap-bottom {
            clip-path: inset(50% 0 0 0);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';

        const TrueSplitFlap = ({ value, label }) => {
            const [prev, setPrev] = useState(value);
            const [isFlipping, setIsFlipping] = useState(false);

            useEffect(() => {
                if (value !== prev) {
                    setIsFlipping(true);
                    const timer = setTimeout(() => {
                        setIsFlipping(false);
                        setPrev(value);
                    }, 600); // Wait for flip to complete
                    return () => clearTimeout(timer);
                }
            }, [value, prev]);

            const currentStr = String(value).padStart(2, '0');
            const prevStr = String(prev).padStart(2, '0');

            return (
                <div className="flex flex-col items-center mx-1 md:mx-3">
                    <div className="relative w-28 md:w-36 h-36 md:h-48 rounded-2xl preserve-3d text-7xl md:text-8xl font-black flex items-center justify-center shadow-[0_20px_50px_rgba(0,0,0,0.9)] bg-black">
                        
                        {/* Static Bottom (New Value) */}
                        <div className="absolute inset-0 flap-card rounded-2xl flex items-center justify-center flap-bottom z-10 text-glow">
                            <span className="translate-y-[-2px]">{currentStr}</span>
                        </div>
                        
                        {/* Static Top (New Value) */}
                        <div className="absolute inset-0 flap-card rounded-2xl flex items-center justify-center flap-top z-10 text-glow">
                            <span className="translate-y-[-2px]">{currentStr}</span>
                        </div>

                        {/* Static Bottom (Old Value) - Visible before the flap lands on it */}
                        <div className="absolute inset-0 flap-card rounded-2xl flex items-center justify-center flap-bottom z-10 text-glow shadow-[inset_0_20px_30px_rgba(0,0,0,0.5)]">
                            <span className="translate-y-[-2px]">{prevStr}</span>
                        </div>

                        {/* Flipping Flap */}
                        {isFlipping && (
                            <motion.div
                                className="absolute inset-0 preserve-3d z-30"
                                initial={{ rotateX: 0 }}
                                animate={{ rotateX: -180 }}
                                transition={{ type: "spring", stiffness: 60, damping: 14 }} // snappiness + gravity
                                style={{ transformOrigin: "center" }}
                            >
                                {/* Front of flap (shows Old Top) */}
                                <div className="absolute inset-0 flap-card rounded-2xl flex items-center justify-center flap-top" style={{ backfaceVisibility: "hidden" }}>
                                    <span className="translate-y-[-2px]">{prevStr}</span>
                                </div>
                                {/* Back of flap (shows New Bottom) */}
                                <div className="absolute inset-0 flap-card rounded-2xl flex items-center justify-center flap-bottom bg-[#1f1f1f]" style={{ backfaceVisibility: "hidden", transform: "rotateX(180deg)" }}>
                                    <span className="translate-y-[-2px]">{currentStr}</span>
                                </div>
                            </motion.div>
                        )}
                        
                        {/* Center hinge styling */}
                        <div className="absolute top-1/2 left-0 w-full h-[3px] bg-black/95 z-40 -translate-y-1/2"></div>
                        <div className="absolute top-1/2 left-0 w-full h-[1px] bg-white/10 z-40 -translate-y-[2px]"></div>
                        
                        {/* Hinge pins */}
                        <div className="absolute top-1/2 -left-2 w-4 h-4 bg-[#111] rounded-full z-40 -translate-y-1/2 shadow-[inset_0_2px_4px_rgba(0,0,0,0.9)] border border-white/10"></div>
                        <div className="absolute top-1/2 -right-2 w-4 h-4 bg-[#111] rounded-full z-40 -translate-y-1/2 shadow-[inset_0_2px_4px_rgba(0,0,0,0.9)] border border-white/10"></div>
                    </div>
                    <span className="mt-8 text-slate-500 font-bold tracking-[0.4em] uppercase text-xs md:text-sm drop-shadow-md">{label}</span>
                </div>
            );
        };

        const App = () => {
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const interval = setInterval(() => {
                    setTime(new Date());
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="flex flex-col items-center justify-center w-full h-full preserve-3d">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(255,255,255,0.05)_0%,transparent_70%)] pointer-events-none"></div>
                    
                    <h1 className="text-3xl font-extrabold text-white mb-16 tracking-widest drop-shadow-2xl">PROMO ENDS IN</h1>

                    <div className="flex items-center gap-2 transform translate-z-[100px]">
                        <TrueSplitFlap value={time.getHours()} label="Hours" />
                        <div className="text-5xl text-slate-800 font-black mb-16">:</div>
                        <TrueSplitFlap value={time.getMinutes()} label="Minutes" />
                        <div className="text-5xl text-slate-800 font-black mb-16">:</div>
                        <TrueSplitFlap value={time.getSeconds()} label="Seconds" />
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
