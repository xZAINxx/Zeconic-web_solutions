<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Abstract Blob Background</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #030014; color: white; overflow: hidden; }
        #root { width: 100vw; height: 100vh; position: relative; }
        
        /* Subtle radial gradient to frame the center blob */
        .bg-gradient {
            background: radial-gradient(circle at center, rgb(15, 5, 40) 0%, rgb(3, 0, 20) 100%);
        }
    </style>
</head>
<body>
    <div id="root" class="bg-gradient flex items-center justify-center"></div>

    <!-- Import Map for React, Three, and R3F ecosystem -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <!-- Babel for compiling JSX -->
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, Suspense } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Canvas, useFrame } from '@react-three/fiber';
        import { MeshDistortMaterial, Float } from '@react-three/drei';

        const Blob = () => {
            const materialRef = useRef(null);
            const groupRef = useRef(null);

            // Animate rotation towards mouse pointer
            useFrame((state, delta) => {
                if (groupRef.current) {
                    // Normalized pointer coordinates (-1 to 1)
                    const targetX = state.pointer.x * Math.PI * 0.25;
                    const targetY = state.pointer.y * Math.PI * 0.25;
                    
                    // Smooth lerp rotation toward cursor
                    groupRef.current.rotation.y += (targetX - groupRef.current.rotation.y) * delta * 5;
                    groupRef.current.rotation.x += (-targetY - groupRef.current.rotation.x) * delta * 5;
                    
                    // Slow baseline ambient rotation
                    groupRef.current.rotation.z += delta * 0.15;
                }
                
                // Animate distortion speed organically
                if (materialRef.current) {
                    materialRef.current.distort = 0.4 + Math.sin(state.clock.elapsedTime * 0.5) * 0.15;
                }
            });

            return (
                <Float speed={1.5} rotationIntensity={1.5} floatIntensity={2}>
                    <group ref={groupRef}>
                        <mesh scale={2.5}>
                            {/* Low poly for massive performance boost */}
                            <sphereGeometry args={[1, 32, 32]} /> 
                            <MeshDistortMaterial
                                ref={materialRef}
                                color="#2e1065" // Deep violet base
                                emissive="#0f0524" // Dark core
                                roughness={0.1} // Glossy
                                metalness={0.9} // Highly reflective
                                clearcoat={1} // Liquid-like slick outer layer
                                clearcoatRoughness={0.1}
                                speed={2} // Undulation speed
                            />
                        </mesh>
                    </group>
                </Float>
            );
        }

        const Scene = () => {
            return (
                <Canvas camera={{ position: [0, 0, 8], fov: 45 }} dpr={[1, 1.5]}>
                    <color attach="background" args={['transparent']} />
                    
                    {/* Basic, performant lighting strategy */}
                    <ambientLight intensity={0.5} />
                    <directionalLight position={[10, 10, 5]} intensity={2} color="#c084fc" />
                    <directionalLight position={[-10, -10, -5]} intensity={2} color="#38bdf8" />

                    <Suspense fallback={null}>
                        <Blob />
                    </Suspense>
                </Canvas>
            );
        };

        const App = () => {
            return (
                <div className="relative w-full h-full">
                    {/* The 3D Canvas Background */}
                    <div className="absolute inset-0 z-0 pointer-events-none">
                        <Scene />
                    </div>

                    {/* Example Foreground Content to prove it's a valid background component */}
                    <div className="absolute inset-0 z-10 flex flex-col items-center justify-center text-center px-4 mix-blend-screen pointer-events-none">
                        <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-white/40 mb-4 tracking-tighter">
                            Fluid Spaces
                        </h1>
                        <p className="text-lg md:text-xl text-indigo-200/80 max-w-lg font-light">
                            A highly performant, shader-driven topological background perfectly suited for modern immersive experiences.
                        </p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
