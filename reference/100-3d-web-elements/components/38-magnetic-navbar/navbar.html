<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Glass Dock Navbar</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useTransform, useSpring, AnimatePresence } from 'framer-motion';

        const NAV_ITEMS = [
            { label: 'Home', icon: '⌂' },
            { label: 'Work', icon: '◈' },
            { label: 'About', icon: '◉' },
            { label: 'Blog', icon: '✦' },
            { label: 'Contact', icon: '✉' },
        ];

        const NavItem = ({ item, isActive, onClick }) => {
            const ref = useRef(null);
            const spotlightX = useMotionValue(0);
            const spotlightY = useMotionValue(0);
            const spotlightOpacity = useMotionValue(0);

            const handleMouseMove = useCallback((e) => {
                const rect = ref.current?.getBoundingClientRect();
                if (!rect) return;
                spotlightX.set(e.clientX - rect.left);
                spotlightY.set(e.clientY - rect.top);
            }, []);

            return (
                <motion.button
                    ref={ref}
                    onClick={onClick}
                    onMouseMove={handleMouseMove}
                    onHoverStart={() => spotlightOpacity.set(1)}
                    onHoverEnd={() => spotlightOpacity.set(0)}
                    className="relative px-5 py-2.5 rounded-xl text-sm font-medium transition-colors cursor-pointer overflow-hidden"
                    style={{ color: isActive ? '#e0e7ff' : '#94a3b8' }}
                    whileHover={{ color: '#e0e7ff', scale: 1.05 }}
                    whileTap={{ scale: 0.95 }}
                    transition={{ type: 'spring', stiffness: 400, damping: 20 }}
                >
                    <motion.div
                        className="absolute inset-0 rounded-xl pointer-events-none"
                        style={{
                            background: useTransform(
                                [spotlightX, spotlightY],
                                ([x, y]) => `radial-gradient(120px circle at ${x}px ${y}px, rgba(139,92,246,0.35), transparent 70%)`
                            ),
                            opacity: useSpring(spotlightOpacity, { stiffness: 300, damping: 30 }),
                        }}
                    />
                    {isActive && (
                        <motion.div
                            layoutId="activeTab"
                            className="absolute inset-0 rounded-xl"
                            style={{ background: 'rgba(139, 92, 246, 0.15)', border: '1px solid rgba(139, 92, 246, 0.3)' }}
                            transition={{ type: 'spring', stiffness: 400, damping: 30 }}
                        />
                    )}
                    <span className="relative z-10 flex items-center gap-2">
                        <span className="text-base">{item.icon}</span>
                        <span>{item.label}</span>
                    </span>
                </motion.button>
            );
        };

        const MagneticDock = () => {
            const [activeIndex, setActiveIndex] = useState(0);
            const dockRef = useRef(null);
            const mouseX = useMotionValue(0);
            const mouseY = useMotionValue(0);

            const rotateX = useSpring(useTransform(mouseY, [-200, 200], [8, -8]), { stiffness: 200, damping: 30 });
            const rotateY = useSpring(useTransform(mouseX, [-400, 400], [-12, 12]), { stiffness: 200, damping: 30 });
            const translateZ = useSpring(useTransform(mouseY, [-200, 200], [15, -5]), { stiffness: 200, damping: 30 });

            const handleMouseMove = useCallback((e) => {
                const rect = dockRef.current?.getBoundingClientRect();
                if (!rect) return;
                mouseX.set(e.clientX - rect.left - rect.width / 2);
                mouseY.set(e.clientY - rect.top - rect.height / 2);
            }, []);

            const handleMouseLeave = useCallback(() => { mouseX.set(0); mouseY.set(0); }, []);

            return (
                <div className="w-full flex flex-col items-center" style={{ perspective: '1200px' }}>
                    <motion.nav
                        ref={dockRef}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        className="relative flex items-center gap-1 px-3 py-2.5 rounded-2xl"
                        style={{
                            background: 'rgba(255, 255, 255, 0.06)',
                            backdropFilter: 'blur(20px) saturate(180%)',
                            WebkitBackdropFilter: 'blur(20px) saturate(180%)',
                            border: '1px solid rgba(255, 255, 255, 0.1)',
                            boxShadow: '0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1)',
                            rotateX, rotateY, translateZ,
                            transformStyle: 'preserve-3d',
                        }}
                        initial={{ y: -60, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ type: 'spring', stiffness: 200, damping: 25, delay: 0.2 }}
                    >
                        <div className="absolute -inset-4 rounded-3xl pointer-events-none -z-10" style={{ background: 'radial-gradient(ellipse at center, rgba(139,92,246,0.15) 0%, transparent 70%)', filter: 'blur(20px)' }} />
                        {NAV_ITEMS.map((item, i) => (
                            <NavItem key={i} item={item} isActive={activeIndex === i} onClick={() => setActiveIndex(i)} />
                        ))}
                        <motion.button
                            className="ml-2 px-5 py-2.5 rounded-xl text-sm font-semibold relative overflow-hidden cursor-pointer"
                            style={{ background: 'linear-gradient(135deg, #8b5cf6, #6366f1)', color: '#fff', border: '1px solid rgba(255,255,255,0.15)', boxShadow: '0 4px 15px rgba(139,92,246,0.4)' }}
                            whileHover={{ scale: 1.08, boxShadow: '0 6px 25px rgba(139,92,246,0.6)' }}
                            whileTap={{ scale: 0.95 }}
                            transition={{ type: 'spring', stiffness: 400, damping: 20 }}
                        >
                            Get Started →
                        </motion.button>
                    </motion.nav>

                    <AnimatePresence mode="wait">
                        <motion.div
                            key={activeIndex}
                            initial={{ opacity: 0, y: 20, scale: 0.95 }}
                            animate={{ opacity: 1, y: 0, scale: 1 }}
                            exit={{ opacity: 0, y: -20, scale: 0.95 }}
                            transition={{ type: 'spring', stiffness: 300, damping: 30 }}
                            className="mt-16 text-center px-8"
                        >
                            <div className="text-5xl mb-4">{NAV_ITEMS[activeIndex].icon}</div>
                            <h2 className="text-2xl font-bold text-white mb-2">{NAV_ITEMS[activeIndex].label}</h2>
                            <p className="text-slate-400 text-sm max-w-xs mx-auto">
                                Navigate to the <span className="text-violet-400 font-medium">{NAV_ITEMS[activeIndex].label}</span> section. The dock magnetically responds to your cursor in 3D space.
                            </p>
                        </motion.div>
                    </AnimatePresence>

                    <div className="fixed inset-0 -z-20 pointer-events-none overflow-hidden">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 rounded-full" style={{ background: 'radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%)' }} />
                        <div className="absolute bottom-1/3 right-1/4 w-80 h-80 rounded-full" style={{ background: 'radial-gradient(circle, rgba(99,102,241,0.06), transparent 70%)' }} />
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MagneticDock />);
    </script>
</body>
</html>
