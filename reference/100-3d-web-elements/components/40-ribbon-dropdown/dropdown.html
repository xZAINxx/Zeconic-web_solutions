<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ribbon Unfurl Dropdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const OPTIONS = [
            { value: 'react', label: 'React', icon: '⚛️', desc: 'A JavaScript library for building UIs' },
            { value: 'vue', label: 'Vue.js', icon: '💚', desc: 'The Progressive JavaScript Framework' },
            { value: 'angular', label: 'Angular', icon: '🅰️', desc: 'Platform for building mobile & desktop apps' },
            { value: 'svelte', label: 'Svelte', icon: '🔥', desc: 'Cybernetically enhanced web apps' },
            { value: 'nextjs', label: 'Next.js', icon: '▲', desc: 'The React Framework for Production' },
            { value: 'nuxt', label: 'Nuxt', icon: '💎', desc: 'The Intuitive Vue Framework' },
        ];

        const containerVariants = {
            closed: { transition: { staggerChildren: 0.03, staggerDirection: -1 } },
            open: { transition: { staggerChildren: 0.06, delayChildren: 0.05 } }
        };

        const itemVariants = {
            closed: { rotateX: -90, opacity: 0, y: -5, transition: { type: 'spring', stiffness: 400, damping: 30 } },
            open: { rotateX: 0, opacity: 1, y: 0, transition: { type: 'spring', stiffness: 350, damping: 25 } }
        };

        const RibbonDropdown = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [selected, setSelected] = useState(null);
            const [hoveredIndex, setHoveredIndex] = useState(-1);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClick = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, []);

            const handleSelect = (option) => { setSelected(option); setIsOpen(false); };

            return (
                <div className="flex flex-col items-center gap-6">
                    <div className="text-center mb-2">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-500 mb-2">Select Framework</p>
                        <h2 className="text-2xl font-bold text-white">3D Ribbon Unfurl</h2>
                    </div>

                    <div ref={dropdownRef} className="relative w-80" style={{ perspective: '1000px' }}>
                        <motion.button
                            onClick={() => setIsOpen(!isOpen)}
                            className="w-full flex items-center justify-between px-5 py-4 rounded-2xl text-left cursor-pointer"
                            style={{
                                background: 'rgba(255, 255, 255, 0.06)',
                                backdropFilter: 'blur(20px)',
                                border: `1px solid ${isOpen ? 'rgba(139, 92, 246, 0.4)' : 'rgba(255, 255, 255, 0.1)'}`,
                                boxShadow: isOpen ? '0 8px 32px rgba(139, 92, 246, 0.15)' : '0 4px 16px rgba(0,0,0,0.2)',
                                transition: 'border-color 0.3s, box-shadow 0.3s',
                            }}
                            whileTap={{ scale: 0.98 }}
                        >
                            <div className="flex items-center gap-3">
                                {selected ? (
                                    <>
                                        <span className="text-xl">{selected.icon}</span>
                                        <div>
                                            <span className="text-white font-semibold text-sm">{selected.label}</span>
                                            <p className="text-slate-500 text-xs mt-0.5">{selected.desc}</p>
                                        </div>
                                    </>
                                ) : (
                                    <span className="text-slate-400 text-sm">Choose a framework...</span>
                                )}
                            </div>
                            <motion.span animate={{ rotate: isOpen ? 180 : 0 }} transition={{ type: 'spring', stiffness: 300, damping: 25 }} className="text-slate-400 text-lg">▾</motion.span>
                        </motion.button>

                        <AnimatePresence>
                            {isOpen && (
                                <motion.ul
                                    variants={containerVariants}
                                    initial="closed"
                                    animate="open"
                                    exit="closed"
                                    className="absolute top-full left-0 w-full mt-2 z-50 overflow-hidden rounded-2xl"
                                    style={{
                                        perspective: '1000px', transformStyle: 'preserve-3d',
                                        background: 'rgba(15, 20, 35, 0.95)', backdropFilter: 'blur(20px)',
                                        border: '1px solid rgba(255,255,255,0.08)', boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
                                    }}
                                >
                                    {OPTIONS.map((option, i) => (
                                        <motion.li
                                            key={option.value}
                                            variants={itemVariants}
                                            onClick={() => handleSelect(option)}
                                            onMouseEnter={() => setHoveredIndex(i)}
                                            onMouseLeave={() => setHoveredIndex(-1)}
                                            className="flex items-center gap-3 px-5 py-3.5 cursor-pointer transition-colors relative"
                                            style={{
                                                transformOrigin: 'top center', backfaceVisibility: 'hidden',
                                                borderBottom: i < OPTIONS.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
                                                background: hoveredIndex === i ? 'rgba(139, 92, 246, 0.1)' : selected?.value === option.value ? 'rgba(139, 92, 246, 0.06)' : 'transparent',
                                            }}
                                        >
                                            {hoveredIndex === i && (
                                                <motion.div layoutId="hoverGlow" className="absolute left-0 top-0 bottom-0 w-1 rounded-r-full" style={{ background: 'linear-gradient(180deg, #8b5cf6, #6366f1)' }} initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 0.15 }} />
                                            )}
                                            <span className="text-xl">{option.icon}</span>
                                            <div className="flex-1">
                                                <p className="text-sm font-semibold text-white">{option.label}</p>
                                                <p className="text-xs text-slate-500 mt-0.5">{option.desc}</p>
                                            </div>
                                            {selected?.value === option.value && <span className="text-violet-400 text-sm">✓</span>}
                                        </motion.li>
                                    ))}
                                </motion.ul>
                            )}
                        </AnimatePresence>
                    </div>

                    <div className="text-center mt-4">
                        <p className="text-xs text-slate-600 font-mono tracking-wider">
                            {selected ? `Selected: ${selected.label}` : 'No selection yet'}
                        </p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<RibbonDropdown />);
    </script>
</body>
</html>
