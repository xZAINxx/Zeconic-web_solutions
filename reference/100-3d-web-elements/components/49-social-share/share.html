<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spatial Social Share Menu</title>
    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            const msg = args[0];
            if (typeof msg === 'string' && (msg.includes('Babel') || msg.includes('Tailwind') || msg.includes('tailwindcss'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #04060d; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useSpring, useMotionValue, AnimatePresence } from 'framer-motion';

        const ICONS = [
            { label: 'Twitter / X', emoji: '𝕏', color: '#1d9bf0', bg: '#031824', angle: -75 },
            { label: 'LinkedIn',    emoji: 'in', color: '#0a66c2', bg: '#010c18', angle: -30 },
            { label: 'Copy Link',   emoji: '🔗', color: '#a855f7', bg: '#110823', angle: 30 },
            { label: 'WhatsApp',    emoji: '✉', color: '#22c55e', bg: '#021108', angle: 75 },
        ];

        const MagneticIcon = ({ icon, isOpen, index }) => {
            const btnRef = useRef(null);
            const mx = useMotionValue(0);
            const my = useMotionValue(0);
            const rx = useSpring(mx, { stiffness: 250, damping: 18 });
            const ry = useSpring(my, { stiffness: 250, damping: 18 });

            const translateX = useSpring(useMotionValue(0), { stiffness: 300, damping: 22 });
            const translateY = useSpring(useMotionValue(0), { stiffness: 300, damping: 22 });

            // Arc positions: shoot out upward in an arc
            const arcRadius = 130;
            const rad = (icon.angle * Math.PI) / 180;
            const finalX = Math.sin(rad) * arcRadius;
            const finalY = -Math.cos(rad) * arcRadius;

            const handleMouseMove = useCallback((e) => {
                const rect = btnRef.current?.getBoundingClientRect();
                if (!rect) return;
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = e.clientX - cx;
                const dy = e.clientY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 120;
                
                if (dist < maxDist) {
                    const strength = 1 - dist / maxDist;
                    // Magnetic pull toward cursor
                    translateX.set(dx * strength * 0.55);
                    translateY.set(dy * strength * 0.55);
                    // Tilt toward cursor
                    mx.set(-(dy / rect.height) * 35);
                    my.set((dx / rect.width) * 35);
                } else {
                    translateX.set(0);
                    translateY.set(0);
                    mx.set(0);
                    my.set(0);
                }
            }, [mx, my, translateX, translateY]);

            const handleMouseLeave = useCallback(() => {
                translateX.set(0);
                translateY.set(0);
                mx.set(0);
                my.set(0);
            }, [mx, my, translateX, translateY]);

            return (
                <AnimatePresence>
                    {isOpen && (
                        <motion.div
                            ref={btnRef}
                            className="absolute flex flex-col items-center gap-2"
                            style={{
                                perspective: '600px',
                                transformStyle: 'preserve-3d',
                                x: translateX,
                                y: translateY,
                                zIndex: 10,
                            }}
                            initial={{ opacity: 0, x: 0, y: 0, scale: 0.5 }}
                            animate={{ opacity: 1, x: finalX, y: finalY, scale: 1 }}
                            exit={{ opacity: 0, x: 0, y: 0, scale: 0.5 }}
                            transition={{
                                type: 'spring', stiffness: 260, damping: 22,
                                delay: index * 0.06,
                            }}
                            onMouseMove={handleMouseMove}
                            onMouseLeave={handleMouseLeave}
                        >
                            <motion.button
                                style={{
                                    rotateX: rx,
                                    rotateY: ry,
                                    width: 52, height: 52,
                                    borderRadius: '50%',
                                    background: icon.bg,
                                    border: `2px solid ${icon.color}55`,
                                    boxShadow: `0 4px 20px ${icon.color}33, inset 0 1px 0 rgba(255,255,255,0.1)`,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: icon.emoji.length > 1 ? '1rem' : '1.3rem',
                                    color: icon.color,
                                    fontWeight: 700,
                                    cursor: 'pointer',
                                    transformStyle: 'preserve-3d',
                                    willChange: 'transform',
                                }}
                                whileHover={{ scale: 1.15, boxShadow: `0 8px 30px ${icon.color}66` }}
                                whileTap={{ scale: 0.9 }}
                            >
                                {icon.emoji}
                            </motion.button>
                            <motion.span
                                className="text-xs font-medium whitespace-nowrap"
                                style={{ color: icon.color }}
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                transition={{ delay: 0.2 + index * 0.06 }}
                            >
                                {icon.label}
                            </motion.span>
                        </motion.div>
                    )}
                </AnimatePresence>
            );
        };

        const ShareButton = () => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <div className="relative flex items-center justify-center" style={{ width: 180, height: 360 }}>
                    {ICONS.map((icon, i) => (
                        <MagneticIcon key={icon.label} icon={icon} isOpen={isOpen} index={i} />
                    ))}

                    {/* Central Share Button */}
                    <motion.button
                        onClick={() => setIsOpen(v => !v)}
                        className="relative flex items-center gap-2.5 px-6 py-3.5 rounded-full font-semibold text-sm z-20 cursor-pointer"
                        style={{
                            background: isOpen
                                ? 'linear-gradient(135deg, #7c3aed, #6d28d9)'
                                : 'linear-gradient(135deg, #4f46e5, #6366f1)',
                            border: '1px solid rgba(255,255,255,0.15)',
                            boxShadow: `0 4px 20px rgba(99, 102, 241, 0.5), 0 0 0 ${isOpen ? '6px' : '0px'} rgba(99,102,241,0.15)`,
                            color: 'white',
                            transition: 'box-shadow 0.3s',
                        }}
                        whileHover={{ scale: 1.05 }}
                        whileTap={{ scale: 0.95 }}
                        animate={{ rotate: isOpen ? 45 : 0 }}
                        transition={{ type: 'spring', stiffness: 400, damping: 25 }}
                    >
                        <motion.svg
                            viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"
                            style={{ width: 18, height: 18 }}
                        >
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                        </motion.svg>
                        {isOpen ? 'Close' : 'Share'}
                    </motion.button>
                </div>
            );
        };

        const App = () => (
            <div className="flex flex-col items-center gap-16">
                <div className="text-center">
                    <p className="text-xs uppercase tracking-[0.3em] text-slate-600 mb-2">Magnetic Pull Interaction</p>
                    <h1 className="text-4xl font-bold text-white mb-2">Spatial Share Menu</h1>
                    <p className="text-slate-500 text-sm">Click share, then move your cursor near the icons</p>
                </div>
                <ShareButton />
            </div>
        );

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
